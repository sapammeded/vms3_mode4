<script>
// ============================================================
// VMS SAPAM MEDED - SIMPLIFIED BACKEND
// Google Apps Script as Single Source of Truth
// NO Cloudflare Worker, NO Complex Distributed Sync
// ============================================================

// ================= CONFIGURATION =================
const GAS_URL = "https://script.google.com/macros/s/AKfycby71Vh79394QO_m0ros3Opg5UeHo1Q_oLczYPBrmQCPM-o3OR_2JqwCLpjECdweQM4TbQ/exec"; // GANTI DENGAN URL APPS SCRIPT ANDA
const SHEET_ID = "1ohvC84wtT4EP-rcrDbWZ1tKKMIWGjvxSu_JTTDIfvkA";
const WIB_TIMEZONE = "Asia/Jakarta";
const ACTION_TYPES = Object.freeze({ CHECK_IN: "CHECK_IN", CHECK_OUT: "CHECK_OUT", REGISTER: "REGISTER", WALK_IN: "WALK_IN" });
const MAX_QUEUE = 50;

let visitors = {};
let logs = [];
let currentUser = null;
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let LICENSE_MODE = localStorage.getItem("vms_license") || "DEMO";
let isOnline = navigator.onLine;
let syncQueue = [];
let isSyncing = false;
let lastSyncTime = 0;

// ================= DEVICE ID =================
let deviceId = localStorage.getItem("vms_device_id");
if(!deviceId){
    deviceId = "dev_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8);
    localStorage.setItem("vms_device_id", deviceId);
}

// ================= UTILITIES =================
function getEventTimestamp() { return Date.now(); }
function getWIBISO(input = getEventTimestamp()) {
    const d = input instanceof Date ? input : new Date(input);
    const parts = new Intl.DateTimeFormat("sv-SE", { timeZone: WIB_TIMEZONE, year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false }).formatToParts(d)
        .reduce((acc, part) => { if(part.type !== "literal") acc[part.type] = part.value; return acc; }, {});
    return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}+07:00`;
}
function formatWIB(input = getEventTimestamp()) {
    return new Intl.DateTimeFormat("id-ID", { timeZone: WIB_TIMEZONE, dateStyle: "medium", timeStyle: "medium" }).format(input instanceof Date ? input : new Date(input));
}

function toast(msg, type = "info") {
    let t = document.createElement("div");
    t.className = `toast-msg ${type}`;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function generateReg() { return "REG" + Date.now() + Math.floor(Math.random() * 10000); }
function createMutationId(prefix) { return `${prefix}_${deviceId}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }

function normalizeAction(action) {
    const raw = String(action || "").trim().toUpperCase().replace(/[\s-]+/g, "_");
    if(["IN", "CHECKIN", "CHECK_IN"].includes(raw)) return ACTION_TYPES.CHECK_IN;
    if(["OUT", "CHECKOUT", "CHECK_OUT"].includes(raw)) return ACTION_TYPES.CHECK_OUT;
    if(["WALK_IN", "WALKIN"].includes(raw)) return ACTION_TYPES.WALK_IN;
    if(["REGISTER", "REGISTRATION"].includes(raw)) return ACTION_TYPES.REGISTER;
    return raw || "UNKNOWN";
}

function getMutationSource() { return `${deviceId}:browser`; }

// ================= QR FUNCTIONS =================
const QR_SECRET = "VmsEnt2026!";

async function generateSignature(payload) {
    const enc = new TextEncoder().encode(payload + QR_SECRET);
    const hash = await crypto.subtle.digest("SHA-256", enc);
    return btoa(String.fromCharCode(...new Uint8Array(hash)));
}

async function buildQR(reg, data) {
    const ts = Date.now();
    const payload = JSON.stringify({
        reg: reg,
        nama: data.nama,
        perusahaan: data.perusahaan,
        exp: data.expDate,
        ts: ts
    });
    const sig = await generateSignature(payload);
    return btoa(JSON.stringify({ payload, sig, ts }));
}

async function parseQR(raw) {
    try {
        const decoded = JSON.parse(atob(raw));
        const expectedSig = await generateSignature(decoded.payload);
        if(decoded.sig !== expectedSig) return null;
        return JSON.parse(decoded.payload);
    } catch(e) { return null; }
}

async function waitQRCodeReady() {
    let retry = 0;
    while(typeof QRCode === "undefined" && retry < 20) {
        await new Promise(r => setTimeout(r, 100));
        retry++;
    }
    return typeof QRCode !== "undefined";
}

async function generateQRImage(qrPayload) {
    const ready = await waitQRCodeReady();
    if(ready) {
        try {
            const canvas = document.createElement("canvas");
            await QRCode.toCanvas(canvas, qrPayload, { width: 200, margin: 1, color: { dark: "#000000", light: "#FFFFFF" } });
            return canvas.toDataURL("image/png");
        } catch(e) { console.warn("Local QR failed:", e); }
    }
    return null;
}

// ================= LOCAL STORAGE (CACHE) =================
async function saveToLocal() {
    try {
        const data = { visitors, logs, version: 1, updatedAt: Date.now() };
        localStorage.setItem("vms_cache", JSON.stringify(data));
    } catch(e) { console.warn("Save local failed:", e); }
}

async function loadFromLocal() {
    try {
        const raw = localStorage.getItem("vms_cache");
        if(raw) {
            const data = JSON.parse(raw);
            if(data.visitors) visitors = data.visitors;
            if(data.logs) logs = data.logs;
            console.log("Loaded from local cache:", Object.keys(visitors).length, "visitors,", logs.length, "logs");
        }
    } catch(e) { console.warn("Load local failed:", e); }
}

// ================= SYNC TO GOOGLE SHEET (SEDERHANA) =================
async function syncToSheet(payload) {
    if(!payload || (!payload.visitors && !payload.logs)) return false;
    
    const licenseKey = localStorage.getItem("vms_license_key") || "";
    if(!licenseKey) return false;
    
    // Build payload for Apps Script
    const syncPayload = {
        licenseKey: licenseKey,
        deviceId: deviceId,
        site: SITE_ID,
        visitors: payload.visitors || {},
        logs: payload.logs || [],
        mutationId: createMutationId("sync"),
        timestamp: Date.now()
    };
    
    // Queue if offline
    if(!navigator.onLine) {
        syncQueue.push(syncPayload);
        if(syncQueue.length > MAX_QUEUE) syncQueue.shift();
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        toast("Offline mode - data akan disinkronkan saat online", "warning");
        return false;
    }
    
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        
        const res = await fetch(GAS_URL + "?action=sync", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(syncPayload),
            signal: controller.signal
        });
        
        clearTimeout(timeout);
        
        if(res.ok) {
            const result = await res.json();
            if(result.ok) {
                lastSyncTime = Date.now();
                return true;
            }
        }
        throw new Error("Sync failed");
    } catch(e) {
        console.warn("Sync to sheet failed:", e);
        syncQueue.push(syncPayload);
        if(syncQueue.length > MAX_QUEUE) syncQueue.shift();
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        return false;
    }
}

async function pullFromSheet() {
    const licenseKey = localStorage.getItem("vms_license_key") || "";
    if(!licenseKey || !navigator.onLine) return false;
    
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        
        const res = await fetch(`${GAS_URL}?action=pull&licenseKey=${encodeURIComponent(licenseKey)}&site=${encodeURIComponent(SITE_ID)}`, {
            method: "GET",
            signal: controller.signal
        });
        
        clearTimeout(timeout);
        
        if(res.ok) {
            const data = await res.json();
            if(data.ok && data.data) {
                let changed = false;
                
                // Merge visitors
                if(data.data.visitors) {
                    for(const [key, visitor] of Object.entries(data.data.visitors)) {
                        const existing = visitors[key];
                        if(!existing || (visitor.updatedAt || 0) > (existing.updatedAt || 0)) {
                            visitors[key] = visitor;
                            changed = true;
                        }
                    }
                }
                
                // Merge logs
                if(data.data.logs && Array.isArray(data.data.logs)) {
                    const existingIds = new Set(logs.map(l => l.mutationId));
                    for(const log of data.data.logs) {
                        if(log.mutationId && !existingIds.has(log.mutationId)) {
                            logs.unshift(log);
                            changed = true;
                        }
                    }
                    logs = logs.slice(0, 1000);
                }
                
                if(changed) {
                    await saveToLocal();
                    if(typeof renderDashboard === "function") renderDashboard();
                    if(typeof renderLogTable === "function") renderLogTable();
                    toast("Data berhasil disinkronkan dari server", "success");
                }
                return true;
            }
        }
        return false;
    } catch(e) {
        console.warn("Pull from sheet failed:", e);
        return false;
    }
}

async function processSyncQueue() {
    if(!navigator.onLine || syncQueue.length === 0) return;
    
    const queue = [...syncQueue];
    syncQueue = [];
    localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    
    for(const item of queue) {
        await syncToSheet(item);
        await new Promise(r => setTimeout(r, 500));
    }
}

// ================= VISITOR MANAGEMENT =================
function getSiteKey(reg) { return `${SITE_ID}_${reg}`; }

function saveVisitor(siteKey, data, reg, sourceAction) {
    const mutationId = data.mutationId || createMutationId("visitor");
    const eventTs = getEventTimestamp();
    
    const current = visitors[siteKey] || null;
    const incomingVersion = (current?.version || 0) + 1;
    
    const visitor = {
        ...data,
        reg: reg,
        site: SITE_ID,
        version: incomingVersion,
        updatedAt: eventTs,
        updatedAtWIB: getWIBISO(eventTs),
        mutationId: mutationId,
        mutationSource: getMutationSource(),
        sourceAction: normalizeAction(sourceAction)
    };
    
    visitors[siteKey] = visitor;
    return visitor;
}

function resolveVisitorByReg(reg) {
    const regText = String(reg || "").trim();
    if(!regText) return { siteKey: "", visitor: null };
    
    const preferredKey = getSiteKey(regText);
    if(visitors[preferredKey]) return { siteKey: preferredKey, visitor: visitors[preferredKey] };
    
    // Search all sites
    for(const [key, visitor] of Object.entries(visitors)) {
        if(visitor.reg === regText) {
            return { siteKey: key, visitor: visitor };
        }
    }
    
    return { siteKey: "", visitor: null };
}

function addLog(reg, action) {
    const resolved = resolveVisitorByReg(reg);
    const visitor = resolved.visitor;
    const eventTs = getEventTimestamp();
    
    const logEntry = {
        reg: reg,
        name: visitor?.nama || reg,
        company: visitor?.perusahaan || "",
        category: visitor?.kategori || "UMUM",
        action: normalizeAction(action),
        time: eventTs,
        logTime: getWIBISO(eventTs),
        site: SITE_ID,
        deviceId: deviceId,
        mutationId: createMutationId("log"),
        mutationSource: getMutationSource(),
        timestamp: eventTs
    };
    
    logs.unshift(logEntry);
    if(logs.length > 2000) logs = logs.slice(0, 2000);
    return logEntry;
}

// ================= MONETIZATION LIMITS =================
function getCurrentVisitorCount() {
    return Object.keys(visitors).filter(k => k.startsWith(SITE_ID + "_")).length;
}

function getCurrentScanCount() {
    const today = getWIBISO().slice(0,10);
    return logs.filter(l => l.logTime?.slice(0,10) === today && (l.action === "CHECK_IN" || l.action === "CHECK_OUT")).length;
}

function isDemo() { return LICENSE_MODE === "DEMO"; }
function isBasic() { return LICENSE_MODE === "BASIC"; }
function isPro() { return LICENSE_MODE === "PRO"; }

function getDemoMaxRegister() { return 5; }
function getDemoMaxScan() { return 5; }
function getBasicMaxVisitor() { return 150; }

function canRegister() {
    if(isDemo()) {
        if(getCurrentVisitorCount() >= getDemoMaxRegister()) {
            toast("DEMO LIMIT HABIS! Upgrade license untuk lanjut", "error");
            return false;
        }
        return true;
    }
    if(isBasic()) {
        if(getCurrentVisitorCount() >= getBasicMaxVisitor()) {
            toast("LIMIT BASIC TERCAPAI! Upgrade ke PRO untuk unlimited", "error");
            return false;
        }
        const count = getCurrentVisitorCount();
        const max = getBasicMaxVisitor();
        if(count >= max * 0.9) toast(`⚠️ Peringatan: ${max - count} slot tersisa`, "warning");
        return true;
    }
    return true;
}

function canScan() {
    if(isDemo()) {
        if(getCurrentScanCount() >= getDemoMaxScan()) {
            toast("DEMO SCAN LIMIT HABIS! Upgrade license untuk lanjut", "error");
            return false;
        }
        return true;
    }
    return true;
}

function updateMonetizationUI() {
    const progressCard = document.getElementById("monetizationProgressCard");
    if(!progressCard) return;
    
    const visitorCount = getCurrentVisitorCount();
    let maxLimit = 0;
    
    if(isPro()) {
        document.getElementById("visitorLimitText").innerHTML = `${visitorCount} / Unlimited ✨`;
        const progressBar = document.getElementById("visitorProgressBar");
        if(progressBar) progressBar.style.width = "0%";
        document.getElementById("visitorLimitWarning").innerHTML = "✅ PRO Mode - Unlimited akses";
    } else if(isBasic()) {
        maxLimit = getBasicMaxVisitor();
        const percent = (visitorCount / maxLimit) * 100;
        const progressBar = document.getElementById("visitorProgressBar");
        if(progressBar) {
            progressBar.style.width = Math.min(percent, 100) + "%";
            if(percent >= 90) progressBar.className = "progress-bar-fill critical";
            else if(percent >= 70) progressBar.className = "progress-bar-fill warning";
            else progressBar.className = "progress-bar-fill";
        }
        document.getElementById("visitorLimitText").innerHTML = `${visitorCount} / ${maxLimit}`;
        if(percent >= 100) {
            document.getElementById("visitorLimitWarning").innerHTML = "🔴 LIMIT TERCAPAI! Upgrade ke PRO untuk lanjut.";
        } else if(percent >= 90) {
            document.getElementById("visitorLimitWarning").innerHTML = "⚠️ KRITIS! Sisa slot sedikit. Upgrade ke PRO!";
        } else if(percent >= 70) {
            document.getElementById("visitorLimitWarning").innerHTML = "⚠️ Mendekati limit BASIC. Upgrade ke PRO!";
        } else {
            document.getElementById("visitorLimitWarning").innerHTML = `📊 Sisa ${maxLimit - visitorCount} slot tersedia`;
        }
    } else if(isDemo()) {
        maxLimit = getDemoMaxRegister();
        const scanCount = getCurrentScanCount();
        const maxScan = getDemoMaxScan();
        const percent = (visitorCount / maxLimit) * 100;
        const progressBar = document.getElementById("visitorProgressBar");
        if(progressBar) {
            progressBar.style.width = Math.min(percent, 100) + "%";
            if(percent >= 90) progressBar.className = "progress-bar-fill critical";
            else if(percent >= 70) progressBar.className = "progress-bar-fill warning";
            else progressBar.className = "progress-bar-fill";
        }
        document.getElementById("visitorLimitText").innerHTML = `${visitorCount} / ${maxLimit} (${scanCount}/${maxScan} scan)`;
        if(visitorCount >= maxLimit || scanCount >= maxScan) {
            document.getElementById("visitorLimitWarning").innerHTML = "🔴 DEMO LIMIT HABIS! Upgrade license.";
        } else if(visitorCount >= maxLimit * 0.8 || scanCount >= maxScan * 0.8) {
            document.getElementById("visitorLimitWarning").innerHTML = "⚠️ Demo hampir limit. Upgrade untuk lanjut!";
        } else {
            document.getElementById("visitorLimitWarning").innerHTML = `Demo mode: ${maxLimit - visitorCount} register, ${maxScan - scanCount} scan tersisa`;
        }
    }
    
    // Disable buttons based on limits
    const generateBtn = document.getElementById("generateQRBtn");
    const walkinBtn = document.getElementById("walkinBtn");
    const startCamBtn = document.getElementById("startCamBtn");
    const manualProcessBtn = document.getElementById("manualProcess");
    
    if(generateBtn) generateBtn.disabled = !canRegister();
    if(walkinBtn) walkinBtn.disabled = !canRegister();
    if(startCamBtn) startCamBtn.disabled = !canScan();
    if(manualProcessBtn) manualProcessBtn.disabled = !canScan();
}

// ================= PDF BADGE =================
let isDownloading = false;

async function ensureJsPDFReady() {
    if(window.jspdf) return true;
    return new Promise((resolve) => {
        let max = 100;
        let i = 0;
        const interval = setInterval(() => {
            if(window.jspdf) {
                clearInterval(interval);
                resolve(true);
            }
            if(i++ > max) {
                clearInterval(interval);
                resolve(false);
            }
        }, 100);
    });
}

function forceDownloadPDF(doc, filename) {
    try {
        const blob = doc.output("blob");
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        return true;
    } catch(err) { console.error("Force download error:", err); return false; }
}

function cleanPdfText(value, fallback = "-") {
    const text = String(value === undefined || value === null || value === "" ? fallback : value).replace(/\s+/g, " ").trim();
    return text || fallback;
}

function addImageContain(doc, imageData, x, y, w, h) {
    if(!imageData || typeof imageData !== "string" || !imageData.startsWith("data:image")) return false;
    try {
        const props = doc.getImageProperties(imageData);
        const ratio = Math.min(w / props.width, h / props.height);
        const iw = props.width * ratio;
        const ih = props.height * ratio;
        const ix = x + (w - iw) / 2;
        const iy = y + (h - ih) / 2;
        const fmt = /png/i.test(props.fileType || imageData.slice(0, 30)) ? "PNG" : "JPEG";
        doc.addImage(imageData, fmt, ix, iy, iw, ih);
        return true;
    } catch(e) {
        try { doc.addImage(imageData, "JPEG", x, y, w, h); return true; } catch(_) { return false; }
    }
}

function drawCorporateHeader(doc, title, subtitle, w, accentColor) {
    doc.setFillColor(...accentColor);
    doc.roundedRect(0, 0, w, 12, 2, 2, "F");
    doc.setTextColor(255,255,255);
    doc.setFont(undefined, "bold");
    doc.setFontSize(7.5);
    doc.text(cleanPdfText(title), w / 2, 5.2, { align:"center" });
    doc.setFont(undefined, "normal");
    doc.setFontSize(4.8);
    doc.text(cleanPdfText(subtitle), w / 2, 9.1, { align:"center" });
}

function drawCorporateFooter(doc, deviceId, w, h) {
    doc.setFillColor(241,245,249);
    doc.rect(0, h - 7, w, 7, "F");
    doc.setTextColor(71,85,105);
    doc.setFont(undefined, "normal");
    doc.setFontSize(4.2);
    doc.text(`Generated ${formatWIB(getEventTimestamp())}`, 3, h - 3.8);
    doc.text(`Device ${cleanPdfText(deviceId, "unknown")}`, w - 3, h - 3.8, { align:"right" });
}

async function downloadPDFStable(reg, data) {
    try {
        const ready = await ensureJsPDFReady();
        if(!ready) { toast("PDF engine gagal dimuat. Coba refresh.", "error"); return false; }
        const { jsPDF } = window.jspdf;
        const badgeMode = String(data.badgeMode || "PORTRAIT").toUpperCase() === "LANDSCAPE" ? "LANDSCAPE" : "PORTRAIT";
        const badgeW = badgeMode === "LANDSCAPE" ? 86 : 54;
        const badgeH = badgeMode === "LANDSCAPE" ? 54 : 86;
        const doc = new jsPDF({
            orientation: badgeMode === "LANDSCAPE" ? "landscape" : "portrait",
            unit: "mm",
            format: [badgeW, badgeH]
        });
        
        let accentColor = [31,78,74];
        if(data.kategori === "VVIP") accentColor = [217,119,6];
        else if(data.kategori === "VIP") accentColor = [100,116,139];
        
        doc.setFillColor(248,250,252);
        doc.rect(0, 0, badgeW, badgeH, "F");
        drawCorporateHeader(doc, "VISITOR BADGE", cleanPdfText(data.perusahaan || "SAPAM MEDED"), badgeW, accentColor);
        
        doc.setDrawColor(...accentColor);
        doc.setLineWidth(0.5);
        doc.roundedRect(2, 2, badgeW - 4, badgeH - 4, 3, 3, "S");
        
        const qrPayload = await buildQR(reg, data);
        const qrBase64 = await generateQRImage(qrPayload);
        
        const drawWrapped = (value, x, y, maxWidth, maxLines, maxFont) => {
            const text = cleanPdfText(value);
            doc.setFontSize(maxFont);
            const lines = doc.splitTextToSize(text, maxWidth);
            const displayLines = lines.slice(0, maxLines);
            doc.text(displayLines, x, y);
            return y + (displayLines.length * maxFont * 0.36);
        };
        
        if(badgeMode === "LANDSCAPE") {
            // Photo area
            doc.setFillColor(255,255,255);
            doc.roundedRect(4, 13, 22, 22, 2, 2, "F");
            if(data.foto && data.foto.startsWith("data:image")) {
                try { doc.addImage(data.foto, "JPEG", 5, 14, 20, 20); } catch(e) {}
            }
            
            let y = 16;
            doc.setTextColor(15,23,42);
            doc.setFont(undefined, "bold");
            y = drawWrapped(data.nama.toUpperCase(), 31, y, 28, 2, 8.5);
            doc.setFont(undefined, "normal");
            y = drawWrapped(data.perusahaan, 31, y + 1.5, 28, 2, 6.2);
            y = drawWrapped(`PIC: ${data.pic}`, 31, y + 1, 28, 1, 5.8);
            doc.setTextColor(...accentColor);
            doc.setFont(undefined, "bold");
            drawWrapped(data.kategori, 31, y + 1, 28, 1, 6);
            
            if(qrBase64) {
                try { doc.addImage(qrBase64, "PNG", 62, 18, 19, 19); } catch(e) {}
            }
            doc.setTextColor(71,85,105);
            doc.setFont(undefined, "normal");
            doc.setFontSize(5.2);
            doc.text(`REG ${reg}`, 71.5, 40, { align:"center" });
        } else {
            // Portrait mode
            if(data.foto && data.foto.startsWith("data:image")) {
                doc.setFillColor(255,255,255);
                doc.roundedRect(17, 13, 20, 20, 2, 2, "F");
                try { doc.addImage(data.foto, "JPEG", 18, 14, 18, 18); } catch(e) {}
            }
            
            let y = 37;
            doc.setTextColor(15,23,42);
            doc.setFont(undefined, "bold");
            y = drawWrapped(data.nama.toUpperCase(), badgeW / 2, y, 40, 2, 8.2);
            doc.setFont(undefined, "normal");
            y = drawWrapped(data.perusahaan, badgeW / 2, y + 1.5, 40, 2, 6.2);
            y = drawWrapped(`PIC: ${data.pic}`, badgeW / 2, y + 1, 40, 1, 5.8);
            doc.setTextColor(...accentColor);
            doc.setFont(undefined, "bold");
            y = drawWrapped(data.kategori, badgeW / 2, y + 1, 40, 1, 6);
            
            if(qrBase64) {
                try { doc.addImage(qrBase64, "PNG", 16, 55, 18, 18); } catch(e) {}
            }
            doc.setTextColor(71,85,105);
            doc.setFont(undefined, "normal");
            doc.setFontSize(5.2);
            doc.text(`REG ${reg}`, badgeW / 2, 81, { align:"center" });
        }
        
        doc.setTextColor(71,85,105);
        doc.setFont(undefined, "bold");
        doc.setFontSize(5);
        doc.text(`Valid ${cleanPdfText(data.expDate, "-")}`, badgeW / 2, badgeH - 9, { align:"center" });
        drawCorporateFooter(doc, deviceId, badgeW, badgeH);
        
        const success = forceDownloadPDF(doc, `BADGE_${reg}_${badgeMode}.pdf`);
        if(!success) { toast("Download gagal. Gunakan browser Chrome.", "error"); return false; }
        toast(`Badge ID ${reg} berhasil diunduh`, "success");
        return true;
    } catch(err) { console.error("Badge PDF error:", err); toast("Terjadi error saat generate Badge ID", "error"); return false; }
}

        `;

        const modeSelect = modal.querySelector("#previewBadgeMode");

            modal.remove();
        };
        modal.querySelector("#closePreviewBtn").onclick = () => modal.remove();
    });
}

let lineChart = null;
let pieChart = null;

function renderDashboard() {
    const v = Object.values(visitors);
    const active = v.filter(x => x.currentStatus === "IN").length;
    const today = getWIBISO().slice(0,10);
    const todayCheck = logs.filter(l => l.logTime?.slice(0,10) === today && l.action === "CHECK_IN").length;
    
    document.getElementById("statsWidget").innerHTML = `
        <div class="stat-card"><h4>Total Visitors</h4><div class="stat-number">${v.length}</div></div>
        <div class="stat-card"><h4>Active Inside</h4><div class="stat-number">${active}</div></div>
        <div class="stat-card"><h4>Check-ins Today</h4><div class="stat-number">${todayCheck}</div></div>
        <div class="stat-card"><h4>Sync Status</h4><div class="stat-number">${navigator.onLine ? "🟢" : "🟡"}</div></div>
    `;
    
    const last7 = [...Array(7)].map((_, i) => {
        let d = new Date(getEventTimestamp() - i * 86400000);
        return new Intl.DateTimeFormat("id-ID", { timeZone: WIB_TIMEZONE, weekday: "short" }).format(d);
    }).reverse();
    
    const trend = last7.map((_, i) => {
        let day = getWIBISO(getEventTimestamp() - (6 - i) * 86400000).slice(0,10);
        return logs.filter(l => l.logTime?.slice(0,10) === day && l.action === "CHECK_IN").length;
    });
    
    const trendCanvas = document.getElementById("trendChart");
    const categoryCanvas = document.getElementById("categoryChart");
    
    if(window.Chart && trendCanvas && categoryCanvas) {
        if(lineChart) lineChart.destroy();
        lineChart = new Chart(trendCanvas, { type:"line", data:{ labels:last7, datasets:[{ label:"Visit trend", data:trend, borderColor:"#1f4e4a", fill:false }] } });
        
        const catCount = { VVIP:0, VIP:0, UMUM:0 };
        v.forEach(x => { if(x.kategori) catCount[x.kategori]++; });
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(categoryCanvas, { type:"pie", data:{ labels:["VVIP","VIP","UMUM"], datasets:[{ data:[catCount.VVIP, catCount.VIP, catCount.UMUM], backgroundColor:["#fbbf24","#94a3b8","#1f4e4a"] }] } });
    }
    
    updateMonetizationUI();
}

let logRenderPending = false;
function renderLogTable() {
    if(logRenderPending) return;
    logRenderPending = true;
    requestAnimationFrame(() => {
        try {
            const search = document.getElementById("searchLog")?.value.toLowerCase() || "";
            const filtered = logs
                .filter(l => (l.name?.toLowerCase().includes(search) || l.reg?.toLowerCase().includes(search)) && (!l.site || l.site === SITE_ID))
                .sort((a, b) => (b.time || 0) - (a.time || 0))
                .slice(0, 300);
            
            const tbody = document.getElementById("logTableBody");
            if(!tbody) return;
            tbody.innerHTML = "";
            
            filtered.forEach(l => {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<input type="checkbox" class="logCheckItem" data-reg="${l.reg}">`;
                row.insertCell(1).innerText = l.reg;
                row.insertCell(2).innerText = l.name;
                row.insertCell(3).innerText = l.company;
                row.insertCell(4).innerHTML = `<span class="badge badge-${l.category}">${l.category}</span>`;
                row.insertCell(5).innerText = l.action;
                row.insertCell(6).innerText = formatWIB(l.time);
                row.insertCell(7).innerText = l.site || SITE_ID;
                const btn = document.createElement("button");
                btn.innerText = "PDF";
                btn.classList.add("btn-outline");
                btn.style.padding = "4px 12px";
                btn.onclick = () => {
                    const siteKey = getSiteKey(l.reg);
                    const v = visitors[siteKey];
                    if(v) showPreview(l.reg, v);
                };
                row.insertCell(8).appendChild(btn);
            });
        } catch(e) { console.error("Render log table error:", e); }
        finally { logRenderPending = false; }
    });
}

let scannerInstance = null;
let isScanning = false;
let currentCameraId = null;
let processingRegs = new Set();
let lastScanTime = {};
let isManualProcessing = false;
const CAMERA_PREF_KEY = "vms_camera_pref";

function resolveCameraPreference(cameras) {
    const preferred = localStorage.getItem(CAMERA_PREF_KEY) || "auto_back";
    const rememberedCameraId = localStorage.getItem("vms_last_camera_id");
    const remembered = cameras.find(c => c.id === rememberedCameraId);
    if(remembered) return remembered.id;
    const byType = {
        auto_back: cameras.find(cam => /back|rear|belakang/i.test(cam.label || "")),
        auto_front: cameras.find(cam => /front|user|depan/i.test(cam.label || "")),
        auto_external: cameras.find(cam => /external|usb|virtual/i.test(cam.label || ""))
    };
    return (byType[preferred] || byType.auto_back || cameras[0] || {}).id || null;
}

async function initScanner() {
    if(scannerInstance) { await stopScanner(); }
    try {
        const cameras = await Html5Qrcode.getCameras();
        if(!cameras || cameras.length === 0) { toast("Tidak ada kamera terdeteksi", "error"); return false; }
        currentCameraId = resolveCameraPreference(cameras);
        scannerInstance = new Html5Qrcode("cameraPreview");
        return true;
    } catch(err) { console.error("Init scanner error:", err); toast("Gagal inisialisasi kamera", "error"); return false; }
}

async function startScanner() {
    if(isScanning) return;
    if(!scannerInstance) { const init = await initScanner(); if(!init) return; }
    try {
        await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
            async (decodedText) => {
                if(!canScan()) return;
                if(processingRegs.has(decodedText)) return;
                await processScan(decodedText);
            },
            (error) => { if(error && !error.includes("No MultiFormat Readers")) console.log("Scan error:", error); }
        );
        isScanning = true;
        if(currentCameraId) localStorage.setItem("vms_last_camera_id", currentCameraId);
        toast("Scanner siap", "success");
    } catch(err) { console.error("Start scanner error:", err); toast("Gagal start kamera", "error"); isScanning = false; }
}

async function stopScanner() {
    if(scannerInstance && isScanning) {
        try { await scannerInstance.stop(); await scannerInstance.clear(); } catch(err) { console.error("Stop scanner error:", err); }
    }
    isScanning = false;
}

async function cleanupScanner() {
    if(scannerInstance) {
        try { await scannerInstance.stop().catch(()=>{}); await scannerInstance.clear().catch(()=>{}); } catch(e) {}
        scannerInstance = null;
    }
    isScanning = false;
    const container = document.getElementById("cameraPreview");
    if(container) container.innerHTML = "";
}

async function processScan(qrText) {
    const mode = normalizeAction(document.getElementById("scanMode").value);
    const payload = await parseQR(qrText);
    if(!payload) { toast("QR tidak valid", "error"); return; }
    const reg = payload.reg;
    
    if(lastScanTime[reg] && getEventTimestamp() - lastScanTime[reg] < 1200) {
        toast("Scan terlalu cepat", "warning");
        return;
    }
    lastScanTime[reg] = getEventTimestamp();
    
    if(processingRegs.has(reg)) { toast("Sedang diproses", "warning"); return; }
    processingRegs.add(reg);
    
    try {
        let resolved = resolveVisitorByReg(reg);
        let siteKey = resolved.siteKey || getSiteKey(reg);
        let visitor = resolved.visitor;
        
        if(!visitor) { toast(`Visitor ${reg} tidak ditemukan`, "error"); return; }
        
        const exp = new Date(visitor.expDate);
        exp.setHours(23,59,59,999);
        if(exp < new Date()) { toast("QR sudah expired", "error"); return; }
        
        const mutationId = createMutationId(mode === "CHECK_IN" ? "checkin" : "checkout");
        const eventTs = getEventTimestamp();
        
        if(mode === "CHECK_IN") {
            if(!visitor.sessions) visitor.sessions = [];
            visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
            visitors[siteKey] = { ...visitor, currentStatus: "IN", lastScanSite: SITE_ID, updatedAt: eventTs, updatedAtWIB: getWIBISO(eventTs), mutationId, mutationSource: getMutationSource() };
            const scanLog = addLog(reg, "CHECK_IN");
            await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
            toast(`✅ CHECK-IN ${visitor.nama} berhasil`, "success");
        } else {
            if(!visitor.sessions) visitor.sessions = [];
            let openSession = null;
            for(let i = visitor.sessions.length - 1; i >= 0; i--) {
                if(!visitor.sessions[i].checkOut) { openSession = visitor.sessions[i]; break; }
            }
            if(!openSession) {
                toast("Tidak ada sesi check-in aktif", "warning");
                visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: eventTs, checkOutWIB: getWIBISO(eventTs) });
            } else {
                openSession.checkOut = eventTs;
                openSession.checkOutWIB = getWIBISO(eventTs);
            }
            visitors[siteKey] = { ...visitor, currentStatus: "OUT", lastScanSite: SITE_ID, updatedAt: eventTs, updatedAtWIB: getWIBISO(eventTs), mutationId, mutationSource: getMutationSource() };
            const scanLog = addLog(reg, "CHECK_OUT");
            await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
            toast(`✅ CHECK-OUT ${visitor.nama} berhasil`, "success");
        }
        
        await saveToLocal();
        renderDashboard();
        renderLogTable();
        updateMonetizationUI();
        
    } finally {
        processingRegs.delete(reg);
    }
}

async function capturePhoto() {
    return new Promise(async (resolve) => {
        let modalDiv = document.createElement("div");
        modalDiv.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:4000;display:flex;align-items:center;justify-content:center;";
        modalDiv.innerHTML = `<div style="background:white;border-radius:32px;padding:20px;width:90%;max-width:400px;"><video id="camVideoWalk" autoplay playsinline style="width:100%;border-radius:16px;"></video><canvas id="canvasWalk" style="display:none;"></canvas><div style="display:flex;gap:12px;margin-top:16px;"><button id="takeWalkBtn">Ambil Foto</button><button id="closeWalkBtn">Batal</button></div></div>`;
        document.body.appendChild(modalDiv);
        let video = modalDiv.querySelector("#camVideoWalk");
        let stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();
        modalDiv.querySelector("#takeWalkBtn").onclick = () => {
            let canvas = modalDiv.querySelector("#canvasWalk");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                stream.getTracks().forEach(t => t.stop());
                modalDiv.remove();
                resolve(new File([blob], "walkin.jpg", { type: "image/jpeg" }));
            }, "image/jpeg", 0.8);
        };
        modalDiv.querySelector("#closeWalkBtn").onclick = () => {
            stream.getTracks().forEach(t => t.stop());
            modalDiv.remove();
            resolve(null);
        };
    });
}

async function registerVisitor(data, isWalkin = false) {
    const reg = generateReg();
    const siteKey = getSiteKey(reg);
    const eventTs = getEventTimestamp();
    
    const visitorData = {
        ...data,
        reg: reg,
        site: SITE_ID,
        version: 1,
        updatedAt: eventTs,
        updatedAtWIB: getWIBISO(eventTs),
        mutationId: createMutationId(isWalkin ? "walkin" : "register"),
        mutationSource: getMutationSource(),
        sessions: [],
        currentStatus: "OUT"
    };
    
    visitors[siteKey] = visitorData;
    const logEntry = addLog(reg, isWalkin ? "WALK_IN" : "REGISTER");
    
    await syncToSheet({ visitors: { [siteKey]: visitorData }, logs: [logEntry] });
    await saveToLocal();
    
    return { reg, visitor: visitorData };
}

// ================= USER AUTH (SEDERHANA) =================
async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function ensureDefaultAdmin() {
    let users = JSON.parse(localStorage.getItem("vms_users") || "[]");
    if(users.length === 0) {
        users = [{
            username: "admin",
            password: await sha256("123456"),
            role: "SUPER_ADMIN"
        }];
        localStorage.setItem("vms_users", JSON.stringify(users));
    }
    return users;
}

async function localLogin(username, password) {
    await ensureDefaultAdmin();
    const users = JSON.parse(localStorage.getItem("vms_users") || "[]");
    const passwordHash = await sha256(password);
    const user = users.find(u => u.username === username && u.password === passwordHash);
    if(user) {
        localStorage.setItem("vms_user", JSON.stringify({ username: user.username, role: user.role }));
        localStorage.setItem("vms_role", user.role);
        return { success: true, role: user.role };
    }
    return { success: false, error: "Invalid username or password" };
}

async function hybridLogin(username, password) {
    if(!username || !password) {
        toast("Username dan password wajib diisi", "warning");
        return false;
    }
    
    const result = await localLogin(username, password);
    if(result.success) {
        toast(`✅ Login berhasil - ${result.role}`, "success");
        return true;
    }
    toast(result.error || "Login gagal", "error");
    return false;
}

        const previous = SITE_ID || sel.value || "SITE_A";

function exportToExcel() {
    if(isDemo()) {
        toast("Export tidak tersedia di DEMO mode. Upgrade license!", "error");
        return;
    }
    try {
        if(!window.XLSX) { toast("Excel engine belum siap", "error"); return; }
        
        const dataForExcel = [];
        Object.entries(visitors).forEach(([siteKey, visitor]) => {
            if(!siteKey.startsWith(SITE_ID + "_")) return;
            const reg = siteKey.replace(SITE_ID + "_", "");
            const now = new Date();
            const expDate = visitor.expDate ? new Date(visitor.expDate) : null;
            
            let masaBerlakuStatus = "";
            let keterangan = "";
            
            if(expDate) {
                if(expDate < now) {
                    masaBerlakuStatus = "❌ EXPIRED";
                    keterangan = "QR Code sudah kadaluarsa";
                } else {
                    const daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                    masaBerlakuStatus = `✅ AKTIF (sisa ${daysLeft} hari)`;
                    keterangan = `Berlaku hingga ${visitor.expDate}`;
                }
            } else {
                masaBerlakuStatus = "⚠️ TIDAK DITENTUKAN";
                keterangan = "Tanggal kadaluarsa tidak diisi";
            }
            
            if(visitor.sessions && visitor.sessions.length > 0) {
                visitor.sessions.forEach((session, idx) => {
                    const checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                    const checkOutDate = session.checkOut ? new Date(session.checkOut) : null;
                    
                    const formatDateTime = (date) => {
                        if(!date) return "-";
                        const y = date.getFullYear();
                        const m = String(date.getMonth() + 1).padStart(2, "0");
                        const d = String(date.getDate()).padStart(2, "0");
                        const h = String(date.getHours()).padStart(2, "0");
                        const mi = String(date.getMinutes()).padStart(2, "0");
                        const s = String(date.getSeconds()).padStart(2, "0");
                        return `${y}-${m}-${d} ${h}:${mi}:${s}`;
                    };
                    
                    let durationText = "-";
                    let statusText = "IN PROGRESS";
                    
                    if(session.checkIn && session.checkOut) {
                        const durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000);
                        durationText = durationMinutes.toString();
                        statusText = "COMPLETED";
                    } else if(session.checkIn && !session.checkOut) {
                        durationText = "IN PROGRESS";
                        statusText = "IN PROGRESS";
                    }
                    
                    dataForExcel.push({
                        "Nama": visitor.nama || "-",
                        "No. Registrasi": reg,
                        "Perusahaan": visitor.perusahaan || "-",
                        "Kategori": visitor.kategori || "UMUM",
                        "Tujuan": visitor.tujuan || "-",
                        "PIC": visitor.pic || "-",
                        "Departemen": visitor.dept || "-",
                        "Sesi Ke": idx + 1,
                        "Check-In": formatDateTime(checkInDate),
                        "Check-Out": formatDateTime(checkOutDate),
                        "Durasi (menit)": durationText,
                        "Status Sesi": statusText,
                        "Masa Berlaku QR": masaBerlakuStatus,
                        "Tanggal Kadaluarsa": visitor.expDate || "-",
                        "Keterangan": keterangan
                    });
                });
            } else {
                dataForExcel.push({
                    "Nama": visitor.nama || "-",
                    "No. Registrasi": reg,
                    "Perusahaan": visitor.perusahaan || "-",
                    "Kategori": visitor.kategori || "UMUM",
                    "Tujuan": visitor.tujuan || "-",
                    "PIC": visitor.pic || "-",
                    "Departemen": visitor.dept || "-",
                    "Sesi Ke": "-",
                    "Check-In": "-",
                    "Check-Out": "-",
                    "Durasi (menit)": "-",
                    "Status Sesi": "TERDAFTAR (Belum ada aktivitas)",
                    "Masa Berlaku QR": masaBerlakuStatus,
                    "Tanggal Kadaluarsa": visitor.expDate || "-",
                    "Keterangan": keterangan + " | Belum melakukan scan QR"
                });
            }
        });
        
        dataForExcel.sort((a, b) => (a["Nama"] || "").localeCompare(b["Nama"] || ""));
        const ws = XLSX.utils.json_to_sheet(dataForExcel);
        ws["!cols"] = [{wch:25},{wch:18},{wch:20},{wch:12},{wch:20},{wch:15},{wch:15},{wch:8},{wch:20},{wch:20},{wch:15},{wch:18},{wch:18},{wch:18},{wch:35}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
        XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0,19).replace(/:/g, "-")}.xlsx`);
        toast("✅ Excel berhasil di export", "success");
    } catch(err) {
        console.error("Export error:", err);
        toast("Export gagal: " + err.message, "error");
    }
}

            dept: "Umum",
            startDate: getWIBISO(nowTs).slice(0,10),
            expDate: getWIBISO(expTs).slice(0,10),
            badgeMode: badgeMode,
            foto: fotoBase64
        }, true);
        
        toast(`Walk-in registered ${result.reg}`, "success");
        showPreview(result.reg, result.visitor);
        renderDashboard();
        renderLogTable();
        updateMonetizationUI();
    });
    
    // Scanner
    document.getElementById("startCamBtn")?.addEventListener("click", async () => {
        if(!canScan()) return;
        const container = document.getElementById("cameraPreview");
        if(container) container.innerHTML = "";
        await stopScanner();
        await cleanupScanner();
        await startScanner();
    });
    document.getElementById("stopCamBtn")?.addEventListener("click", async () => {
        await stopScanner();
        await cleanupScanner();
        toast("Kamera berhenti", "info");
    });
    document.getElementById("uploadQrBtn")?.addEventListener("click", () => document.getElementById("uploadQrFile")?.click());
    document.getElementById("uploadQrFile")?.addEventListener("change", async (e) => {
        if(!canScan()) return;
        const file = e.target.files[0];
        if(!file) return;
        try {
            if(!window.Html5Qrcode) { toast("QR engine belum siap", "error"); return; }
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.src = url;
            await img.decode();
            URL.revokeObjectURL(url);
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext("2d").drawImage(img, 0, 0);
            const scanner = new Html5Qrcode("temp-reader");
            const decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
            await processScan(decoded);
            await scanner.clear();
            document.getElementById("temp-reader").innerHTML = "";
        } catch(err) { console.error(err); toast("QR tidak terbaca", "error"); }
    });
    
    document.getElementById("manualProcess")?.addEventListener("click", async () => {
        if(!canScan()) return;
        if(isManualProcessing) { toast("Sedang diproses", "warning"); return; }
        isManualProcessing = true;
        try {
            const reg = document.getElementById("manualReg")?.value.trim();
            if(!reg) { toast("Masukkan REG number", "error"); return; }
            const mode = normalizeAction(document.getElementById("scanMode")?.value);
            const resolved = resolveVisitorByReg(reg);
            const siteKey = resolved.siteKey || getSiteKey(reg);
            const visitor = resolved.visitor;
            
            if(!visitor) { toast(`Visitor ${reg} tidak ditemukan`, "error"); return; }
            
            const exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()) { toast("QR sudah expired", "error"); return; }
            
            const mutationId = createMutationId(mode === "CHECK_IN" ? "manual_checkin" : "manual_checkout");
            const eventTs = getEventTimestamp();
            
            if(mode === "CHECK_IN") {
                if(!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
                visitors[siteKey] = { ...visitor, currentStatus: "IN", lastScanSite: SITE_ID, updatedAt: eventTs, updatedAtWIB: getWIBISO(eventTs), mutationId, mutationSource: getMutationSource() };
                const scanLog = addLog(reg, "CHECK_IN");
                await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
                toast(`Check-in ${visitor.nama} success`, "success");
            } else {
                if(!visitor.sessions) visitor.sessions = [];
                let openSession = null;
                for(let i = visitor.sessions.length - 1; i >= 0; i--) {
                    if(!visitor.sessions[i].checkOut) { openSession = visitor.sessions[i]; break; }
                }
                if(!openSession) {
                    toast("Tidak ada sesi check-in aktif", "warning");
                    visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: eventTs, checkOutWIB: getWIBISO(eventTs) });
                } else {
                    openSession.checkOut = eventTs;
                    openSession.checkOutWIB = getWIBISO(eventTs);
                }
                visitors[siteKey] = { ...visitor, currentStatus: "OUT", lastScanSite: SITE_ID, updatedAt: eventTs, updatedAtWIB: getWIBISO(eventTs), mutationId, mutationSource: getMutationSource() };
                const scanLog = addLog(reg, "CHECK_OUT");
                await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
                toast(`Check-out ${visitor.nama} success`, "success");
            }
            
            await saveToLocal();
            renderDashboard();
            renderLogTable();
            updateMonetizationUI();
        } finally {
            isManualProcessing = false;
        }
    });
    
    document.getElementById("cameraSelector")?.addEventListener("change", (e) => localStorage.setItem(CAMERA_PREF_KEY, e.target.value));
    if(document.getElementById("cameraSelector")) {
        document.getElementById("cameraSelector").value = localStorage.getItem(CAMERA_PREF_KEY) || "auto_back";
    }
    
    // Logs page buttons
    document.getElementById("refreshLogsBtn")?.addEventListener("click", renderLogTable);
    document.getElementById("selectAllBtn")?.addEventListener("click", () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = true));
    document.getElementById("deselectAllBtn")?.addEventListener("click", () => document.querySelectorAll(".logCheckItem").forEach(c => c.checked = false));
    document.getElementById("deleteSelectedBtn")?.addEventListener("click", () => {
        if(!isAdmin()) return;
        const regs = [...new Set([...document.querySelectorAll(".logCheckItem:checked")].map(c => c.dataset.reg))];
        regs.forEach(r => {
            const siteKey = getSiteKey(r);
            delete visitors[siteKey];
        });
        const newLogs = logs.filter(l => !regs.includes(l.reg));
        logs.length = 0;
        logs.push(...newLogs);
        saveToLocal();
        renderDashboard();
        renderLogTable();
        toast(`Deleted ${regs.length} records`, "success");
        updateMonetizationUI();
    });
    document.getElementById("deleteAllBtn")?.addEventListener("click", () => {
        if(!isAdmin()) return;
        visitors = {};
        logs = [];
        saveToLocal();
        renderDashboard();
        renderLogTable();
        toast("All data cleared", "info");
        updateMonetizationUI();
    });
    document.getElementById("exportExcelAction")?.addEventListener("click", exportToExcel);
    document.getElementById("backupAction")?.addEventListener("click", () => {
        if(isDemo()) { toast("Backup tidak tersedia di DEMO mode", "error"); return; }
        try {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([JSON.stringify({ visitors, logs })], { type: "application/json" }));
            a.download = `vms_backup_${Date.now()}.json`;
            a.click();
            toast("Backup ready", "success");
        } catch(e) { toast("Backup gagal", "error"); }
    });
    document.getElementById("resetDatabaseAction")?.addEventListener("click", () => {
        if(!isAdmin()) return;
        visitors = {};
        logs = [];
        saveToLocal();
        renderDashboard();
        renderLogTable();
        toast("Database reset", "info");
        updateMonetizationUI();
    });
    
    document.getElementById("regPhotoFile")?.addEventListener("change", (e) => {
        if(e.target.files[0]) {
            const r = new FileReader();
            r.onload = ev => document.getElementById("previewPhotoThumb").src = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        }
    });
    
    // Auth
    document.getElementById("doLoginBtn")?.addEventListener("click", async () => {
        const username = document.getElementById("loginUsername")?.value || "";
        const password = document.getElementById("loginPassword")?.value || "";
        const success = await hybridLogin(username, password);
        if(success) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("appLayout").style.display = "flex";
            updateUserUI();
            applyRoleVisibility();
            renderDashboard();
            renderLogTable();
        }
    });
    document.querySelectorAll("#logoutBtnTop, #logoutBtnSidebar").forEach(btn => {
        btn?.addEventListener("click", hybridLogout);
    });
    
    // Session init
    await hybridInitSession();
    
    // Online/offline handlers
    window.addEventListener("online", async () => {
        toast("🟢 Kembali ONLINE - Sinkronisasi data", "success");
        await processSyncQueue();
        await pullFromSheet();
        renderDashboard();
        renderLogTable();
    });
    window.addEventListener("offline", () => {
        toast("🟡 MODE OFFLINE - Menggunakan data lokal", "warning");
    });
    
    // Periodic sync
    setInterval(async () => {
        if(navigator.onLine) {
            await processSyncQueue();
            await pullFromSheet();
        }
    }, 60000);
    
    // Initial pull
    if(navigator.onLine) {
        await pullFromSheet();
    }
    
    renderDashboard();
    renderLogTable();
    updateMonetizationUI();
    
    toast(`🔥 VMS Ready - Mode: ${LICENSE_MODE}`, "success");
});

// Export to global
window.visitors = visitors;
window.logs = logs;
window.SITE_ID = SITE_ID;
window.renderDashboard = renderDashboard;
window.renderLogTable = renderLogTable;
window.updateMonetizationUI = updateMonetizationUI;
window.showPreview = showPreview;
window.downloadPDFStable = downloadPDFStable;
window.processScan = processScan;
window.addLog = addLog;
window.saveVisitor = saveVisitor;
window.resolveVisitorByReg = resolveVisitorByReg;
window.canRegister = canRegister;
window.canScan = canScan;
window.getCurrentVisitorCount = getCurrentVisitorCount;
window.getCurrentScanCount = getCurrentScanCount;
window.isAdmin = isAdmin;
window.applyLicenseKey = applyLicenseKey;
window.hybridLogin = hybridLogin;
window.hybridLogout = hybridLogout;
window.hybridInitSession = hybridInitSession;

</script>

</body>
</html>
