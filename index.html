<script>
// ============================================================
// VMS SAPAM MEDED - FULL VERSION DENGAN SEMUA FITUR
// ============================================================

// ================= KONFIGURASI =================
const GAS_URL = "https://script.google.com/macros/s/AKfycbwgUe6e4f0VzPZ-UgSYnw2E0f_c2sW6F6B67RfLAwW1yek7WWcRQaoZ_zNSq1Cj4jhjjw/exec";
const WIB_TIMEZONE = "Asia/Jakarta";
const ACTION_TYPES = Object.freeze({ CHECK_IN: "CHECK_IN", CHECK_OUT: "CHECK_OUT", REGISTER: "REGISTER", WALK_IN: "WALK_IN" });
const QR_SECRET = "VmsEnt2026!";

// Constants untuk fitur lengkap
const MAX_EVENT_AGE = 24 * 60 * 60 * 1000; // 24 jam
const MAX_FUTURE_SKEW = 10 * 60 * 1000; // 10 menit
const MUTATION_DEBOUNCE_MS = 1200;
const DUPLICATE_REJECTION_WINDOW_MS = 15000;

// Global state
let visitors = {};
let logs = [];
let currentUser = null;
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let LICENSE_MODE = localStorage.getItem("vms_license") || "DEMO";
let deviceId = localStorage.getItem("vms_device_id");
let isProcessing = false;
let syncQueue = [];

// Cache untuk processed mutation IDs
let processedMutationIds = new Set();
let requestFingerprints = new Map();
let lastMutationTime = new Map();

// ================= UTILITIES =================
function getEventTimestamp() { return Date.now(); }

function getWIBISO(input) {
    var d = input ? new Date(input) : new Date();
    var year = d.getFullYear();
    var month = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    var hours = String(d.getHours()).padStart(2, "0");
    var minutes = String(d.getMinutes()).padStart(2, "0");
    var seconds = String(d.getSeconds()).padStart(2, "0");
    return year + "-" + month + "-" + day + "T" + hours + ":" + minutes + ":" + seconds + "+07:00";
}

function formatWIB(input) {
    var d = input ? new Date(input) : new Date();
    return d.toLocaleDateString("id-ID", { timeZone: "Asia/Jakarta", dateStyle: "medium" }) + " " + 
           d.toLocaleTimeString("id-ID", { timeZone: "Asia/Jakarta", timeStyle: "medium" });
}

function toast(msg, type) {
    type = type || "info";
    var t = document.createElement("div");
    t.className = "toast-msg " + type;
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

function structuredLog(type, payload) {
    console.log(JSON.stringify({ type: type, updatedAt: getWIBISO(), ...payload }));
}

function generateReg() { 
    return "REG" + Date.now() + Math.floor(Math.random() * 10000);
}

function createMutationId(prefix) {
    return prefix + "_" + deviceId + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
}

function generateRequestFingerprint(data) {
    return [data.mutationId || "", data.reg || "", deviceId, data.eventTs || getEventTimestamp()].join("|");
}

function normalizeAction(action) {
    var raw = String(action || "").trim().toUpperCase().replace(/[\s-]+/g, "_");
    if (["IN", "CHECKIN", "CHECK_IN"].indexOf(raw) >= 0) return ACTION_TYPES.CHECK_IN;
    if (["OUT", "CHECKOUT", "CHECK_OUT"].indexOf(raw) >= 0) return ACTION_TYPES.CHECK_OUT;
    if (["WALK_IN", "WALKIN"].indexOf(raw) >= 0) return ACTION_TYPES.WALK_IN;
    if (["REGISTER", "REGISTRATION"].indexOf(raw) >= 0) return ACTION_TYPES.REGISTER;
    return raw || "UNKNOWN";
}

function getMutationSource() { return deviceId + ":browser"; }

// ================= VALIDATION FUNCTIONS (FITUR LENGKAP) =================
function validateReplayWindow(eventTs) {
    var now = getEventTimestamp();
    if (!eventTs || eventTs <= 0) return false;
    if ((now - eventTs) > MAX_EVENT_AGE) return false;
    if ((eventTs - now) > MAX_FUTURE_SKEW) return false;
    return true;
}

function isDuplicateMutation(mutationId) {
    if (processedMutationIds.has(mutationId)) return true;
    
    // Clean old entries
    var now = getEventTimestamp();
    for (var [key, time] of requestFingerprints.entries()) {
        if (now - time > DUPLICATE_REJECTION_WINDOW_MS) {
            requestFingerprints.delete(key);
        }
    }
    
    return false;
}

function isDuplicateRequest(fingerprint) {
    if (requestFingerprints.has(fingerprint)) return true;
    requestFingerprints.set(fingerprint, getEventTimestamp());
    return false;
}

function isMutationTooFast(reg) {
    var now = getEventTimestamp();
    var lastTime = lastMutationTime.get(reg);
    if (lastTime && (now - lastTime) < MUTATION_DEBOUNCE_MS) return true;
    lastMutationTime.set(reg, now);
    return false;
}

function markMutationProcessed(mutationId, fingerprint) {
    processedMutationIds.add(mutationId);
    if (fingerprint) requestFingerprints.set(fingerprint, getEventTimestamp());
    
    // Keep cache size reasonable
    if (processedMutationIds.size > 2000) {
        var toDelete = [];
        var i = 0;
        for (var id of processedMutationIds) {
            if (i++ < 1000) toDelete.push(id);
            else break;
        }
        for (var j = 0; j < toDelete.length; j++) {
            processedMutationIds.delete(toDelete[j]);
        }
    }
}

// ================= DEVICE ID =================
if (!deviceId) {
    deviceId = "dev_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    localStorage.setItem("vms_device_id", deviceId);
}

// ================= QR FUNCTIONS =================
async function generateSignature(payload) {
    var enc = new TextEncoder().encode(payload + QR_SECRET);
    var hash = await crypto.subtle.digest("SHA-256", enc);
    var bytes = new Uint8Array(hash);
    var result = "";
    for (var i = 0; i < bytes.length; i++) {
        result += String.fromCharCode(bytes[i]);
    }
    return btoa(result);
}

async function buildQR(reg, data) {
    var ts = Date.now();
    var payload = JSON.stringify({
        reg: reg,
        nama: data.nama,
        perusahaan: data.perusahaan,
        exp: data.expDate,
        ts: ts
    });
    var sig = await generateSignature(payload);
    return btoa(JSON.stringify({ payload: payload, sig: sig, ts: ts }));
}

async function parseQR(raw) {
    try {
        var decoded = JSON.parse(atob(raw));
        var expectedSig = await generateSignature(decoded.payload);
        if (decoded.sig !== expectedSig) return null;
        return JSON.parse(decoded.payload);
    } catch(e) { 
        return null; 
    }
}

// ================= SYNC TO GOOGLE SHEET (DENGAN IDEMPOTENT) =================
async function syncToSheet(payload) {
    var licenseKey = localStorage.getItem("vms_license_key") || "";
    if (!licenseKey) return false;
    
    // Check for duplicates before sending
    var hasNewData = false;
    if (payload.visitors) {
        for (var key in payload.visitors) {
            var visitor = payload.visitors[key];
            if (visitor.mutationId && !isDuplicateMutation(visitor.mutationId)) {
                hasNewData = true;
                break;
            }
        }
    }
    if (!hasNewData && payload.logs) {
        for (var i = 0; i < payload.logs.length; i++) {
            var log = payload.logs[i];
            if (log.mutationId && !isDuplicateMutation(log.mutationId)) {
                hasNewData = true;
                break;
            }
        }
    }
    
    if (!hasNewData) {
        structuredLog("SYNC_SKIPPED_DUPLICATE", { reason: "no new mutation ids" });
        return true;
    }
    
    var syncPayload = {
        licenseKey: licenseKey,
        deviceId: deviceId,
        site: SITE_ID,
        visitors: payload.visitors || {},
        logs: payload.logs || [],
        mutationId: createMutationId("sync"),
        timestamp: Date.now()
    };
    
    if (!navigator.onLine) {
        syncQueue.push(syncPayload);
        if (syncQueue.length > 50) syncQueue.shift();
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        toast("Offline mode - data akan disinkronkan saat online", "warning");
        return false;
    }
    
    try {
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 15000);
        
        var res = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(syncPayload),
            signal: controller.signal
        });
        
        clearTimeout(timeout);
        
        if (res.ok) {
            var result = await res.json();
            if (result && result.ok === true) {
                // Mark all mutation IDs as processed
                if (payload.visitors) {
                    for (var key in payload.visitors) {
                        var v = payload.visitors[key];
                        if (v.mutationId) markMutationProcessed(v.mutationId, v.requestFingerprint);
                    }
                }
                if (payload.logs) {
                    for (var j = 0; j < payload.logs.length; j++) {
                        var l = payload.logs[j];
                        if (l.mutationId) markMutationProcessed(l.mutationId, l.requestFingerprint);
                    }
                }
                saveToLocal();
                return true;
            }
        }
        return false;
    } catch(e) {
        console.warn("Sync failed:", e);
        syncQueue.push(syncPayload);
        if (syncQueue.length > 50) syncQueue.shift();
        localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
        return false;
    }
}

async function pullFromSheet() {
    var licenseKey = localStorage.getItem("vms_license_key") || "";
    if (!licenseKey || !navigator.onLine) return false;
    
    try {
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 15000);
        
        var url = GAS_URL + "?licenseKey=" + encodeURIComponent(licenseKey) + "&site=" + encodeURIComponent(SITE_ID);
        var res = await fetch(url, { method: "GET", signal: controller.signal });
        
        clearTimeout(timeout);
        
        if (res.ok) {
            var data = await res.json();
            if (data && data.ok === true && data.data) {
                var changed = false;
                
                if (data.data.visitors) {
                    for (var key in data.data.visitors) {
                        if (data.data.visitors.hasOwnProperty(key)) {
                            var visitor = data.data.visitors[key];
                            var existing = visitors[key];
                            // Version-based conflict resolution
                            if (!existing || (visitor.version || 0) > (existing.version || 0) ||
                                (visitor.updatedAt || 0) > (existing.updatedAt || 0)) {
                                visitors[key] = visitor;
                                changed = true;
                            }
                        }
                    }
                }
                
                if (data.data.logs && Array.isArray(data.data.logs)) {
                    var existingIds = new Set();
                    for (var i = 0; i < logs.length; i++) {
                        if (logs[i].mutationId) existingIds.add(logs[i].mutationId);
                    }
                    for (var j = 0; j < data.data.logs.length; j++) {
                        var logEntry = data.data.logs[j];
                        if (logEntry.mutationId && !existingIds.has(logEntry.mutationId)) {
                            logs.unshift(logEntry);
                            changed = true;
                        }
                    }
                    if (logs.length > 2000) logs = logs.slice(0, 2000);
                }
                
                if (changed) {
                    saveToLocal();
                    renderDashboard();
                    renderLogTable();
                    toast("Data berhasil disinkronkan", "success");
                }
                return true;
            }
        }
        return false;
    } catch(e) {
        console.warn("Pull failed:", e);
        return false;
    }
}

async function processSyncQueue() {
    if (!navigator.onLine || syncQueue.length === 0) return;
    
    var queue = syncQueue.slice();
    syncQueue = [];
    localStorage.setItem("vms_sync_queue", JSON.stringify(syncQueue));
    
    for (var i = 0; i < queue.length; i++) {
        await syncToSheet(queue[i]);
        await new Promise(function(r) { setTimeout(r, 500); });
    }
}

// ================= VISITOR MANAGEMENT (DENGAN VERSION CONTROL) =================
function getSiteKey(reg) { return SITE_ID + "_" + reg; }

function resolveVisitorByReg(reg) {
    var regText = String(reg || "").trim();
    if (!regText) return { siteKey: "", visitor: null };
    
    var preferredKey = getSiteKey(regText);
    if (visitors[preferredKey]) return { siteKey: preferredKey, visitor: visitors[preferredKey] };
    
    for (var key in visitors) {
        if (visitors.hasOwnProperty(key) && visitors[key].reg === regText) {
            return { siteKey: key, visitor: visitors[key] };
        }
    }
    
    return { siteKey: "", visitor: null };
}

function saveVisitor(siteKey, data, reg, sourceAction) {
    var mutationId = data.mutationId || createMutationId("visitor");
    var fingerprint = generateRequestFingerprint({ mutationId: mutationId, reg: reg });
    
    // Check duplicate
    if (isDuplicateMutation(mutationId) || isDuplicateRequest(fingerprint)) {
        structuredLog("DUPLICATE_VISITOR_REJECTED", { mutationId: mutationId, reg: reg });
        return false;
    }
    
    // Check replay window
    var eventTs = getEventTimestamp();
    if (!validateReplayWindow(eventTs)) {
        structuredLog("STALE_VISITOR_REJECTED", { mutationId: mutationId, reg: reg });
        return false;
    }
    
    // Check debounce
    if (isMutationTooFast(reg)) {
        structuredLog("DEBOUNCE_VISITOR_REJECTED", { mutationId: mutationId, reg: reg });
        return false;
    }
    
    var current = visitors[siteKey] || null;
    var incomingVersion = (current && current.version ? current.version : 0) + 1;
    
    // Version conflict resolution
    if (current && data.version && data.version < current.version) {
        structuredLog("VERSION_CONFLICT_VISITOR", { current: current.version, incoming: data.version, reg: reg });
        return false;
    }
    
    visitors[siteKey] = {
        reg: reg,
        site: SITE_ID,
        version: incomingVersion,
        updatedAt: eventTs,
        updatedAtWIB: getWIBISO(eventTs),
        mutationId: mutationId,
        mutationSource: getMutationSource(),
        requestFingerprint: fingerprint,
        sourceAction: normalizeAction(sourceAction),
        nama: data.nama,
        perusahaan: data.perusahaan,
        kategori: data.kategori,
        tujuan: data.tujuan,
        pic: data.pic,
        dept: data.dept,
        startDate: data.startDate,
        expDate: data.expDate,
        badgeMode: data.badgeMode,
        foto: data.foto || "",
        sessions: data.sessions || [],
        currentStatus: data.currentStatus || "OUT"
    };
    
    markMutationProcessed(mutationId, fingerprint);
    return visitors[siteKey];
}

function addLog(reg, action, eventData) {
    var resolved = resolveVisitorByReg(reg);
    var visitor = resolved.visitor;
    var eventTs = getEventTimestamp();
    var mutationId = createMutationId("log");
    var fingerprint = generateRequestFingerprint({ mutationId: mutationId, reg: reg });
    
    // Check duplicate
    if (isDuplicateMutation(mutationId) || isDuplicateRequest(fingerprint)) {
        structuredLog("DUPLICATE_LOG_REJECTED", { mutationId: mutationId, reg: reg });
        return null;
    }
    
    // Check replay window
    if (!validateReplayWindow(eventTs)) {
        structuredLog("STALE_LOG_REJECTED", { mutationId: mutationId, reg: reg });
        return null;
    }
    
    // Check debounce
    if (isMutationTooFast(reg)) {
        structuredLog("DEBOUNCE_LOG_REJECTED", { mutationId: mutationId, reg: reg });
        return null;
    }
    
    var logEntry = {
        reg: reg,
        name: visitor ? visitor.nama : reg,
        company: visitor ? visitor.perusahaan : "",
        category: visitor ? visitor.kategori : "UMUM",
        action: normalizeAction(action),
        time: eventTs,
        eventTs: eventTs,
        logTime: getWIBISO(eventTs),
        site: SITE_ID,
        deviceId: deviceId,
        mutationId: mutationId,
        mutationSource: getMutationSource(),
        requestFingerprint: fingerprint,
        version: (visitor ? (visitor.version || 0) + 1 : 1),
        timestamp: eventTs,
        ...eventData
    };
    
    logs.unshift(logEntry);
    if (logs.length > 2000) logs = logs.slice(0, 2000);
    
    markMutationProcessed(mutationId, fingerprint);
    return logEntry;
}

// ================= LICENSE =================
async function applyLicenseKey(key) {
    if (!key) {
        toast("Masukkan license key", "error");
        return;
    }
    
    toast("Memvalidasi license...", "info");
    
    try {
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 10000);
        
        var url = GAS_URL + "?action=validateLicense&licenseKey=" + encodeURIComponent(key) + "&deviceId=" + encodeURIComponent(deviceId);
        var res = await fetch(url, { method: "GET", signal: controller.signal });
        
        clearTimeout(timeout);
        
        if (res.ok) {
            var data = await res.json();
            if (data && data.ok === true) {
                LICENSE_MODE = data.package || "PRO";
                localStorage.setItem("vms_license", LICENSE_MODE);
                localStorage.setItem("vms_license_key", key);
                
                // Store license limits
                localStorage.setItem("vms_max_visitors", data.maxVisitors || 999999);
                localStorage.setItem("vms_max_devices", data.maxDevices || 10);
                localStorage.setItem("vms_max_scans_per_day", data.maxScansPerDay || 999999);
                
                var expiredMsg = data.expiredAt ? " (Exp: " + data.expiredAt + ")" : "";
                toast("✅ License valid: " + LICENSE_MODE + expiredMsg, "success");
                
                document.getElementById("licenseStatusBadge").innerText = LICENSE_MODE + " MODE";
                updateMonetizationUI();
                renderDashboard();
                
                // Pull data after activation
                await pullFromSheet();
                
                // Sync sites from backend
                if (typeof syncSitesFromBackend === 'function') {
                    await syncSitesFromBackend();
                }
            } else {
                var reason = data.reason || "License tidak valid";
                toast("❌ " + reason, "error");
            }
        } else {
            toast("Gagal memvalidasi license", "error");
        }
    } catch(e) {
        console.error("License error:", e);
        toast("Gagal memvalidasi license. Periksa koneksi.", "error");
    }
}

// ================= MONETIZATION =================
function getCurrentVisitorCount() {
    var count = 0;
    for (var key in visitors) {
        if (visitors.hasOwnProperty(key) && key.indexOf(SITE_ID + "_") === 0) count++;
    }
    return count;
}

function getCurrentScanCount() {
    var today = getWIBISO().slice(0, 10);
    var count = 0;
    for (var i = 0; i < logs.length; i++) {
        var l = logs[i];
        if (l.logTime && l.logTime.slice(0, 10) === today && (l.action === "CHECK_IN" || l.action === "CHECK_OUT")) {
            count++;
        }
    }
    return count;
}

function isDemo() { return LICENSE_MODE === "DEMO"; }
function isBasic() { return LICENSE_MODE === "BASIC"; }
function isPro() { return LICENSE_MODE === "PRO"; }

function canRegister() {
    if (isDemo()) {
        if (getCurrentVisitorCount() >= 5) {
            toast("DEMO LIMIT HABIS! Upgrade license", "error");
            return false;
        }
        return true;
    }
    if (isBasic()) {
        if (getCurrentVisitorCount() >= 150) {
            toast("LIMIT BASIC TERCAPAI! Upgrade ke PRO", "error");
            return false;
        }
        return true;
    }
    return true;
}

function canScan() {
    if (isDemo()) {
        if (getCurrentScanCount() >= 5) {
            toast("DEMO SCAN LIMIT HABIS! Upgrade license", "error");
            return false;
        }
        return true;
    }
    return true;
}

function updateMonetizationUI() {
    var visitorCount = getCurrentVisitorCount();
    var progressBar = document.getElementById("visitorProgressBar");
    var limitText = document.getElementById("visitorLimitText");
    var warningDiv = document.getElementById("visitorLimitWarning");
    
    if (!progressBar) return;
    
    if (isPro()) {
        limitText.innerHTML = visitorCount + " / Unlimited ✨";
        progressBar.style.width = "0%";
        warningDiv.innerHTML = "✅ PRO Mode - Unlimited akses";
    } else if (isBasic()) {
        var maxLimit = 150;
        var percent = (visitorCount / maxLimit) * 100;
        progressBar.style.width = Math.min(percent, 100) + "%";
        if (percent >= 90) progressBar.className = "progress-bar-fill critical";
        else if (percent >= 70) progressBar.className = "progress-bar-fill warning";
        else progressBar.className = "progress-bar-fill";
        limitText.innerHTML = visitorCount + " / " + maxLimit;
        if (percent >= 100) warningDiv.innerHTML = "🔴 LIMIT TERCAPAI! Upgrade ke PRO";
        else if (percent >= 90) warningDiv.innerHTML = "⚠️ KRITIS! Upgrade ke PRO!";
        else if (percent >= 70) warningDiv.innerHTML = "⚠️ Mendekati limit BASIC";
        else warningDiv.innerHTML = "📊 Sisa " + (maxLimit - visitorCount) + " slot";
    } else {
        var maxReg = 5;
        var maxScan = 5;
        var scanCount = getCurrentScanCount();
        var percent = (visitorCount / maxReg) * 100;
        progressBar.style.width = Math.min(percent, 100) + "%";
        if (percent >= 90) progressBar.className = "progress-bar-fill critical";
        else if (percent >= 70) progressBar.className = "progress-bar-fill warning";
        else progressBar.className = "progress-bar-fill";
        limitText.innerHTML = visitorCount + " / " + maxReg + " (" + scanCount + "/" + maxScan + " scan)";
        if (visitorCount >= maxReg || scanCount >= maxScan) warningDiv.innerHTML = "🔴 DEMO LIMIT HABIS! Upgrade license";
        else if (visitorCount >= maxReg * 0.8 || scanCount >= maxScan * 0.8) warningDiv.innerHTML = "⚠️ Demo hampir limit";
        else warningDiv.innerHTML = "Demo: " + (maxReg - visitorCount) + " register, " + (maxScan - scanCount) + " scan tersisa";
    }
    
    var generateBtn = document.getElementById("generateQRBtn");
    var walkinBtn = document.getElementById("walkinBtn");
    var startCamBtn = document.getElementById("startCamBtn");
    var manualProcessBtn = document.getElementById("manualProcess");
    
    if (generateBtn) generateBtn.disabled = !canRegister();
    if (walkinBtn) walkinBtn.disabled = !canRegister();
    if (startCamBtn) startCamBtn.disabled = !canScan();
    if (manualProcessBtn) manualProcessBtn.disabled = !canScan();
}

// ================= PDF BADGE (SAMA SEPERTI SEBELUMNYA) =================
async function ensureJsPDFReady() {
    if (window.jspdf) return true;
    return new Promise(function(resolve) {
        var maxAttempts = 100;
        var attempt = 0;
        var interval = setInterval(function() {
            if (window.jspdf) {
                clearInterval(interval);
                resolve(true);
            }
            if (attempt++ > maxAttempts) {
                clearInterval(interval);
                resolve(false);
            }
        }, 100);
    });
}

function cleanPdfText(value, fallback) {
    fallback = fallback || "-";
    var text = String(value === undefined || value === null || value === "" ? fallback : value);
    return text.replace(/\s+/g, " ").trim() || fallback;
}

function drawCorporateHeader(doc, title, subtitle, w, accentColor) {
    doc.setFillColor(accentColor[0], accentColor[1], accentColor[2]);
    doc.roundedRect(0, 0, w, 12, 2, 2, "F");
    doc.setTextColor(255, 255, 255);
    doc.setFont(undefined, "bold");
    doc.setFontSize(7.5);
    doc.text(cleanPdfText(title), w / 2, 5.2, { align: "center" });
    doc.setFont(undefined, "normal");
    doc.setFontSize(4.8);
    doc.text(cleanPdfText(subtitle), w / 2, 9.1, { align: "center" });
}

function drawCorporateFooter(doc, deviceIdValue, w, h) {
    doc.setFillColor(241, 245, 249);
    doc.rect(0, h - 7, w, 7, "F");
    doc.setTextColor(71, 85, 105);
    doc.setFont(undefined, "normal");
    doc.setFontSize(4.2);
    doc.text("Generated " + formatWIB(getEventTimestamp()), 3, h - 3.8);
    doc.text("Device " + cleanPdfText(deviceIdValue, "unknown"), w - 3, h - 3.8, { align: "right" });
}

async function downloadPDFStable(reg, data) {
    try {
        var ready = await ensureJsPDFReady();
        if (!ready) {
            toast("PDF engine gagal dimuat. Coba refresh.", "error");
            return false;
        }
        
        var jsPDFLib = window.jspdf;
        var badgeMode = String(data.badgeMode || "PORTRAIT").toUpperCase() === "LANDSCAPE" ? "LANDSCAPE" : "PORTRAIT";
        var badgeW = badgeMode === "LANDSCAPE" ? 86 : 54;
        var badgeH = badgeMode === "LANDSCAPE" ? 54 : 86;
        var doc = new jsPDFLib.jsPDF({
            orientation: badgeMode === "LANDSCAPE" ? "landscape" : "portrait",
            unit: "mm",
            format: [badgeW, badgeH]
        });
        
        var accentColor = [31, 78, 74];
        if (data.kategori === "VVIP") accentColor = [217, 119, 6];
        else if (data.kategori === "VIP") accentColor = [100, 116, 139];
        
        doc.setFillColor(248, 250, 252);
        doc.rect(0, 0, badgeW, badgeH, "F");
        drawCorporateHeader(doc, "VISITOR BADGE", cleanPdfText(data.perusahaan || "SAPAM MEDED"), badgeW, accentColor);
        
        doc.setDrawColor(accentColor[0], accentColor[1], accentColor[2]);
        doc.setLineWidth(0.5);
        doc.roundedRect(2, 2, badgeW - 4, badgeH - 4, 3, 3, "S");
        
        var qrPayload = await buildQR(reg, data);
        var qrBase64 = await (function() {
            return new Promise(function(resolve) {
                var canvas = document.createElement("canvas");
                QRCode.toCanvas(canvas, qrPayload, { width: 200, margin: 1 }, function(error) {
                    if (error) resolve(null);
                    else resolve(canvas.toDataURL("image/png"));
                });
            });
        })();
        
        if (data.foto && data.foto.startsWith("data:image")) {
            doc.setFillColor(255, 255, 255);
            doc.roundedRect(17, 13, 20, 20, 2, 2, "F");
            try { doc.addImage(data.foto, "JPEG", 18, 14, 18, 18); } catch(e) {}
        }
        
        var y = 37;
        doc.setTextColor(15, 23, 42);
        doc.setFont(undefined, "bold");
        var nameLines = doc.splitTextToSize(cleanPdfText(data.nama).toUpperCase(), 40);
        doc.text(nameLines.slice(0, 2), badgeW / 2, y, { align: "center" });
        y += (Math.min(nameLines.length, 2) * 8.5 * 0.36);
        
        doc.setFont(undefined, "normal");
        var companyLines = doc.splitTextToSize(cleanPdfText(data.perusahaan), 40);
        doc.text(companyLines.slice(0, 2), badgeW / 2, y + 1.5, { align: "center" });
        y += (Math.min(companyLines.length, 2) * 6.2 * 0.36);
        
        doc.text("PIC: " + cleanPdfText(data.pic), badgeW / 2, y + 1, { align: "center" });
        y += 5.8 * 0.36;
        
        doc.setTextColor(accentColor[0], accentColor[1], accentColor[2]);
        doc.setFont(undefined, "bold");
        doc.text(cleanPdfText(data.kategori), badgeW / 2, y + 1, { align: "center" });
        
        if (qrBase64) {
            try { doc.addImage(qrBase64, "PNG", 16, 55, 18, 18); } catch(e) {}
        }
        
        doc.setTextColor(71, 85, 105);
        doc.setFont(undefined, "normal");
        doc.setFontSize(5.2);
        doc.text("REG " + reg, badgeW / 2, 81, { align: "center" });
        
        doc.setTextColor(71, 85, 105);
        doc.setFont(undefined, "bold");
        doc.setFontSize(5);
        doc.text("Valid " + cleanPdfText(data.expDate, "-"), badgeW / 2, badgeH - 9, { align: "center" });
        drawCorporateFooter(doc, deviceId, badgeW, badgeH);
        
        var blob = doc.output("blob");
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "BADGE_" + reg + "_" + badgeMode + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
        
        toast("Badge ID " + reg + " berhasil diunduh", "success");
        return true;
    } catch(err) {
        console.error("PDF error:", err);
        toast("Terjadi error saat generate Badge ID", "error");
        return false;
    }
}

var scannerInstance = null;
var isScanning = false;
var currentCameraId = null;
var processingRegs = new Set();
var lastScanTime = {};
var isManualProcessing = false;
var CAMERA_PREF_KEY = "vms_camera_pref";

function resolveCameraPreference(cameras) {
    var preferred = localStorage.getItem(CAMERA_PREF_KEY) || "auto_back";
    var rememberedCameraId = localStorage.getItem("vms_last_camera_id");
    
    for (var i = 0; i < cameras.length; i++) {
        if (rememberedCameraId && cameras[i].id === rememberedCameraId) return cameras[i].id;
    }
    
    for (var j = 0; j < cameras.length; j++) {
        var label = cameras[j].label || "";
        if (preferred === "auto_back" && (/back|rear|belakang/i.test(label))) return cameras[j].id;
        if (preferred === "auto_front" && (/front|user|depan/i.test(label))) return cameras[j].id;
        if (preferred === "auto_external" && (/external|usb|virtual/i.test(label))) return cameras[j].id;
    }
    
    return cameras[0] ? cameras[0].id : null;
}

async function initScanner() {
    if (scannerInstance) {
        try { await scannerInstance.stop(); } catch(e) {}
        try { await scannerInstance.clear(); } catch(e) {}
        scannerInstance = null;
    }
    
    try {
        var cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
            toast("Tidak ada kamera terdeteksi", "error");
            return false;
        }
        currentCameraId = resolveCameraPreference(cameras);
        scannerInstance = new Html5Qrcode("cameraPreview");
        return true;
    } catch(err) {
        console.error("Init scanner error:", err);
        toast("Gagal inisialisasi kamera", "error");
        return false;
    }
}

async function startScanner() {
    if (isScanning) return;
    if (!scannerInstance) {
        var init = await initScanner();
        if (!init) return;
    }
    
    try {
        await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
            async function(decodedText) {
                if (!canScan()) return;
                if (processingRegs.has(decodedText)) return;
                await processScan(decodedText);
            },
            function(error) {
                if (error && !error.includes("No MultiFormat Readers")) {
                    console.log("Scan error:", error);
                }
            }
        );
        isScanning = true;
        if (currentCameraId) localStorage.setItem("vms_last_camera_id", currentCameraId);
        toast("Scanner siap", "success");
    } catch(err) {
        console.error("Start scanner error:", err);
        toast("Gagal start kamera", "error");
        isScanning = false;
    }
}

async function stopScanner() {
    if (scannerInstance && isScanning) {
        try { await scannerInstance.stop(); } catch(e) {}
        try { await scannerInstance.clear(); } catch(e) {}
    }
    isScanning = false;
}

async function cleanupScanner() {
    if (scannerInstance) {
        try { await scannerInstance.stop(); } catch(e) {}
        try { await scannerInstance.clear(); } catch(e) {}
        scannerInstance = null;
    }
    isScanning = false;
    var container = document.getElementById("cameraPreview");
    if (container) container.innerHTML = "";
}

async function processScan(qrText) {
    var modeSelect = document.getElementById("scanMode");
    var mode = modeSelect ? normalizeAction(modeSelect.value) : ACTION_TYPES.CHECK_IN;
    
    var payload = await parseQR(qrText);
    if (!payload) {
        toast("QR tidak valid", "error");
        return;
    }
    
    var reg = payload.reg;
    var now = getEventTimestamp();
    
    if (lastScanTime[reg] && now - lastScanTime[reg] < 1200) {
        toast("Scan terlalu cepat", "warning");
        return;
    }
    lastScanTime[reg] = now;
    
    if (processingRegs.has(reg)) {
        toast("Sedang diproses", "warning");
        return;
    }
    processingRegs.add(reg);
    
    try {
        var resolved = resolveVisitorByReg(reg);
        var siteKey = resolved.siteKey || getSiteKey(reg);
        var visitor = resolved.visitor;
        
        if (!visitor) {
            toast("Visitor " + reg + " tidak ditemukan", "error");
            return;
        }
        
        var exp = new Date(visitor.expDate);
        exp.setHours(23, 59, 59, 999);
        if (exp < new Date()) {
            toast("QR sudah expired", "error");
            return;
        }
        
        var mutationId = createMutationId(mode === "CHECK_IN" ? "checkin" : "checkout");
        var fingerprint = generateRequestFingerprint({ mutationId: mutationId, reg: reg });
        
        // Check duplicate before processing
        if (isDuplicateMutation(mutationId) || isDuplicateRequest(fingerprint)) {
            toast("Data sudah diproses sebelumnya", "warning");
            return;
        }
        
        // Check replay window
        if (!validateReplayWindow(now)) {
            toast("Event sudah terlalu lama", "error");
            return;
        }
        
        var eventTs = getEventTimestamp();
        
        if (mode === "CHECK_IN") {
            if (!visitor.sessions) visitor.sessions = [];
            visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
            visitors[siteKey] = {
                ...visitor,
                currentStatus: "IN",
                lastScanSite: SITE_ID,
                updatedAt: eventTs,
                updatedAtWIB: getWIBISO(eventTs),
                mutationId: mutationId,
                mutationSource: getMutationSource(),
                requestFingerprint: fingerprint,
                version: (visitor.version || 0) + 1
            };
            var scanLog = addLog(reg, "CHECK_IN", { mutationId: mutationId, requestFingerprint: fingerprint });
            if (scanLog) {
                await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
                toast("CHECK-IN " + visitor.nama + " berhasil", "success");
                markMutationProcessed(mutationId, fingerprint);
            }
        } else {
            if (!visitor.sessions) visitor.sessions = [];
            var openSession = null;
            for (var i = visitor.sessions.length - 1; i >= 0; i--) {
                if (!visitor.sessions[i].checkOut) {
                    openSession = visitor.sessions[i];
                    break;
                }
            }
            if (!openSession) {
                toast("Tidak ada sesi check-in aktif", "warning");
                visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: eventTs, checkOutWIB: getWIBISO(eventTs) });
            } else {
                openSession.checkOut = eventTs;
                openSession.checkOutWIB = getWIBISO(eventTs);
            }
            visitors[siteKey] = {
                ...visitor,
                currentStatus: "OUT",
                lastScanSite: SITE_ID,
                updatedAt: eventTs,
                updatedAtWIB: getWIBISO(eventTs),
                mutationId: mutationId,
                mutationSource: getMutationSource(),
                requestFingerprint: fingerprint,
                version: (visitor.version || 0) + 1
            };
            var checkoutLog = addLog(reg, "CHECK_OUT", { mutationId: mutationId, requestFingerprint: fingerprint });
            if (checkoutLog) {
                await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [checkoutLog] });
                toast("CHECK-OUT " + visitor.nama + " berhasil", "success");
                markMutationProcessed(mutationId, fingerprint);
            }
        }
        
        saveToLocal();
        renderDashboard();
        renderLogTable();
        updateMonetizationUI();
        
    } finally {
        processingRegs.delete(reg);
    }
}

async function registerVisitor(data, isWalkin) {
    var reg = generateReg();
    var siteKey = getSiteKey(reg);
    var eventTs = getEventTimestamp();
    var action = isWalkin ? "WALK_IN" : "REGISTER";
    var mutationId = createMutationId(isWalkin ? "walkin" : "register");
    var fingerprint = generateRequestFingerprint({ mutationId: mutationId, reg: reg });
    
    // Check duplicate
    if (isDuplicateMutation(mutationId) || isDuplicateRequest(fingerprint)) {
        toast("Duplicate request detected", "warning");
        return null;
    }
    
    // Check replay window
    if (!validateReplayWindow(eventTs)) {
        toast("Invalid timestamp", "error");
        return null;
    }
    
    // Check debounce
    if (isMutationTooFast(reg)) {
        toast("Too many requests, please wait", "warning");
        return null;
    }
    
    var visitorData = {
        nama: data.nama,
        perusahaan: data.perusahaan,
        kategori: data.kategori,
        tujuan: data.tujuan,
        pic: data.pic,
        dept: data.dept,
        startDate: data.startDate,
        expDate: data.expDate,
        badgeMode: data.badgeMode,
        foto: data.foto || "",
        sessions: [],
        currentStatus: "OUT",
        version: 1,
        mutationId: mutationId,
        requestFingerprint: fingerprint
    };
    
    var saved = saveVisitor(siteKey, visitorData, reg, action);
    if (!saved) {
        toast("Gagal menyimpan data", "error");
        return null;
    }
    
    var logEntry = addLog(reg, action, { mutationId: mutationId, requestFingerprint: fingerprint });
    
    await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [logEntry] });
    saveToLocal();
    
    return { reg: reg, visitor: visitors[siteKey] };
}

// ================= USER AUTH =================
async function sha256(str) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    var bytes = new Uint8Array(buf);
    var result = "";
    for (var i = 0; i < bytes.length; i++) {
        result += bytes[i].toString(16).padStart(2, "0");
    }
    return result;
}

async function ensureDefaultAdmin() {
    var usersRaw = localStorage.getItem("vms_users");
    var users = usersRaw ? JSON.parse(usersRaw) : [];
    if (users.length === 0) {
        var adminPass = await sha256("123456");
        users = [{
            username: "admin",
            password: adminPass,
            role: "SUPER_ADMIN"
        }];
        localStorage.setItem("vms_users", JSON.stringify(users));
    }
    return users;
}

async function localLogin(username, password) {
    await ensureDefaultAdmin();
    var usersRaw = localStorage.getItem("vms_users");
    var users = usersRaw ? JSON.parse(usersRaw) : [];
    var passwordHash = await sha256(password);
    
    for (var i = 0; i < users.length; i++) {
        if (users[i].username === username && users[i].password === passwordHash) {
            localStorage.setItem("vms_user", JSON.stringify({ username: username, role: users[i].role }));
            localStorage.setItem("vms_role", users[i].role);
            return { success: true, role: users[i].role };
        }
    }
    return { success: false, error: "Invalid username or password" };
}

async function hybridLogin(username, password) {
    if (!username || !password) {
        toast("Username dan password wajib diisi", "warning");

    if (result.success) {

}

function setSite(site) {
    if (!site || site.trim() === "") return;
    SITE_ID = site.trim().toUpperCase();
    localStorage.setItem("vms_site", SITE_ID);
    renderSiteSelectors();
    toast("Site aktif: " + SITE_ID, "success");
    renderDashboard();
    renderLogTable();
    updateMonetizationUI();
}

function renderSiteSelectors() {
    var dynamicSites = [];
    try {
        var saved = localStorage.getItem("vms_dynamic_sites");
        if (saved) dynamicSites = JSON.parse(saved);
    } catch(e) {}
    
    var defaultSites = ["SITE_A", "SITE_B", "SITE_C"];
    var allSites = [...new Set([...defaultSites, ...dynamicSites, SITE_ID])];
    
    var selectors = document.querySelectorAll("#siteSelector, #siteSelectorTop");
    for (var i = 0; i < selectors.length; i++) {
        var sel = selectors[i];
        if (!sel) continue;
        var previous = SITE_ID || sel.value || "SITE_A";
        sel.innerHTML = "";
        
        for (var j = 0; j < allSites.length; j++) {
            var site = allSites[j];
            var opt = document.createElement("option");
            opt.value = site;
            var icon = site === "SITE_A" ? "🏭" : (site === "SITE_B" ? "🏢" : (site === "SITE_C" ? "🏬" : "🌐"));
            opt.text = icon + " " + site;
            sel.appendChild(opt);
        }
        
        var addOpt = document.createElement("option");
        addOpt.value = "__ADD_SITE__";
        addOpt.text = "➕ Tambah Site Baru...";
        sel.appendChild(addOpt);
        
        sel.value = allSites.indexOf(previous) >= 0 ? previous : "SITE_A";
    }
}

function handleSiteSelectorChange(e) {
    var selected = e.target.value;
    
    if (selected === "__ADD_SITE__") {
        var newSiteId = prompt("Masukkan ID Site baru (contoh: SITE_D):", "");
        if (newSiteId && newSiteId.trim()) {
            var newSiteName = prompt("Masukkan Nama Site (contoh: 🏬 SITE D):", newSiteId);
            if (newSiteName && newSiteName.trim()) {
                addNewSiteToBackend(newSiteId.trim().toUpperCase(), newSiteName.trim());
            }
        }
        renderSiteSelectors();
        return;
    }
    
    setSite(selected);
}

async function addNewSiteToBackend(siteId, siteName) {
    var licenseKey = localStorage.getItem("vms_license_key") || "";
    if (!licenseKey) {
        toast("License key required to add site", "error");
        return;
    }
    
    toast("Menambahkan site...", "info");
    
    try {
        var url = GAS_URL + "?action=addSite&licenseKey=" + encodeURIComponent(licenseKey) + 
                  "&siteId=" + encodeURIComponent(siteId) + "&siteName=" + encodeURIComponent(siteName);
        var res = await fetch(url);
        var data = await res.json();
        
        if (data.ok) {
            var dynamicSites = [];
            try {
                var saved = localStorage.getItem("vms_dynamic_sites");
                if (saved) dynamicSites = JSON.parse(saved);
            } catch(e) {}
            
            if (dynamicSites.indexOf(siteId) === -1) {
                dynamicSites.push(siteId);
                localStorage.setItem("vms_dynamic_sites", JSON.stringify(dynamicSites));
            }
            
            toast("Site " + siteId + " berhasil ditambahkan!", "success");
            renderSiteSelectors();
        } else {
            toast(data.error || "Gagal menambah site", "error");
        }
    } catch(e) {
        console.error("Add site error:", e);
        toast("Gagal terhubung ke server", "error");
    }
}

async function syncSitesFromBackend() {
    var licenseKey = localStorage.getItem("vms_license_key") || "";
    if (!licenseKey) return;
    
    try {
        var url = GAS_URL + "?action=getSites&licenseKey=" + encodeURIComponent(licenseKey);
        var res = await fetch(url);
        var data = await res.json();
        
        if (data.ok && data.sites) {
            var dynamicSites = [];
            for (var i = 0; i < data.sites.length; i++) {
                var site = data.sites[i];
                if (site.id !== "SITE_A" && site.id !== "SITE_B" && site.id !== "SITE_C") {
                    dynamicSites.push(site.id);
                }
            }
            localStorage.setItem("vms_dynamic_sites", JSON.stringify(dynamicSites));
            renderSiteSelectors();
        }
    } catch(e) {
        console.warn("Sync sites failed:", e);
    }
}

function switchTab(tabId) {
    var panes = {
        dashboard: document.getElementById("dashboardPane"),
        register: document.getElementById("registerPane"),
        scanner: document.getElementById("scannerPane"),
        logs: document.getElementById("logsPane")
    };
    
    for (var id in panes) {
        if (panes[id]) panes[id].classList.remove("active-pane");
    }
    if (panes[tabId]) panes[tabId].classList.add("active-pane");
    
    var navs = document.querySelectorAll(".nav-item");
    for (var i = 0; i < navs.length; i++) {
        if (navs[i].dataset && navs[i].dataset.tab === tabId) navs[i].classList.add("active");
        else navs[i].classList.remove("active");
    }
    
    var mobileNavs = document.querySelectorAll(".mobile-nav");
    for (var j = 0; j < mobileNavs.length; j++) {
        if (mobileNavs[j].dataset && mobileNavs[j].dataset.tab === tabId) mobileNavs[j].classList.add("active");
        else mobileNavs[j].classList.remove("active");
    }
}

// ================= EXPORT EXCEL =================
function exportToExcel() {
    if (isDemo()) {
        toast("Export tidak tersedia di DEMO mode", "error");
        return;
    }
    
    if (!window.XLSX) {
        toast("Excel engine belum siap", "error");
        return;
    }
    
    try {
        var dataForExcel = [];
        for (var key in visitors) {
            if (!visitors.hasOwnProperty(key)) continue;
            if (key.indexOf(SITE_ID + "_") !== 0) continue;
            
            var visitor = visitors[key];
            var reg = key.replace(SITE_ID + "_", "");
            var now = new Date();
            var expDate = visitor.expDate ? new Date(visitor.expDate) : null;
            
            var masaBerlakuStatus = "";
            var keterangan = "";
            
            if (expDate) {
                if (expDate < now) {
                    masaBerlakuStatus = "EXPIRED";
                    keterangan = "QR Code sudah kadaluarsa";
                } else {
                    var daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                    masaBerlakuStatus = "AKTIF (sisa " + daysLeft + " hari)";
                    keterangan = "Berlaku hingga " + visitor.expDate;
                }
            } else {
                masaBerlakuStatus = "TIDAK DITENTUKAN";
                keterangan = "Tanggal kadaluarsa tidak diisi";
            }
            
            if (visitor.sessions && visitor.sessions.length > 0) {
                for (var s = 0; s < visitor.sessions.length; s++) {
                    var session = visitor.sessions[s];
                    var checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                    var checkOutDate = session.checkOut ? new Date(session.checkOut) : null;
                    
                    var formatDateTime = function(date) {
                        if (!date) return "-";
                        var y = date.getFullYear();
                        var m = String(date.getMonth() + 1).padStart(2, "0");
                        var d = String(date.getDate()).padStart(2, "0");
                        var h = String(date.getHours()).padStart(2, "0");
                        var mi = String(date.getMinutes()).padStart(2, "0");
                        var se = String(date.getSeconds()).padStart(2, "0");
                        return y + "-" + m + "-" + d + " " + h + ":" + mi + ":" + se;
                    };
                    
                    var durationText = "-";
                    var statusText = "IN PROGRESS";
                    
                    if (session.checkIn && session.checkOut) {
                        var durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000);
                        durationText = durationMinutes.toString();
                        statusText = "COMPLETED";
                    } else if (session.checkIn && !session.checkOut) {
                        durationText = "IN PROGRESS";
                        statusText = "IN PROGRESS";
                    }
                    
                    dataForExcel.push({
                        "Nama": visitor.nama || "-",
                        "No. Registrasi": reg,
                        "Perusahaan": visitor.perusahaan || "-",
                        "Kategori": visitor.kategori || "UMUM",
                        "Tujuan": visitor.tujuan || "-",
                        "PIC": visitor.pic || "-",
                        "Departemen": visitor.dept || "-",
                        "Sesi Ke": s + 1,
                        "Check-In": formatDateTime(checkInDate),
                        "Check-Out": formatDateTime(checkOutDate),
                        "Durasi (menit)": durationText,
                        "Status Sesi": statusText,
                        "Masa Berlaku QR": masaBerlakuStatus,
                        "Tanggal Kadaluarsa": visitor.expDate || "-",
                        "Keterangan": keterangan
                    });
                }
            } else {
                dataForExcel.push({
                    "Nama": visitor.nama || "-",
                    "No. Registrasi": reg,
                    "Perusahaan": visitor.perusahaan || "-",
                    "Kategori": visitor.kategori || "UMUM",
                    "Tujuan": visitor.tujuan || "-",
                    "PIC": visitor.pic || "-",
                    "Departemen": visitor.dept || "-",
                    "Sesi Ke": "-",
                    "Check-In": "-",
                    "Check-Out": "-",
                    "Durasi (menit)": "-",
                    "Status Sesi": "TERDAFTAR",
                    "Masa Berlaku QR": masaBerlakuStatus,
                    "Tanggal Kadaluarsa": visitor.expDate || "-",
                    "Keterangan": keterangan
                });
            }
        }
        
        dataForExcel.sort(function(a, b) { return (a["Nama"] || "").localeCompare(b["Nama"] || ""); });
        var ws = XLSX.utils.json_to_sheet(dataForExcel);
        ws["!cols"] = [{wch:25},{wch:18},{wch:20},{wch:12},{wch:20},{wch:15},{wch:15},{wch:8},{wch:20},{wch:20},{wch:15},{wch:18},{wch:18},{wch:18},{wch:35}];
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
        XLSX.writeFile(wb, "VMS_Report_" + new Date().toISOString().slice(0, 19).replace(/:/g, "-") + ".xlsx");
        toast("Excel berhasil di export", "success");
    } catch(err) {
        console.error("Export error:", err);
        toast("Export gagal: " + err.message, "error");
    }
}

    document.getElementById("uploadQrBtn").onclick = function() {

    };
    
    document.getElementById("uploadQrFile").onchange = async function(e) {
        if (!canScan()) return;
        var file = e.target.files[0];
        if (!file) return;
        
        try {
            if (!window.Html5Qrcode) {
                toast("QR engine belum siap", "error");
                return;
            }
            var url = URL.createObjectURL(file);
            var img = new Image();
            img.src = url;
            await new Promise(function(resolve) { img.onload = resolve; });
            URL.revokeObjectURL(url);
            var canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext("2d").drawImage(img, 0, 0);
            var scanner = new Html5Qrcode("temp-reader");
            var decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
            await processScan(decoded);
            await scanner.clear();
            document.getElementById("temp-reader").innerHTML = "";
        } catch(err) {
            console.error(err);
            toast("QR tidak terbaca", "error");
        }
    };
    
    document.getElementById("manualProcess").onclick = async function() {
        if (!canScan()) return;
        if (isManualProcessing) {
            toast("Sedang diproses", "warning");
            return;
        }
        isManualProcessing = true;
        
        try {
            var reg = document.getElementById("manualReg").value.trim();
            if (!reg) {
                toast("Masukkan REG number", "error");
                return;
            }
            
            var modeSelect = document.getElementById("scanMode");
            var mode = modeSelect ? normalizeAction(modeSelect.value) : ACTION_TYPES.CHECK_IN;
            var resolved = resolveVisitorByReg(reg);
            var siteKey = resolved.siteKey || getSiteKey(reg);
            var visitor = resolved.visitor;
            
            if (!visitor) {
                toast("Visitor " + reg + " tidak ditemukan", "error");
                return;
            }
            
            var exp = new Date(visitor.expDate);
            exp.setHours(23, 59, 59, 999);
            if (exp < new Date()) {
                toast("QR sudah expired", "error");
                return;
            }
            
            var mutationId = createMutationId(mode === "CHECK_IN" ? "manual_checkin" : "manual_checkout");
            var fingerprint = generateRequestFingerprint({ mutationId: mutationId, reg: reg });
            
            if (isDuplicateMutation(mutationId) || isDuplicateRequest(fingerprint)) {
                toast("Data sudah diproses sebelumnya", "warning");
                return;
            }
            
            if (!validateReplayWindow(getEventTimestamp())) {
                toast("Invalid timestamp", "error");
                return;
            }
            
            var eventTs = getEventTimestamp();
            
            if (mode === "CHECK_IN") {
                if (!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
                visitors[siteKey] = {
                    ...visitor,
                    currentStatus: "IN",
                    lastScanSite: SITE_ID,
                    updatedAt: eventTs,
                    updatedAtWIB: getWIBISO(eventTs),
                    mutationId: mutationId,
                    mutationSource: getMutationSource(),
                    requestFingerprint: fingerprint,
                    version: (visitor.version || 0) + 1
                };
                var scanLog = addLog(reg, "CHECK_IN", { mutationId: mutationId, requestFingerprint: fingerprint });
                if (scanLog) {
                    await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [scanLog] });
                    toast("Check-in " + visitor.nama + " success", "success");
                    markMutationProcessed(mutationId, fingerprint);
                }
            } else {
                if (!visitor.sessions) visitor.sessions = [];
                var openSession = null;
                for (var i = visitor.sessions.length - 1; i >= 0; i--) {
                    if (!visitor.sessions[i].checkOut) {
                        openSession = visitor.sessions[i];
                        break;
                    }
                }
                if (!openSession) {
                    toast("Tidak ada sesi check-in aktif", "warning");
                    visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: eventTs, checkOutWIB: getWIBISO(eventTs) });
                } else {
                    openSession.checkOut = eventTs;
                    openSession.checkOutWIB = getWIBISO(eventTs);
                }
                visitors[siteKey] = {
                    ...visitor,
                    currentStatus: "OUT",
                    lastScanSite: SITE_ID,
                    updatedAt: eventTs,
                    updatedAtWIB: getWIBISO(eventTs),
                    mutationId: mutationId,
                    mutationSource: getMutationSource(),
                    requestFingerprint: fingerprint,
                    version: (visitor.version || 0) + 1
                };
                var checkoutLog = addLog(reg, "CHECK_OUT", { mutationId: mutationId, requestFingerprint: fingerprint });
                if (checkoutLog) {
                    await syncToSheet({ visitors: { [siteKey]: visitors[siteKey] }, logs: [checkoutLog] });
                    toast("Check-out " + visitor.nama + " success", "success");
                    markMutationProcessed(mutationId, fingerprint);
                }
            }
            
            saveToLocal();
            renderDashboard();
            renderLogTable();
            updateMonetizationUI();
        } finally {
            isManualProcessing = false;
        }
    };

    setInterval(async function() {
        if (navigator.onLine) {
            await processSyncQueue();
            await pullFromSheet();
        }

    if (navigator.onLine) {
        await pullFromSheet();

    if (typeof syncSitesFromBackend === 'function') {
        await syncSitesFromBackend();
    }
    
    renderDashboard();
    renderLogTable();

    toast("VMS Ready - Mode: " + LICENSE_MODE, "success");
});
