function buildTargetedCentralPayload(options = {}){
    const base = buildPayload();
    const visitorKeys = Array.isArray(options.visitorKeys) ? options.visitorKeys.filter(Boolean) : [];
    if(visitorKeys.length){
        base.visitors = {};
        visitorKeys.forEach(key => { if((window.visitors || {})[key]) base.visitors[key] = (window.visitors || {})[key]; });
    }
    if(options.includeLogs){
        const regs = new Set(visitorKeys.map(key => String(key).split("_").slice(1).join("_")).filter(Boolean));
        base.logs = (window.logs || []).filter(log => !regs.size || regs.has(log.reg)).slice(0, 100);
    } else if(visitorKeys.length) {
        base.logs = [];
    }
    return normalizeSavePayload(base);
}
async function forceCentralSync(reason, options = {}){
    const payload = buildTargetedCentralPayload(options);
    if(!payload.licenseKey || ((!payload.visitors || !Object.keys(payload.visitors).length) && (!payload.logs || !payload.logs.length))) return false;
    if(!navigator.onLine){
        pendingSyncPayload = payload;
        await persistPendingSyncPayloadAtomic(payload);
        logSyncMetric("VISITOR_PUSH_QUEUED", { reason, visitors:Object.keys(payload.visitors || {}).length, logs:(payload.logs || []).length });
        updateVisitorSyncBadge();
        return false;
    }
    try{
        const pushed = await saveToCloudSafe(payload);
        if(pushed){
            logSyncMetric("VISITOR_PUSH_SUCCESS", { reason, visitors:Object.keys(payload.visitors || {}).length, logs:(payload.logs || []).length });
            await ensureInitialCloudHydration("post-" + reason);
            return true;
        }
        pendingSyncPayload = payload;
        await persistPendingSyncPayloadAtomic(payload);
        logSyncMetric("VISITOR_PUSH_QUEUED", { reason, visitors:Object.keys(payload.visitors || {}).length, logs:(payload.logs || []).length });
        updateVisitorSyncBadge();

    }catch(e){

async function ensureInitialCloudHydration(reason = "startup"){

async function requestPullFromCloud(reason="normal", options = {}){
    const leaderId = localStorage.getItem("vms_device_id") || "unknown";
    const licenseKey = localStorage.getItem("vms_license_key") || "";
    if(licenseKey && navigator.onLine){
        try{
            const leaseRes = await fetch(`${WORKER_BASE_URL}/hydration-lease`, { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ licenseKey, owner:leaderId, ttlMs:15000 }) });
            const leaseData = await leaseRes.json().catch(()=>null);
            if(!leaseData?.acquired){ console.log("HYDRATION_ABORTED", { reason, owner: leaseData?.owner || "", updatedAt:getWIBISO() }); return false; }
        }catch{}
    }
    let lease = {};
    try { lease = JSON.parse(localStorage.getItem(HYDRATION_LEASE_KEY) || "{}"); } catch {}
    const nowTs = Date.now();
    if(lease.owner && lease.owner !== leaderId && Number(lease.expiresAt || 0) > nowTs){
        console.log("HYDRATION_ABORTED", { reason, owner: lease.owner, updatedAt:getWIBISO() });
        return false;
    }
    localStorage.setItem(HYDRATION_LEASE_KEY, JSON.stringify({ owner: leaderId, leaseTs: nowTs, expiresAt: nowTs + 15000 }));
    if(!isAuthoritativeOwner()) { postSyncMessage("SYNC_START", { reason }); return; }
    const now = Date.now();
    if(!options.forceFull && (now - Number(HYDRATION_MUTEX.lastRun || 0) < MIN_INTERVAL_HYDRATION_MS)) return pullPromise || false;
    if (pullPromise) {
        pendingPull = true;
        pendingPullOptions = { ...pendingPullOptions, forceFull: !!(pendingPullOptions.forceFull || options.forceFull) };
        console.log("HYDRATION_COORDINATOR_LOCK", { reason, owner: HYDRATION_MUTEX.owner || "pullPromise", updatedAt:getWIBISO() });
        return pullPromise;
    }
    const runOptions = { ...options };
    pullPromise = (async ()=>{
        try{
            HYDRATION_MUTEX.owner = reason;
            HYDRATION_MUTEX.lastRun = now;
            window.VMS_HYDRATION_STATE.active = true;
            window.VMS_HYDRATION_STATE.lastHydration = now;
            window.VMS_HYDRATION_STATE.coordinatorOwner = reason;
            console.log("HYDRATION_START", { reason, forceFull: !!runOptions.forceFull, updatedAt:getWIBISO() });
            lastPullStartTs = Date.now();
            await pullFromCloud(runOptions);
            window.VMS_HYDRATION_STATE.lastSuccess = Date.now();
            window.VMS_HYDRATION_STATE.failCount = 0;
        } finally {
            pullPromise = null;
            window.VMS_HYDRATION_STATE.active = false;
            HYDRATION_MUTEX.owner = null;
            let curLease = {};
            try { curLease = JSON.parse(localStorage.getItem(HYDRATION_LEASE_KEY) || "{}"); } catch {}
            if(curLease.owner === leaderId) localStorage.removeItem(HYDRATION_LEASE_KEY);
            console.log("HYDRATION_COORDINATOR_RELEASE", { reason, updatedAt:getWIBISO() });
            if(pendingPull){
                const queuedOptions = pendingPullOptions;
                pendingPull = false;
                pendingPullOptions = {};
                setTimeout(()=>requestPullFromCloud("queued", queuedOptions), 0);
            }
        }
    })();
    return pullPromise;
}






function checksumSimple(str){
    let h = 0;
    for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; }
    return String(h >>> 0);
}

async function sha256Hex(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function acquireLock(name){
    const now = Date.now();
    const ref = name === "pull" ? pullLock : (name === "save" ? saveLock : mergeLock);
    if(ref && (now - Number(ref.createdAt || now)) < Number(ref.timeoutMs || LOCK_TIMEOUT_MS)) return false;
    if(ref){
        console.warn("LOCK_STARVATION_RECOVERY", { module:"Sync Runtime", reason:"lock_timeout", entityId:name, action:"force_release" });
        if(__lastKnownGoodVisitors) window.visitors = cloneSafe(__lastKnownGoodVisitors);
        if(__lastKnownGoodLogs) markLogsReplaced(cloneSafe(__lastKnownGoodLogs));
    }
    const lock = { createdAt: now, timeoutMs: LOCK_TIMEOUT_MS };
    if(name === "pull") pullLock = lock; else if(name === "save") saveLock = lock; else mergeLock = lock;
    return true;
}
function releaseLock(name){
    if(name === "pull") pullLock = null; else if(name === "save") saveLock = null; else mergeLock = null;
}
function isLockActive(lock){
    if(!lock) return false;
    const now = Date.now();
    return (now - Number(lock.createdAt || now)) < Number(lock.timeoutMs || LOCK_TIMEOUT_MS);
}

function validateEntityMetadata(entity, type){
    if(!entity || typeof entity !== "object") return false;
    const v = Number(entity.version);
    const u = Number(entity.updatedAt);
    const e = Number(entity.eventTs || entity.time || entity.updatedAt || 0);
    const mutationId = String(entity.mutationId || entity.lastMutationId || entity.sequenceId || "");
    const mutationSource = String(entity.mutationSource || entity.deviceId || entity.source || "");
    if(type === "visitor") return Number.isFinite(v) && Number.isFinite(u) && Number.isFinite(e) && !!mutationId && !!mutationSource;
    if(type === "log"){
        const pAt = Number(entity.persistedAt || e || 0);
        return Number.isFinite(v) && Number.isFinite(u) && Number.isFinite(e) && Number.isFinite(pAt) && !!mutationId && !!mutationSource;
    }
    return false;
}

async function encodePendingSyncPayload(payload){
    const payloadVersion = 1;
    const raw = JSON.stringify(payload);
    return JSON.stringify({ payloadVersion, checksum: await sha256Hex(raw), raw });
}
async function decodePendingSyncPayload(rawEnvelope){
    const env = JSON.parse(rawEnvelope);
    if(!env || Number(env.payloadVersion)!==1 || typeof env.raw !== "string") return null;
    const expected = String(env.checksum||"");
    const strong = await sha256Hex(env.raw);
    if(strong !== expected && checksumSimple(env.raw) !== expected) return null;
    return JSON.parse(env.raw);
}

function getLogEventKey(log){
    if(!log || typeof log !== "object") return "";
    if(!log.sequenceId) return "";
    return String(log.sequenceId);
}

function compactVisitorSessions(visitor){
    if(!visitor || !Array.isArray(visitor.sessions)) return visitor;
    if(visitor.sessions.length <= 30) return visitor;
    visitor.sessions = visitor.sessions.sort((a,b)=>Number(b?.checkIn || 0) - Number(a?.checkIn || 0)).slice(0, 30);
    return visitor;
}

function validateSavePayload(payload){
    if(!payload || typeof payload !== "object") return { ok:false, reason:"payload_not_object" };
    if(!payload.licenseKey) return { ok:false, reason:"license_missing" };
    if(payload.logs && !Array.isArray(payload.logs)) return { ok:false, reason:"logs_not_array" };
    if(payload.visitors && (typeof payload.visitors !== "object" || Array.isArray(payload.visitors))) return { ok:false, reason:"visitors_not_object" };
    const visitorCount = Object.keys(payload.visitors || {}).length;
    const logCount = Array.isArray(payload.logs) ? payload.logs.length : 0;
    if(visitorCount + logCount <= 0) return { ok:false, reason:"empty_payload" };
    const malformedLog = (payload.logs || []).find(l => !l || typeof l !== "object" || !l.reg || !l.action || !validateEntityMetadata(l, "log"));
    if(malformedLog) return { ok:false, reason:"malformed_log" };
    if(payload.replayId && typeof payload.replayId !== "string") return { ok:false, reason:"corrupted_replay" };
    const malformedVisitor = Object.values(payload.visitors || {}).find(v => !validateEntityMetadata(v, "visitor"));
    if(malformedVisitor) return { ok:false, reason:"malformed_visitor_metadata" };
    try{
        const raw = JSON.stringify(payload);
        if(raw.length > 2_000_000) return { ok:false, reason:"payload_too_large" };
    }catch(_){ return { ok:false, reason:"payload_stringify_fail" }; }
    return { ok:true };
}

function getCachedLogFingerprintSet(){
    const logsRef = window.logs || [];
    if (__logFingerprintSet && __logFingerprintCacheRef === logsRef && __logFingerprintCacheSize === logsRef.length) {
        return __logFingerprintSet;
    }
    __logFingerprintCacheRef = logsRef;
    __logFingerprintCacheSize = logsRef.length;
    __logFingerprintSet = new Set(logsRef.map(getLogEventKey).filter(Boolean));
    return __logFingerprintSet;
}

function markLogsReplaced(nextLogs){
    window.logs = nextLogs;
    __logFingerprintCacheRef = null;
    __logFingerprintCacheSize = 0;
    __logFingerprintSet = null;
}

async function persistPendingSyncPayloadAtomic(payload){
    if(!isAuthoritativeOwner()) { postSyncMessage("PENDING_PAYLOAD_UPDATED", { pending: payload }); return; }
    const FINAL_KEY = "vms_pending_sync_payload";
    const TMP_KEY = "__tmp_pending_sync";
    try{
        const raw = await encodePendingSyncPayload(payload);
        localStorage.setItem(TMP_KEY, raw);
        try{
            localStorage.setItem(FINAL_KEY, raw);
        }catch(storageErr){
            console.warn("LOCALSTORAGE_QUOTA", {
                module:"Storage Runtime",
                reason:storageErr?.message || "quota_exceeded",
                action:"fallback_session_storage"
            });

            try{
                sessionStorage.setItem(FINAL_KEY, raw);
            }catch(sessionErr){
                console.warn("SESSIONSTORAGE_FAIL", {
                    module:"Storage Runtime",
                    reason:sessionErr?.message || "session_storage_failed",
                    action:"discard_pending_payload"
                });
            }
        }
        try{
            localStorage.removeItem(TMP_KEY);
        }catch(storageCleanupErr){

            console.warn("TMP_STORAGE_CLEANUP_FAIL", {
                module:"Storage Runtime",
                reason:storageCleanupErr?.message || "cleanup_failed",
                action:"ignore_cleanup_failure"
            });

        }
    }catch(e){
        console.warn("PENDING_PAYLOAD_PERSIST_FAIL", { module:"Storage Runtime", reason:e?.message||"persist_failed", action:"pending_payload_commit" });
    }
}

function filterPendingPayloadAgainstCurrent(next){
    if(!next || typeof next !== "object") return null;
    const currentVisitors = window.visitors || {};
    const currentLogs = window.logs || [];
    const filteredVisitors = {};
    Object.entries(next.visitors || {}).forEach(([k,v])=>{
        if(!k || !v || typeof v !== "object") return;
        const cur = currentVisitors[k] || null;
        if(!cur || shouldAcceptIncoming(cur, v)) filteredVisitors[k] = v;
    });
    const logSeen = getCachedLogFingerprintSet();
    const filteredLogs = (next.logs || []).filter(l=>{
        const k = getLogEventKey(l);
        return !!(l && l.reg && l.action && !logSeen.has(k));
    });
    if(!Object.keys(filteredVisitors).length && !filteredLogs.length) return null;
    return { ...next, visitors: filteredVisitors, logs: filteredLogs };
}

async function pullFromCloud(options = {}){
    if(!isAuthoritativeOwner()) return;
    const licenseKey = localStorage.getItem("vms_license_key");
    if(!licenseKey || !navigator.onLine) return;
    if(isPulling || isLockActive(pullLock) || isLockActive(mergeLock)) return;
    try{
        if(!acquireLock("pull")) return;
        isPulling = true;
        const forceFullVisitors = !!options.forceFull;
        const pullCursor = String(localStorage.getItem("vms_pull_cursor") || "");
        const pullSince = forceFullVisitors ? "" : (pullCursor || String(lastPullTs || ""));
        const fullVisitorsParam = forceFullVisitors ? "&fullVisitors=1" : "";
        const res = await fetch(WORKER_BASE_URL + `/pull-authoritative-state?licenseKey=${encodeURIComponent(licenseKey)}&since=${pullSince}&site=${encodeURIComponent(SITE_ID)}${fullVisitorsParam}`);
        if(!res.ok) return;
        const data = await res.json();
        const serverTs = Number(data?.serverTs || 0);
        lastPullTs = Math.max(lastPullTs, serverTs);
        const nextCursor = String(data?.nextCursor || "");
        if(nextCursor) localStorage.setItem("vms_pull_cursor", nextCursor);
        console.log("SYNC PULL", { since: lastPullTs, inLogs: (data?.logs || []).length });
        const incomingVisitors = data?.visitors || {};
        const incomingLogs = Array.isArray(data?.logs) ? data.logs : [];
        if(!acquireLock("merge")) return;
        try {
            const baseVisitors = (window.visitors && typeof window.visitors === "object") ? window.visitors : {};
            const baseLogs = Array.isArray(window.logs) ? window.logs : [];
            const nextVisitors = { ...baseVisitors };
            let nextLogs = baseLogs.slice();
            __lastKnownGoodVisitors = cloneSafe(baseVisitors);
            __lastKnownGoodLogs = cloneSafe(baseLogs);

            let hydrationMutation = "";
            Object.entries(incomingVisitors).forEach(([k,v]) => {
                if(!k || !v || typeof v !== "object") return;
                if(!(v.reg || k.includes("_"))) return;
                const local = nextVisitors[k];
                if(shouldAcceptIncoming(local, v)){
                    nextVisitors[k] = compactVisitorSessions({ ...local, ...v });
                    hydrationMutation = String(v?.mutationId || v?.lastMutationId || hydrationMutation || "");
                    console.log("AUTHORITATIVE_OVERRIDE", { key:k, mutationId:hydrationMutation, updatedAt:getWIBISO() });
                } else {
                    console.warn("STALE_CACHE_SKIPPED", { module:"Sync Runtime", reason:"incoming_older", entityId:k, localVersion:Number(local?.version||0), incomingVersion:Number(v?.version||0), persistedAt:Number(v?.persistedAt||0), action:"discard" });
                }
            });

            if(incomingLogs.length){
                const map = new Map(nextLogs.map(l => [getLogEventKey(l), l]).filter(([k])=>!!k));
                incomingLogs.forEach(l => {
                    const key = getLogEventKey(l);
                    if(!key){
                        console.warn("LOG_MERGE_REJECT", { module:"Sync Runtime", reason:"missing_sequence_or_persistedAt", entityId:"", localVersion:0, incomingVersion:Number(l?.version||0), persistedAt:Number(l?.persistedAt||0), action:"discard" });
                        return;
                    }
                    const existing = map.get(key);
                    if(!existing){
                        nextLogs.push(l);
                        map.set(key, l);
                    } else {
                        console.warn("LOG_MERGE_REJECT", { module:"Sync Runtime", reason:"append_only_existing", entityId:key, localVersion:Number(existing?.version||0), incomingVersion:Number(l?.version||0), persistedAt:Number(l?.persistedAt||0), action:"discard" });
                    }
                });
                nextLogs = nextLogs.sort((a,b)=>{
                    const diff = getLogSortTs(b)-getLogSortTs(a);
                    if(diff !== 0) return diff;
                    return String(b.sequenceId||"").localeCompare(String(a.sequenceId||""));
                }).slice(0, 2000);
            }

            const hydrationToken = beginHydrationCommit();
            if(!hydrationToken) { logSyncMetric("hydrationRollbacks", { reason:"mutation_in_progress" }); return; }
            window.visitors = nextVisitors;
            markLogsReplaced(nextLogs);
            window.VMS_HYDRATION_STATE.lastMutation = hydrationMutation || window.VMS_HYDRATION_STATE.lastMutation || "";
            logSyncMetric("hydrationCommits", { visitors:Object.keys(nextVisitors).length, logs:nextLogs.length });
            endHydrationCommit(hydrationToken);
            logsSortedDirty = false;
            console.log("AUTHORITATIVE_COMMIT", { module:"Sync Runtime", visitors:Object.keys(nextVisitors).length, logs:nextLogs.length, action:"atomic_replace" });
        } catch (mergeErr) {
            console.warn("SYNC_COMMIT_ROLLBACK", { module:"Sync Runtime", reason:mergeErr?.message||"merge_failed", action:"rollback" });
            if(__lastKnownGoodVisitors) window.visitors = cloneSafe(__lastKnownGoodVisitors);
            if(__lastKnownGoodLogs) markLogsReplaced(cloneSafe(__lastKnownGoodLogs));
        } finally {
            releaseLock("merge");
        }
        logSyncMetric("DEVICE_PULL_MERGED", { visitors: Object.keys(incomingVisitors).length, logs: incomingLogs.length, serverTs: lastPullTs });
        console.log("PULL MERGED", { visitors: Object.keys(incomingVisitors).length, logs: incomingLogs.length, serverTs: lastPullTs });
        hardPruneMemory();
        if(window.renderDashboard) window.renderDashboard();
        if(window.renderLogTable) window.renderLogTable();
        postSyncMessage("PULL_COMPLETED", { ts:lastPullTs });
    }catch(e){
        console.warn("pullFromCloud failed:", e.message);
        postSyncMessage("SYNC_DONE", { ok:false, reason:e?.message||"pull_failed" });
    } finally {
        isPulling = false;
        releaseLock("pull");
    }
}

// ================== SAFE SYNC ==================
async function saveToCloudSafe(payload){
    if(!isAuthoritativeOwner()) { postSyncMessage("SYNC_START", { reason:"save_request" }); return; }

    if(
    !payload ||
    (
        (!payload.visitors || Object.keys(payload.visitors).length === 0) &&
        (!payload.logs || payload.logs.length === 0)
    )
){
    return;
}

    if (!payload.licenseKey) return;

    if(isSyncing || !navigator.onLine || isLockActive(saveLock) || isLockActive(mergeLock)) {
        pendingSyncPayload = payload;

            if (appLayout) appLayout.style.display = "flex";
            if (!localStorage.getItem("vms_user")) {
                localStorage.setItem("vms_user", JSON.stringify({ username: "pro-user", role: "OPERATOR" }));
                localStorage.setItem("vms_role", "OPERATOR");
            }
            if (window.updateUserUI) window.updateUserUI();
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
            return true;
        }

        return false;
    };

    // ========== UI OVERRIDES ==========
    function overrideLoginButton() {
        const doLoginBtn = document.getElementById("doLoginBtn");
        if (doLoginBtn && !doLoginBtn._hybridOverridden) {
            doLoginBtn._hybridOverridden = true;
            doLoginBtn.onclick = async () => {
                const username = document.getElementById("loginUsername")?.value || "";
                const password = document.getElementById("loginPassword")?.value || "";
                const success = await window.hybridLogin(username, password);
                if (success) {
                    const loginOverlay = document.getElementById("loginOverlay");
                    const appLayout = document.getElementById("appLayout");
                    if (loginOverlay) loginOverlay.style.display = "none";
                    if (appLayout) appLayout.style.display = "flex";
                    if (window.renderDashboard) window.renderDashboard();
                    if (window.renderLogTable) window.renderLogTable();
                    if (window.updateUserUI) window.updateUserUI();
                }
            };
        }
    }

    function overrideLogoutButtons() {
        document.querySelectorAll("#logoutBtnTop, #logoutBtnSidebar").forEach(btn => {
            if (!btn._hybridOverridden) {
                btn._hybridOverridden = true;
                btn.onclick = () => window.hybridLogout();
            }
        });
    }

    // ========== STATUS INDICATOR ==========
    function addStatusIndicator() {
        const existing = document.getElementById("hybridStatusIndicator");
        if (existing) existing.remove();
        return;

        const indicator = document.createElement("div");
        indicator.id = "hybridStatusIndicator";
        indicator.style.cssText = `
            position: fixed; bottom: 10px; right: 10px; z-index: 9999;
            background: rgba(0,0,0,0.8); color: white; padding: 4px 12px;
            border-radius: 20px; font-size: 10px; font-family: monospace;
            pointer-events: none; backdrop-filter: blur(4px);
        `;
        document.body.appendChild(indicator);

        async function updateIndicator() {
            const mode = detectMode();
            await checkOnline();
            const icon = onlineStatus ? "🟢" : "🟡";
            const modeIcon = mode === "PRO" ? "🔴" : (mode === "BASIC" ? "🔵" : "🟠");
            indicator.innerHTML = `${icon} ${modeIcon} ${mode} | ${onlineStatus ? "ONLINE" : "OFFLINE"}`;
        }

        updateIndicator();
        setInterval(updateIndicator, 10000);
    }

    // ========== AUTO FORCE INIT ==========
    async function safeForceInit() {
        if (!onlineStatus) return;
        try {
            const res = await fetch(WORKER_BASE_URL + "/force-init", { method: "POST" });
            const data = await res.json();
            if (data.ok) console.log("Force init completed");
        } catch (e) {
            console.warn("Force init skipped:", e.message);
        }
    }

    // ========== ONLINE MONITOR ==========
    function monitorOnlineStatus() {
        window.addEventListener("online", async () => {
            await checkOnline();
            await syncUsersToServer();
            await window.hybridInitSession();
            showToast("🟢 Kembali ONLINE - Sinkronisasi data", "success");
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
        });

        window.addEventListener("offline", async () => {
            await checkOnline();
            showToast("🟡 MODE OFFLINE - Menggunakan data lokal", "warning");
        });
    }

    // ========== START ==========
    async function start() {
        if (window.__VMS_HYBRID_START_LOCK__) return;
        window.__VMS_HYBRID_START_LOCK__ = true;
        await ensureDefaultAdmin();
        await checkOnline();
        await safeForceInit();
        await syncUsersToServer();
        await window.hybridInitSession();

        addStatusIndicator();
        overrideLoginButton();
        overrideLogoutButtons();
        monitorOnlineStatus();

        setInterval(async () => {
            await checkOnline();
            if (onlineStatus) await syncUsersToServer();
        }, 30000);
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start);
    } else {
        start();
    }
})();
</script>

<script>
const SYNC_WORKER_BASE_URL = "https://vms3modev4.sapammeded.workers.dev";
const VMS_LEGACY_SYNC_QUEUE_KEY = "vms_legacy_sync_queue";
const VMS_LEGACY_SYNC_STATE = window.__VMS_LEGACY_SYNC_STATE__ || {
    syncing: false,
    failCount: 0,
    circuitOpenUntil: 0,
    lastOnlineAt: navigator.onLine ? Date.now() : 0
};
window.__VMS_LEGACY_SYNC_STATE__ = VMS_LEGACY_SYNC_STATE;

function loadLegacySyncQueue(){
    try { return JSON.parse(localStorage.getItem(VMS_LEGACY_SYNC_QUEUE_KEY) || "[]").filter(Boolean).slice(-25); }
    catch(_) { return []; }
}

function saveLegacySyncQueue(queue){
    try { localStorage.setItem(VMS_LEGACY_SYNC_QUEUE_KEY, JSON.stringify(queue.slice(-25))); }
    catch(e) { console.warn("LEGACY_SYNC_QUEUE_SAVE_FAIL", e?.message || e); }
}

function queueLegacySyncPayload(payload){
    if(!payload || !payload.deviceId) return;
    const queue = loadLegacySyncQueue();
    const hash = JSON.stringify(payload);
    if(queue.some(item => item.hash === hash)) return;
    queue.push({ payload, hash, queuedAt: Date.now(), retry: 0 });
    saveLegacySyncQueue(queue);
}

async function flushLegacySyncQueue(){
    if(VMS_LEGACY_SYNC_STATE.syncing || !navigator.onLine || Date.now() < VMS_LEGACY_SYNC_STATE.circuitOpenUntil) return;
    const queue = loadLegacySyncQueue();
    if(!queue.length) return;
    const item = queue.shift();
    saveLegacySyncQueue(queue);
    const ok = await syncToCloud(item.payload, { fromQueue:true, retry:Number(item.retry || 0) });
    if(!ok && Number(item.retry || 0) < 5){
        const nextQueue = loadLegacySyncQueue();
        nextQueue.push({ ...item, retry:Number(item.retry || 0) + 1, queuedAt:Date.now() });
        saveLegacySyncQueue(nextQueue);
    }
}

async function hardenedLegacyFetch(url, fetchOptions = {}, retryOptions = {}) {
    const retries = Number(retryOptions.retries || 3);
    const timeoutMs = Number(retryOptions.timeoutMs || 8000);
    const baseDelay = Number(retryOptions.baseDelayMs || 450);
    let lastErr = null;
    for (let attempt = 0; attempt <= retries; attempt++) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const res = await fetch(url, { ...fetchOptions, signal: controller.signal });
            if (res.ok) return res;
            if (res.status >= 400 && res.status < 500) return res;
            lastErr = new Error(`HTTP_${res.status}`);
        } catch (err) {
            lastErr = err;
            if (err?.name === 'AbortError') console.warn('FETCH_ABORT', { url, timeoutMs });
        } finally {
            clearTimeout(timeout);
        }
        if (attempt < retries) {
            const jitter = Math.floor(Math.random() * 180);
            await new Promise(resolve => setTimeout(resolve, (baseDelay * Math.pow(2, attempt)) + jitter));
        }
    }
    throw lastErr || new Error('FETCH_FAILED');
}

async function syncToCloud(payload, options = {}) {
    if (!payload || !payload.deviceId) return false;
    if (!payload.licenseKey) payload.licenseKey = localStorage.getItem("vms_license_key") || "";
    if (!payload.licenseKey || !navigator.onLine) { queueLegacySyncPayload(payload); return false; }
    if (Date.now() - Number(VMS_LEGACY_SYNC_STATE.lastOnlineAt || 0) < 3000 || Date.now() < VMS_LEGACY_SYNC_STATE.circuitOpenUntil || VMS_LEGACY_SYNC_STATE.syncing) {
        queueLegacySyncPayload(payload);
        return false;
    }

    const lastSync = localStorage.getItem("vms_last_sync");
    const currentHash = JSON.stringify(payload);
    if (!options.fromQueue && lastSync === currentHash) return true;

    VMS_LEGACY_SYNC_STATE.syncing = true;
    try {
        const res = await hardenedLegacyFetch(SYNC_WORKER_BASE_URL + "/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }, { retries: 2, timeoutMs: 8000, baseDelayMs: 500 });

        if (res.ok) {
            localStorage.setItem("vms_last_sync", currentHash);
            VMS_LEGACY_SYNC_STATE.failCount = 0;
            VMS_LEGACY_SYNC_STATE.circuitOpenUntil = 0;
            setTimeout(flushLegacySyncQueue, 500);
            return true;
        }
        if (res.status >= 400 && res.status < 500) return false;
        throw new Error(`SYNC_HTTP_${res.status}`);
    } catch (err) {
        VMS_LEGACY_SYNC_STATE.failCount++;
        if (VMS_LEGACY_SYNC_STATE.failCount >= 3) {
            VMS_LEGACY_SYNC_STATE.circuitOpenUntil = Date.now() + Math.min(60000, 10000 * VMS_LEGACY_SYNC_STATE.failCount);
            console.warn("CIRCUIT_BREAKER_OPEN", { until: VMS_LEGACY_SYNC_STATE.circuitOpenUntil, failCount: VMS_LEGACY_SYNC_STATE.failCount });
        }
        queueLegacySyncPayload(payload);
        return false;
    } finally {
        VMS_LEGACY_SYNC_STATE.syncing = false;
    }
}

window.addEventListener("online", () => {
    VMS_LEGACY_SYNC_STATE.lastOnlineAt = Date.now();
    clearTimeout(window.__vmsReconnectTimer);
    window.__vmsReconnectTimer = setTimeout(flushLegacySyncQueue, RECONNECT_DEBOUNCE_MS);
});
window.addEventListener("offline", () => {
    VMS_LEGACY_SYNC_STATE.circuitOpenUntil = Date.now() + 5000;
});
setInterval(flushLegacySyncQueue, 30000);

</script>
