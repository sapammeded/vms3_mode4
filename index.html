<!DOCTYPE html>
<html lang="id">
<head>

    <style>

        .mobile-header { display: none; background: #0f2c2c; padding: 16px 20px; color: white; align-items: center; justify-content: space-between; }
        .menu-toggle { background: none; border: none; font-size: 1.8rem; color: white; cursor: pointer; }
        .mobile-sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #0f2c2c; z-index: 200; transition: 0.2s; padding-top: 20px; }
        .mobile-sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 199; display: none; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 36px; }
        .stat-card { background: white; border-radius: 24px; padding: 22px 20px; border: 1px solid #e2edf2; }
        .stat-card h4 { font-size: 0.7rem; text-transform: uppercase; color: #5f7f7c; margin-bottom: 12px; }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #1f4e4a; }
        .form-card { background: white; border-radius: 28px; padding: 28px 30px; border: 1px solid #e7edf2; margin-bottom: 28px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px 32px; }
        .input-field { display: flex; flex-direction: column; gap: 6px; }
        .input-field label { font-size: 0.7rem; font-weight: 600; color: #2b5a55; text-transform: uppercase; }

        button { background: #1f4e4a; border: none; padding: 10px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1f4e4a; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .badge-VVIP { background: #fde68a; color: #92400e; }
        .badge-VIP { background: #e2e8f0; color: #334155; }
        .badge-UMUM { background: #d1fae5; color: #065f46; }
        .toast-msg { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 0.8rem; animation: fadeIn 0.2s; }
        .toast-msg.success { background: #1f4e4a; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card { background: white; width: 480px; max-width: 90%; border-radius: 32px; padding: 28px; }
        .qr-preview { width: 120px; margin: 16px auto; display: block; }
        .flex-btns { display: flex; gap: 12px; margin-top: 20px; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

<script>

// ================= DEVICE ID (WAJIB) =================
if(!localStorage.getItem("vms_device_id")){
localStorage.setItem("vms_device_id",
"dev_"+Date.now()+"_"+Math.random().toString(36).slice(2)
);
}

// ============================================================
// HARDENED LICENSE SYSTEM - HASH BASED (NO HARDCODE)
// ============================================================
let LICENSE_MODE = localStorage.getItem("vms_license") || "DEMO";
let WORKER_FEATURES = JSON.parse(localStorage.getItem("vms_worker_features") || "null");
let CURRENT_LICENSE = { mode: LICENSE_MODE, features: WORKER_FEATURES || {}, key: localStorage.getItem("vms_license_key") || "" };
window.CURRENT_LICENSE = CURRENT_LICENSE;
let currentUser = null;
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let lastScanTime = {};
const VMS_RUNTIME_VERSION = "1.0.13";
const ACTION_TYPES = Object.freeze({ CHECK_IN: "CHECK_IN", CHECK_OUT: "CHECK_OUT", REGISTER: "REGISTER", WALK_IN: "WALK_IN" });
const WIB_TIMEZONE = "Asia/Jakarta";
const REGISTER_LOCK = "REGISTER_LOCK";
const CHECKIN_LOCK = "CHECKIN_LOCK";
const CHECKOUT_LOCK = "CHECKOUT_LOCK";
const MUTATION_DEBOUNCE_MS = 1200;
const DUPLICATE_REJECTION_WINDOW_MS = 15000;
const BROWSER_ID = localStorage.getItem("vms_browser_id") || (()=>{ const id = `browser_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; localStorage.setItem("vms_browser_id", id); return id; })();
const HYDRATION_MODE = { active: false };
window.HYDRATION_MODE = HYDRATION_MODE;
window.VMS_ACTION_TYPES = ACTION_TYPES;

function getEventTimestamp(){ return Date.now(); }
// Backward-compatible alias only. Epoch timestamps are UTC/universal; WIB is applied only when formatting for UI/sheet/log text.
function getWIBTimestamp(){ return getEventTimestamp(); }
function getWIBISO(input = getEventTimestamp()){
    const d = input instanceof Date ? input : new Date(input);
    const parts = new Intl.DateTimeFormat("sv-SE", { timeZone: WIB_TIMEZONE, year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false }).formatToParts(d)
        .reduce((acc, part)=>{ if(part.type !== "literal") acc[part.type] = part.value; return acc; }, {});
    return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}+07:00`;
}
function getWIBDate(input = getEventTimestamp()){ return getWIBISO(input).slice(0,10); }
function formatWIB(input = getEventTimestamp(), options = {}){
    return new Intl.DateTimeFormat("id-ID", { timeZone: WIB_TIMEZONE, dateStyle: options.dateStyle || "medium", timeStyle: options.timeStyle || "medium" }).format(input instanceof Date ? input : new Date(input));
}
window.getEventTimestamp = getEventTimestamp;
window.getWIBTimestamp = getWIBTimestamp;
window.getWIBISO = getWIBISO;
window.getWIBDate = getWIBDate;
window.formatWIB = formatWIB;

function normalizeAction(action){
    const raw = String(action || "").trim().toUpperCase().replace(/[\s-]+/g, "_");
    if(["IN", "CHECKIN", "CHECK_IN"].includes(raw)) return ACTION_TYPES.CHECK_IN;
    if(["OUT", "CHECKOUT", "CHECK_OUT"].includes(raw)) return ACTION_TYPES.CHECK_OUT;
    if(["WALK_IN", "WALKIN", "WALK_IN_CEPAT"].includes(raw)) return ACTION_TYPES.WALK_IN;
    if(["REGISTER", "REGISTRATION"].includes(raw)) return ACTION_TYPES.REGISTER;
    console.warn("ACTION_NORMALIZATION_INVALID", { raw: action, updatedAt: getWIBISO() });
    return raw || "UNKNOWN";
}
window.normalizeAction = normalizeAction;

function safeParseJSON(raw, fallback = null){
    if(!raw) return fallback;
    try { return JSON.parse(raw); } catch(e) { return fallback; }
}

function normalizeLicenseMode(mode){
    const clean = String(mode || "DEMO").toUpperCase();
    return ["PRO", "BASIC", "DEMO"].includes(clean) ? clean : "DEMO";
}

function persistWorkerFeatures(features){
    if(!features || typeof features !== "object") return;
    WORKER_FEATURES = { ...(WORKER_FEATURES || {}), ...features };
    CURRENT_LICENSE.features = WORKER_FEATURES;
    try { localStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(e){}
    try { sessionStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(storageErr){
        console.warn("WORKER_FEATURE_SESSION_FAIL", {
            module:"Storage Runtime",
            reason:storageErr?.message || "session_storage_failed",
            action:"ignore_feature_cache"
        });
    }
}

function syncRuntimeLicenseContext(next = {}){
    const storedMode = next.mode || next.license || next.package || localStorage.getItem("vms_license") || sessionStorage.getItem("vms_license") || LICENSE_MODE;
    LICENSE_MODE = normalizeLicenseMode(storedMode);
    CURRENT_LICENSE.mode = LICENSE_MODE;
    CURRENT_LICENSE.key = next.key || localStorage.getItem("vms_license_key") || sessionStorage.getItem("vms_license_key") || CURRENT_LICENSE.key || "";
    try { localStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}
    try { sessionStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}

    const storedFeatures = next.features || safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
    if(storedFeatures) persistWorkerFeatures(storedFeatures);
    window.CURRENT_LICENSE = CURRENT_LICENSE;
    return CURRENT_LICENSE;
}

function getRuntimeFeatures(){
    if(!WORKER_FEATURES){
        const stored = safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
        if(stored) persistWorkerFeatures(stored);
    }
    return WORKER_FEATURES || CURRENT_LICENSE.features || {};
}

function canUseDynamicSites(){
    const features = getRuntimeFeatures();

    return (
        features?.allowSiteRename === true &&
        features?.staticSitesOnly !== true
    );
}

function getDefaultSites(){ return ["SITE_A", "SITE_B", "SITE_C"]; }
function getDynamicSites(){ return safeParseJSON(localStorage.getItem("vms_dynamic_sites"), []) || []; }

function buildSiteLabel(site){

function safeParseJSON(raw, fallback = null){
    if(!raw) return fallback;
    try { return JSON.parse(raw); } catch(e) { return fallback; }
}

function normalizeLicenseMode(mode){
    const clean = String(mode || "DEMO").toUpperCase();
    return ["PRO", "BASIC", "DEMO"].includes(clean) ? clean : "DEMO";
}

function persistWorkerFeatures(features){
    if(!features || typeof features !== "object") return;
    WORKER_FEATURES = { ...(WORKER_FEATURES || {}), ...features };
    CURRENT_LICENSE.features = WORKER_FEATURES;
    try { localStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(e){}
    try { sessionStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(storageErr){
        console.warn("WORKER_FEATURE_SESSION_FAIL", {
            module:"Storage Runtime",
            reason:storageErr?.message || "session_storage_failed",
            action:"ignore_feature_cache"
        });
    }
}

function syncRuntimeLicenseContext(next = {}){
    const storedMode = next.mode || next.license || next.package || localStorage.getItem("vms_license") || sessionStorage.getItem("vms_license") || LICENSE_MODE;
    LICENSE_MODE = normalizeLicenseMode(storedMode);
    CURRENT_LICENSE.mode = LICENSE_MODE;
    CURRENT_LICENSE.key = next.key || localStorage.getItem("vms_license_key") || sessionStorage.getItem("vms_license_key") || CURRENT_LICENSE.key || "";
    try { localStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}
    try { sessionStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}

    const storedFeatures = next.features || safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
    if(storedFeatures) persistWorkerFeatures(storedFeatures);
    window.CURRENT_LICENSE = CURRENT_LICENSE;
    return CURRENT_LICENSE;
}

function getRuntimeFeatures(){
    if(!WORKER_FEATURES){
        const stored = safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
        if(stored) persistWorkerFeatures(stored);
    }
    return WORKER_FEATURES || CURRENT_LICENSE.features || {};
}

let ANTI_NAKAL = {
    lastSite: localStorage.getItem("vms_last_site") || null,
    lastGPS: localStorage.getItem("vms_last_gps") || null,
    lastOnline: Date.now(),
    flags: []
};

function getGPS(){
    return new Promise((resolve) => {
        if(!navigator.geolocation){
            resolve(null);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });
            },
            function(error) {
                console.warn("GPS error (getGPS):", error.message);
                resolve(null);
            }
        );
    });
}

function distanceKM(a, b){
    if(!a || !b) return 0;

    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI/180;
    const dLon = (b.lon - a.lon) * Math.PI/180;

    const x =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(a.lat*Math.PI/180) *
        Math.cos(b.lat*Math.PI/180) *
        Math.sin(dLon/2)*Math.sin(dLon/2);

    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function runAntiNakalCheck(){

    const deviceId = localStorage.getItem("vms_device_id");
    const site = SITE_ID;
    const now = Date.now();

    // ======================
    // 1. SITE SWITCH DETECT
    // ======================
    if(ANTI_NAKAL.lastSite && ANTI_NAKAL.lastSite !== site){
        ANTI_NAKAL.flags.push({
            type: "SITE_JUMP",
            from: ANTI_NAKAL.lastSite,
            to: site,
            time: now
        });
    }

    ANTI_NAKAL.lastSite = site;
    localStorage.setItem("vms_last_site", site);

    // ======================
    // 2. GPS CHECK
    // ======================
    const gps = await getGPS();

    if(gps){
        if(ANTI_NAKAL.lastGPS){
            const dist = distanceKM(ANTI_NAKAL.lastGPS, gps);

            if(dist > 5){ // 🔥 radius 5km
                ANTI_NAKAL.flags.push({
                    type: "GPS_ANOMALY",
                    distance: dist.toFixed(2),
                    time: now
                });
            }
        }

        ANTI_NAKAL.lastGPS = gps;
        localStorage.setItem("vms_last_gps", JSON.stringify(gps));
    }

    // ======================
    // 3. OFFLINE ABUSE
    // ======================
    if(!navigator.onLine){
        ANTI_NAKAL.lastOnline = now;
    }else{
        const offlineDuration = now - ANTI_NAKAL.lastOnline;

        if(offlineDuration > 1000 * 60 * 30){ // 30 menit
            ANTI_NAKAL.flags.push({
                type: "OFFLINE_ABUSE",
                duration: Math.floor(offlineDuration / 60000),
                time: now
            });
        }
    }

    // ======================
    // 4. SAVE REPORT
    // ======================
    localStorage.setItem("vms_anti_flags", JSON.stringify(ANTI_NAKAL.flags.slice(-20)));

}

async function hashKey(key){
    const enc = new TextEncoder().encode(key);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,8);
}

// Hapus VALID_HASH yang lama, ganti dengan validasi ke Worker
async function applyLicenseKey(key) {
    if (!key) {
        toast("Masukkan license key", "error");
        return;
    }

    toast("Memvalidasi license...", "info");

    try {
        const response = await fetch(WORKER_BASE_URL + "/validate-license", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                licenseKey: key,
                deviceId: localStorage.getItem("vms_device_id"),
                deviceName: "VMS Field Device"
            })
        });

        const data = await response.json();

        if (data && data.ok) {
            // License valid dari Worker
            if (typeof switchLicenseLocalStore === "function") await switchLicenseLocalStore(key);
            syncRuntimeLicenseContext({ mode: data.company?.package || "PRO", features: data.features || WORKER_FEATURES, key });
            localStorage.setItem("vms_license_key", key);
            sessionStorage.setItem("vms_license_key", key);

            // Simpan info company
            if (data.company) {
                localStorage.setItem("vms_company", data.company.name || "");
                localStorage.setItem("vms_max_devices", data.company.maxDevices || 0);
            }

            toast(`✅ License aktif: ${LICENSE_MODE}`, "success");
            applyLicenseUI();

            // Refresh runtime langsung tanpa reload agar UI unlock mengikuti fitur Worker
            await refreshLicenseFeaturesFromWorker();
            if (typeof secureLoad === "function") await secureLoad();
            if (typeof requestPullFromCloud === "function") await requestPullFromCloud("license_switch", { forceFull:true });
            renderSiteSelectors();
            updateMonetizationUI();
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
        } else {
            toast(data?.message || "License tidak valid", "error");
        }
    } catch(e) {
        console.error("License validation error:", e);
        toast("Gagal memvalidasi license. Periksa koneksi internet.", "error");
    }
}

async function hashPassword(pw){
    const enc = new TextEncoder().encode(pw);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

function createUser(username, password, role="OPERATOR", site=SITE_ID){

    let users = getUsers();

    if(users.find(u=>u.username === username)){
        toast("User sudah ada","error");
        return;
    }

    hashPassword(password).then(hash=>{
        users.push({
            username,
            password: hash,
            role,
            site
        });

        localStorage.setItem("vms_users", JSON.stringify(users));

        toast("User dibuat","success");
    });
}

async function login(username, password){
    if(!isPro()) return false;
    let users = getUsers();
    let hash = await hashPassword(password);
    let u = users.find(x =>
    x.username === username &&
    x.password === hash &&
    (x.site === SITE_ID || x.role === "SUPER_ADMIN")
);
    if(u){
        currentUser = u;
        localStorage.setItem("vms_user", JSON.stringify(u));
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appLayout").style.display = "flex";

        if(window.renderDashboard) window.renderDashboard();
        return true;
    }
    toast("Login gagal", "error");
    return false;
}

function setSite(site){

    if(!site || site.trim() === ""){
        toast("Site kosong", "error");
        return;
    }

    const clean = site
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9_ ]/g, "")
        .replace(/\s+/g, "_");

    const previousSite = SITE_ID;

    const defaultSites = getDefaultSites();
    const isExistingDefault = defaultSites.includes(clean);
    let dynamicSites = getDynamicSites();
    const features = getRuntimeFeatures();
    const workerMaxDynamicSites = Number(features?.maxDynamicSites || 0);
    if(!isExistingDefault){
        if(!canUseDynamicSites()){
            SITE_ID = previousSite;
            toast("Rename/create site terkunci oleh license saat ini", "error");
            renderSiteSelectors();
            return;
        }
        if(!dynamicSites.includes(clean)){
            if(workerMaxDynamicSites > 0 && dynamicSites.length >= workerMaxDynamicSites){ SITE_ID = previousSite; toast("Limit dynamic site tercapai", "error"); renderSiteSelectors(); return; }
            dynamicSites.push(clean);
            localStorage.setItem("vms_dynamic_sites", JSON.stringify(dynamicSites));
        }
    }

    SITE_ID = clean;
    localStorage.setItem("vms_site", SITE_ID);

    renderSiteSelectors();

    toast(`Site aktif: ${SITE_ID}`, "success");

    if(window.renderDashboard) window.renderDashboard();
    if(window.renderLogTable) window.renderLogTable();
    if(window.updateMonetizationUI) window.updateMonetizationUI();
}

async function refreshLicenseFeaturesFromWorker(){
    const licenseKey = localStorage.getItem("vms_license_key");
    if(!licenseKey || !WORKER_BASE_URL) return;
    try{
        const res = await fetch(WORKER_BASE_URL + "/license-context", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ licenseKey })
        });
        if(!res.ok) return;
        const data = await res.json();
        if(data?.ok && data?.features){
            syncRuntimeLicenseContext({
                mode: data.company?.package || data.package || data.license || LICENSE_MODE,
                features: data.features,
                key: licenseKey
            });
            renderSiteSelectors();
            if(window.renderDashboard) window.renderDashboard();
            if(window.updateMonetizationUI) window.updateMonetizationUI();
        }
    }catch(e){}
}

function getCurrentVisitorCount() {
    return Object.keys(visitors).filter(k => k.startsWith(SITE_ID + "_")).length;
}

function getBasicMaxVisitor() { return 150; }
function getDemoMaxRegister() { return 5; }
function getDemoMaxScan() { return 5; }

function getCurrentScanCount() {
    return logs.filter(l => (l.action === "CHECK_IN" || l.action === "CHECK_OUT") && l.site === SITE_ID).length;
}

function isBasicLimitReached() {
    if(!isBasic()) return false;
    const count = getCurrentVisitorCount();
    return count >= getBasicMaxVisitor();
}

function isBasicWarning() {
    if(!isBasic()) return false;
    const count = getCurrentVisitorCount();
    const max = getBasicMaxVisitor();
    if(count >= max) return "critical";
    if(count >= max * 0.93) return "critical";
    if(count >= max * 0.8) return "warning";
    return null;
}

function checkBasicLimit() {
    if(!isBasic()) return true;
    if(isBasicLimitReached()) {
        alert("LIMIT BASIC TERCAPAI\nUpgrade ke PRO untuk akses tanpa batas");
        return false;
    }
    const warning = isBasicWarning();
    if(warning === "critical") {
        toast("⚠️ PERINGATAN KRITIS! Hampir mencapai limit BASIC (150). Hapus data atau upgrade ke PRO!", "error");
    } else if(warning === "warning") {
        toast("⚠️ Peringatan: Sudah mencapai 80% limit BASIC. Upgrade ke PRO untuk unlimited!", "warning");
    }
    return true;
}

// SILENT VERSIONS (TANPA ALERT) UNTUK UI UPDATE
function canRegisterSilent() {
    if(isDemo()) {
        return getCurrentVisitorCount() < getDemoMaxRegister();
    }
    if(isBasic()) {
        return getCurrentVisitorCount() < getBasicMaxVisitor();
    }
    return true;
}

function canScanSilent() {
    if(isDemo()) {
        return getCurrentScanCount() < getDemoMaxScan();
    }
    if(isBasic()) {
        return getCurrentVisitorCount() < getBasicMaxVisitor();
    }
    return true;
}

// PUBLIC VERSIONS (DENGAN ALERT) UNTUK ACTION
function canRegister() {
    if(isDemo()) {
        const registerCount = getCurrentVisitorCount();
        if(registerCount >= getDemoMaxRegister()) {
            alert("DEMO LIMIT HABIS\nUpgrade ke BASIC/PRO untuk lanjut DAN MENDAPATKAN FASILITAS TERBAIK");
            return false;
        }
        return true;
    }
    if(isBasic()) {
        return checkBasicLimit();
    }
    return true;
}

function canScan() {
    if(isDemo()) {
        const scanCount = getCurrentScanCount();
        if(scanCount >= getDemoMaxScan()) {
            alert("DEMO LIMIT HABIS\nUpgrade ke BASIC/PRO untuk lanjut DAN MENDAPATKAN FASILITAS TERBAIK");
            return false;
        }
        return true;
    }
    if(isBasic()) {
        return checkBasicLimit();
    }
    return true;
}

function updateMonetizationUI() {
    syncRuntimeLicenseContext();
    renderSiteSelectors();
    const progressCard = document.getElementById("monetizationProgressCard");
    if(!progressCard) return;

    const visitorCount = getCurrentVisitorCount();
    let maxLimit = 0;
    let modeText = "";

    // HARD UI LOCK - disable/enable buttons based on limits (GUNAKAN SILENT VERSION)
    const generateBtn = document.getElementById("generateQRBtn");
    const walkinBtn = document.getElementById("walkinBtn");
    const startCamBtn = document.getElementById("startCamBtn");
    const manualProcessBtn = document.getElementById("manualProcess");
    const uploadQrBtn = document.getElementById("uploadQrBtn");

    const canReg = canRegisterSilent();
    const canScn = canScanSilent();

    if(generateBtn) generateBtn.disabled = !canReg;
    if(walkinBtn) walkinBtn.disabled = !canReg;
    if(startCamBtn) startCamBtn.disabled = !canScn;
    if(manualProcessBtn) manualProcessBtn.disabled = !canScn;
    if(uploadQrBtn) uploadQrBtn.disabled = !canScn;

    if(isPro()) {
        maxLimit = 0;
        modeText = "Unlimited";
        document.getElementById("visitorLimitText").innerHTML = `${visitorCount} / Unlimited ✨`;
        const progressBar = document.getElementById("visitorProgressBar");
        if(progressBar) progressBar.style.width = "0%";
        const warningDiv = document.getElementById("visitorLimitWarning");
        if(warningDiv) warningDiv.innerHTML = "✅ PRO Mode - Unlimited akses";
        return;
    } else if(isBasic()) {
        maxLimit = getBasicMaxVisitor();
        modeText = `Basic (Max ${maxLimit})`;
        const percent = (visitorCount / maxLimit) * 100;
        const progressBar = document.getElementById("visitorProgressBar");
        if(progressBar) {
            progressBar.style.width = Math.min(percent, 100) + "%";
            if(percent >= 90) progressBar.className = "progress-bar-fill critical";
            else if(percent >= 70) progressBar.className = "progress-bar-fill warning";
            else progressBar.className = "progress-bar-fill";
        }
        document.getElementById("visitorLimitText").innerHTML = `${visitorCount} / ${maxLimit}`;
        const warningDiv = document.getElementById("visitorLimitWarning");
        if(percent >= 100) {
            warningDiv.innerHTML = "🔴 LIMIT TERCAPAI! Upgrade ke PRO untuk lanjut.";
            warningDiv.style.color = "#ef4444";
        } else if(percent >= 90) {
            warningDiv.innerHTML = "⚠️ KRITIS! Sisa slot sedikit. Upgrade ke PRO!";
            warningDiv.style.color = "#ef4444";
        } else if(percent >= 70) {
            warningDiv.innerHTML = "⚠️ Peringatan: Mendekati limit BASIC. Upgrade ke PRO!";
            warningDiv.style.color = "#f59e0b";
        } else {
            warningDiv.innerHTML = `📊 Sisa ${maxLimit - visitorCount} slot tersedia`;
            warningDiv.style.color = "#5f7f7c";
        }
    } else if(isDemo()) {
        maxLimit = getDemoMaxRegister();

let visitors = {};

async function signData(data){
    const enc = new TextEncoder().encode(JSON.stringify(data) + "VMS_LOCK_v2");
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

function getLicenseScopedStorageKey(base){
    const licenseKey = (localStorage.getItem("vms_license_key") || sessionStorage.getItem("vms_license_key") || "NO_LICENSE").replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 80) || "NO_LICENSE";
    return `${base}_${licenseKey}`;
}

async function secureSave(){
    try {
        const payload = { visitors, logs, auditLogs, licenseKey: localStorage.getItem("vms_license_key") || "" };
        const sig = await signData(payload);
        const secureKey = getLicenseScopedStorageKey("vms_secure");
        const backupKey = getLicenseScopedStorageKey("vms_visitors_backup");
        localStorage.setItem(secureKey, JSON.stringify({ payload, sig }));
        localStorage.setItem(backupKey, JSON.stringify(visitors));
        if(!localStorage.getItem("vms_license_key")){
            localStorage.setItem("vms_secure", JSON.stringify({ payload, sig }));
            localStorage.setItem("vms_visitors_backup", JSON.stringify(visitors));
        }
        if(window.updateMonetizationUI) window.updateMonetizationUI();
    } catch(e) { console.warn("Save error:", e); }
}

async function secureLoad(){
    try {
        const secureKey = getLicenseScopedStorageKey("vms_secure");
        const backupKey = getLicenseScopedStorageKey("vms_visitors_backup");
        let raw = localStorage.getItem(secureKey);
        if(!raw && secureKey.endsWith("_NO_LICENSE")) raw = localStorage.getItem("vms_secure");
        if(!raw) {
            let v = localStorage.getItem(backupKey);
            if(!v && backupKey.endsWith("_NO_LICENSE")) v = localStorage.getItem("vms_visitors_backup");
            if(v) visitors = JSON.parse(v);
            else { visitors = {}; logs = []; auditLogs = []; }
            return;
        }
        let parsed = JSON.parse(raw);
        let check = await signData(parsed.payload);
        const activeLicense = localStorage.getItem("vms_license_key") || "";
        if(check === parsed.sig && (!parsed.payload.licenseKey || !activeLicense || parsed.payload.licenseKey === activeLicense)){
            visitors = parsed.payload.visitors || {};
            logs = parsed.payload.logs || [];
            auditLogs = parsed.payload.auditLogs || [];
        } else {
            console.warn("Data tamper/license-scope mismatch detected! Resetting runtime cache...");
            visitors = {};
            logs = [];
            auditLogs = [];
        }
    } catch(e) { console.warn("Load error:", e); }
}

function getApproxBytes(value){ try { return new Blob([JSON.stringify(value)]).size; } catch { return JSON.stringify(value || []).length; } }

function visitorFingerprint(data){
    return [data?.mutationId || "", data?.reg || "", data?.deviceId || localStorage.getItem("vms_device_id") || "", data?.eventTs || data?.updatedAt || getEventTimestamp()]
        .map(v => String(v).trim().toLowerCase()).join("|");

function isDuplicateMutation(fingerprint){
    const now = getEventTimestamp();
    const cache = safeParseJSON(localStorage.getItem(VMS_MUTATION_FINGERPRINT_KEY), {});
    Object.keys(cache).forEach(k => { if(now - Number(cache[k] || 0) > DUPLICATE_REJECTION_WINDOW_MS) delete cache[k]; });
    const entries = Object.entries(cache).sort((a,b)=>Number(a[1]||0)-Number(b[1]||0));
    while(entries.length >= MAX_FINGERPRINT_CACHE){ const [oldKey] = entries.shift(); delete cache[oldKey]; }
    if(cache[fingerprint] && now - Number(cache[fingerprint]) <= DUPLICATE_REJECTION_WINDOW_MS) {
        localStorage.setItem(VMS_MUTATION_FINGERPRINT_KEY, JSON.stringify(cache));
        logSyncMetric("duplicateRejects", { mutationId:fingerprint });
        return true;
    }
    cache[fingerprint] = now;
    localStorage.setItem(VMS_MUTATION_FINGERPRINT_KEY, JSON.stringify(cache));
    return false;
}
function stampMutationEntity(entity, mutationId, source = getMutationSource()){
    const prevVersion = Number(entity?.version || 0);
    const eventTs = Number(entity?.eventTs || getEventTimestamp());
    return { ...entity, version: prevVersion + 1, eventTs, updatedAt: eventTs, updatedAtWIB: getWIBISO(eventTs), mutationSource: source, mutationId, requestFingerprint: entity?.requestFingerprint || "" };
}
function mutationPriorityTuple(entity){
    return [
        Number(entity?.version || 0),
        Number(entity?.eventTs || 0),
        Number(entity?.updatedAt || 0),
        String(entity?.mutationSource || ""),
        String(entity?.mutationId || entity?.lastMutationId || "")
    ];
}
function compareMutationPriority(a, b){
    const aa = mutationPriorityTuple(a);
    const bb = mutationPriorityTuple(b);
    for(let i=0;i<aa.length;i++){
        if(typeof aa[i] === "number" && aa[i] !== bb[i]) return aa[i] - bb[i];
        if(typeof aa[i] === "string" && aa[i] !== bb[i]) return aa[i].localeCompare(bb[i]);
    }
    return 0;
}
function shouldAcceptVisitorOverwrite(current, incoming){
    if(!current) return true;
    const accept = compareMutationPriority(incoming, current) > 0;
    if(!accept) logSyncMetric("occRejects", { mutationId:incoming?.mutationId || "", mutationSource:incoming?.mutationSource || "", entity:"visitor" });
    return accept;
}
async function withClientMutationLock(lockName, buttons, fn){
    if(HYDRATION_MUTEX.hydrating || HYDRATION_MODE.active){ toast("Sinkronisasi sedang memulihkan data, coba lagi sebentar", "warning"); return null; }
    const now = getEventTimestamp();
    const prev = mutationLocks.get(lockName);
    if(prev && (now - Number(prev.startedAt || 0)) < MUTATION_DEBOUNCE_MS){
        toast("Proses masih berjalan, mohon tunggu sebentar", "warning");
        return null;
    }
    HYDRATION_MUTEX.mutationDepth++;
    mutationLocks.set(lockName, { startedAt: now });
    const btns = (Array.isArray(buttons) ? buttons : [buttons]).filter(Boolean);
    const oldDisabled = btns.map(b => b.disabled);
    btns.forEach(b => b.disabled = true);
    try{ return await fn(); }
    finally{
        btns.forEach((b,i) => b.disabled = oldDisabled[i]);
        mutationLocks.delete(lockName);
        HYDRATION_MUTEX.mutationDepth = Math.max(0, HYDRATION_MUTEX.mutationDepth - 1);
    }
}

function openVisitorPhotoDB(){

        const req = indexedDB.open(VMS_PHOTO_DB_NAME, 1);
        req.onupgradeneeded = () => {

            if(!db.objectStoreNames.contains(VMS_PHOTO_STORE_NAME)) db.createObjectStore(VMS_PHOTO_STORE_NAME);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("indexeddb_open_failed"));
    });

async function compressPhotoForThumbnail(dataUrl, maxWidth = 240){
    if(!dataUrl || typeof dataUrl !== "string" || !dataUrl.startsWith("data:image")) return "";
    try{
        const img = new Image();
        img.src = dataUrl;
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
        const scale = Math.min(1, maxWidth / Math.max(1, img.width));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.58);
    }catch(e){
        console.warn(JSON.stringify({ type:"PHOTO_THUMBNAIL_FAILED", reason:e?.message || String(e), updatedAt:getWIBISO() }));
        return dataUrl.length <= 12000 ? dataUrl : "";
    }
}

function queueAppendRetry(mutation){
    if(!isValidMutationEnvelope(mutation)){ queueDeadLetter(mutation, "poison_append_mutation"); logSyncMetric("queueFailures", { reason:"poison_append_mutation" }); return; }
    const q = loadJsonArray(VMS_APPEND_RETRY_QUEUE_KEY);
    const event = mutation.event || mutation;
    const id = event?.mutationId || mutation?.mutationId || mutation?.gasReplayId || mutation?.sequenceId;
    if(id && q.some(x => ((x.event || x).mutationId || x.gasReplayId || x.sequenceId) === id)) return;
    q.push(makeSyncEnvelope(event, { syncStatus:"PENDING_SYNC", retry: Number(mutation?.retry || mutation?.syncMeta?.retry || 0) }));
    saveJsonArray(VMS_APPEND_RETRY_QUEUE_KEY, pruneArrayByBytes(q, MAX_QUEUE, MAX_QUEUE_BYTES));
    logSyncMetric("queueDepth", { queue:"append", depth:q.length });
    updateVisitorSyncBadge();
}

    const q = loadJsonArray(VMS_APPEND_RETRY_QUEUE_KEY).filter(x => ((x.event || x).mutationId || x.gasReplayId || x.sequenceId) !== id);

function saveVisitor(siteKey, data, reg, sourceAction){
    if(HYDRATION_MUTEX.hydrating || HYDRATION_MODE.active) return false;
    const mutationId = data.mutationId || createMutationId("visitor");
    const eventTs = Number(data.eventTs || getEventTimestamp());
    const candidateBase = { ...data, reg, mutationId, eventTs, deviceId: data.deviceId || localStorage.getItem("vms_device_id") || "unknown" };
    const fingerprint = data.requestFingerprint || visitorFingerprint(candidateBase);
    if(isDuplicateMutation(fingerprint)){
        toast("⚠️ Replay mutation identik terdeteksi. Data tidak disimpan ulang.", "warning");
        return false;
    }
    const current = visitors[siteKey] || null;
    const candidate = stampMutationEntity({ ...(current || {}), ...candidateBase, requestFingerprint:fingerprint, mutationSource:getMutationSource(), syncStatus:"PENDING_SYNC", sourceAction:normalizeAction(sourceAction) }, mutationId);
    if(!shouldAcceptVisitorOverwrite(current, candidate)){
        console.warn("VISITOR_OCC_REJECT", { siteKey, currentVersion:Number(current?.version||0), incomingVersion:Number(candidate.version||0), currentTs:Number(current?.eventTs||current?.updatedAt||0), incomingTs:Number(candidate.eventTs||candidate.updatedAt||0), mutationId });
        return false;
    }
    visitors[siteKey] = candidate;
    return true;
}

function resolveVisitorByReg(reg){
    const regText = String(reg || "").trim();
    if(!regText) return { siteKey:"", visitor:null };
    const preferredKey = SITE_ID + "_" + regText;
    if(visitors[preferredKey]) return { siteKey:preferredKey, visitor:visitors[preferredKey] };
    let bestKey = "";
    let bestVisitor = null;
    Object.entries(visitors || {}).forEach(([key, visitor]) => {
        if(!visitor || typeof visitor !== "object") return;
        const visitorReg = String(visitor.reg || key.split("_").slice(1).join("_") || "");
        if(visitorReg !== regText) return;
        if(!bestVisitor || compareMutationPriority(visitor, bestVisitor) > 0){
            bestKey = key;
            bestVisitor = visitor;
        }
    });
    return { siteKey:bestKey, visitor:bestVisitor };
}

async function requestVisitorMissPull(reg, reason){
    const regText = String(reg || "").trim();
    if(!regText || !navigator.onLine) return false;
    const now = Date.now();
    const lastRegPull = Number(visitorMissPullCache.get(regText) || 0);
    if(now - lastRegPull < VISITOR_MISS_PULL_COOLDOWN_MS) return false;
    if(now - lastFullVisitorPullAt < VISITOR_MISS_PULL_GLOBAL_COOLDOWN_MS) return false;
    visitorMissPullCache.set(regText, now);
    lastFullVisitorPullAt = now;
    if(pullPromise) {
        try { await pullPromise; } catch(_) {}
    }
    await requestPullFromCloud(reason, { forceFull:true });
    return true;
}

    async function fetchWithTimeout(url, options = {}, timeoutMs = 8000){
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try { return await fetch(url, { ...options, signal: controller.signal }); }
        finally { clearTimeout(timer); }
    }

    async function generateSignature(payload){
        const enc = new TextEncoder().encode(payload + QR_SECRET);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    async function buildQR(reg, data){
        const ts = Date.now();
        const payload = JSON.stringify({
            reg: reg,
            nama: data.nama,
            perusahaan: data.perusahaan,
            exp: data.expDate,
            ts: ts
        });
        const sig = await generateSignature(payload);
        return btoa(JSON.stringify({ payload, sig, ts }));
    }

    async function parseQR(raw){
        try{
            const decoded = JSON.parse(atob(raw));
            const expectedSig = await generateSignature(decoded.payload);
            if(decoded.sig !== expectedSig) return null;
            const payloadData = JSON.parse(decoded.payload);
            return payloadData;
        }catch(e){
            return null;
        }
    }

    async function waitQRCodeReady(){
        let retry = 0;
        while(typeof QRCode === "undefined" && retry < 20){
            await new Promise(r=>setTimeout(r,100));
            retry++;
        }
        return typeof QRCode !== "undefined";
    }

    async function generateQRImage(qrPayload){
        const ready = await waitQRCodeReady();
        if(ready){
            try{
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, qrPayload, {
                    width: 200,
                    margin: 1,
                    color: { dark: '#000000', light: '#FFFFFF' }
                });
                return canvas.toDataURL("image/png");
            }catch(e){ console.warn("Local QR failed:", e); }
        }
        console.warn("QR generation unavailable: local QRCode library failed; external QR payload upload is blocked for security.");
        return null;
    }

    const resolvedVisitor = resolveVisitorByReg(regRaw);
    let siteKey = resolvedVisitor.siteKey || (SITE_ID + "_" + regRaw);

    const normalizedAction = normalizeAction(action);
    const mutationId = createMutationId("log");
    const eventTs = getEventTimestamp();
    const newLog = {
        reg: regRaw,
        name: v?.nama || regRaw,
        company: v?.perusahaan || '',
        category: v?.kategori || 'UMUM',
        action: normalizedAction,
        time: eventTs,
        eventTs,

        version: Number(v?.version || 0) + 1,

    };

    logs.unshift(newLog);

    async function appendScanLogToGoogleSheet(log, visitor){
        const action = normalizeAction(log?.action);
        if(!log || (action !== ACTION_TYPES.CHECK_IN && action !== ACTION_TYPES.CHECK_OUT)) return;
        const row = {
            reg: log.reg,
            nama: visitor?.nama || log.name || log.reg,
            perusahaan: visitor?.perusahaan || log.company || "",
            action,
            eventTs: Number(log.eventTs || log.time || log.updatedAt || getEventTimestamp()),
            logTime: log.logTime || getWIBISO(log.eventTs || log.time || log.updatedAt || getEventTimestamp()),
            site: log.site || SITE_ID,
            deviceId: log.deviceId || localStorage.getItem("vms_device_id") || "",
            kategori: visitor?.kategori || log.category || "",
            pic: visitor?.pic || "",
            start: visitor?.startDate || "",
            exp: visitor?.expDate || "",
            status: action,
            version: Number(log.version || 1),
            updatedAt: Number(log.updatedAt || log.eventTs || getEventTimestamp()),
            updatedAtWIB: log.updatedAtWIB || getWIBISO(log.updatedAt || log.eventTs || getEventTimestamp()),
            mutationSource: log.mutationSource || getMutationSource(),
            mutationId: log.mutationId || createMutationId("sheet"),
            requestFingerprint: log.requestFingerprint || `${log.mutationId || ""}|${log.reg}|${log.deviceId || localStorage.getItem("vms_device_id") || ""}|${log.eventTs || log.time || log.updatedAt || ""}`
        };
        if(!isValidMutationEnvelope(row)){ queueDeadLetter(row, "poison_sheet_row"); return false; }
        const payload = { logs: [row], mutationId: row.mutationId, requestFingerprint: row.requestFingerprint, expectedCount: 1 };
        const retryBudget = 3;
        for(let attempt = 0; attempt < retryBudget; attempt++){
            try{
                const res = await fetchWithTimeout(WORKER_BASE_URL + "/sheet-append", {
                    method:"POST",
                    headers:{ "Content-Type":"application/json" },
                    body: JSON.stringify(payload)
                }, 8000);
                const result = await res.json().catch(()=>null);
                const ackIds = Array.isArray(result?.mutationIds) ? result.mutationIds : [];
                const skippedIds = Array.isArray(result?.skippedMutationIds) ? result.skippedMutationIds : [];
                const fingerprints = Array.isArray(result?.requestFingerprints) ? result.requestFingerprints : [];
                const exactAck = (ackIds.includes(row.mutationId) || skippedIds.includes(row.mutationId)) && Number(result?.ackCount || (ackIds.length + skippedIds.length)) === 1 && fingerprints.includes(row.requestFingerprint);
                if(res.status === 202){
                    toast("Pending sync ke sheet", "warning");
                    return true;
                }
                if(res.ok && result?.ok !== false && result?.ack === true && exactAck){
                    logSyncMetric("syncLatency", { mutationId:row.mutationId, latencyMs:getEventTimestamp() - Number(row.eventTs || getEventTimestamp()) });
                    markAppendSynced(row.mutationId);
                    updateVisitorSyncBadge();
                    return true;
                }
                if(res.ok && result?.ack === true && !exactAck) logSyncMetric("gasAckMismatch", { mutationId:row.mutationId, ackCount:Number(result?.ackCount || 0) });
                if(res.status >= 400 && res.status < 500 && res.status !== 429) break;
            }catch(e){
                console.warn("CHECK_SCAN_SHEET_APPEND_FAIL", { attempt, reason:e?.message || e, mutationId:row.mutationId, updatedAt:getWIBISO() });
            }
            const jitter = Math.floor(Math.random() * 300);
            await new Promise(r => setTimeout(r, Math.min(1000 * Math.pow(2, attempt), 5000) + jitter));
        }
        queueAppendRetry(row);
        return false;
    }
    window.appendScanLogToGoogleSheet = appendScanLogToGoogleSheet;


    async function ensureJsPDFReady(){
    if(window.jspdf) return true;
    return new Promise((resolve)=>{
        let max = 100;
        let i = 0;
        const interval = setInterval(()=>{
            if(window.jspdf){
                clearInterval(interval);
                resolve(true);
            }
            if(i++ > max){
                clearInterval(interval);
                resolve(false);
            }
        },100);
    });
}

    function forceDownloadPDF(doc, filename){
        try{
            const blob = doc.output("blob");
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => { URL.revokeObjectURL(url); }, 3000);
            return true;
        }catch(err){ console.error("FORCE DOWNLOAD ERROR:", err); return false; }
    }

    async function downloadPDFStable(reg, data){
        try{
            const ready = await ensureJsPDFReady();
            if(!ready){ toast("PDF engine gagal dimuat. Coba refresh.", "error"); return false; }
            const { jsPDF } = window.jspdf;
            const badgeMode = String(data.badgeMode || "PORTRAIT").toUpperCase() === "LANDSCAPE" ? "LANDSCAPE" : "PORTRAIT";
            const badgeW = badgeMode === "LANDSCAPE" ? 86 : 54;
            const badgeH = badgeMode === "LANDSCAPE" ? 54 : 86;
            const doc = new jsPDF({
                orientation: badgeMode === "LANDSCAPE" ? 'landscape' : 'portrait',
                unit: 'mm',
                format: [badgeW, badgeH]
            });

            let accentColor = [31,78,74];
            if(data.kategori === "VVIP") accentColor = [217,119,6];
            else if(data.kategori === "VIP") accentColor = [100,116,139];

            const cleanText = (value, fallback = "-") => String(value || fallback).replace(/\s+/g, " ").trim();
            const wrapFitText = (value, maxWidth, maxLines, maxFont, minFont = 4.8) => {
                const text = cleanText(value);
                const safeLines = (lines, clipped = false) => {
                    lines = lines.slice(0, maxLines).map(line => {
                        while(doc.getTextWidth(line) > maxWidth && line.length > 1) line = line.slice(0, -1);
                        return line;
                    });
                    if(clipped && lines.length){
                        let last = lines[lines.length - 1];
                        while(doc.getTextWidth(last + "…") > maxWidth && last.length > 1) last = last.slice(0, -1);
                        lines[lines.length - 1] = last + "…";
                    }
                    return lines;
                };
                for(let size = maxFont; size >= minFont; size -= 0.2){
                    doc.setFontSize(size);
                    const lines = doc.splitTextToSize(text, maxWidth);
                    if(lines.length <= maxLines) return { lines: safeLines(lines), size };
                }
                doc.setFontSize(minFont);
                const lines = doc.splitTextToSize(text, maxWidth);
                return { lines: safeLines(lines, lines.length > maxLines), size: minFont };
            };
            const drawWrapped = (value, x, y, maxWidth, maxLines, maxFont, opts = {}) => {
                const fit = wrapFitText(value, maxWidth, maxLines, maxFont, opts.minFont || 4.8);
                doc.setFontSize(fit.size);
                doc.text(fit.lines, x, y, { align: opts.align || "left", lineHeightFactor: opts.lineHeightFactor || 1.1 });
                return y + (fit.lines.length * fit.size * 0.36 * (opts.lineHeightFactor || 1.1));
            };

            doc.setFillColor(248,250,252);
            doc.rect(0, 0, badgeW, badgeH, 'F');
            drawCorporateHeader(doc, "VISITOR BADGE", cleanPdfText(data.perusahaan || "SAPAM MEDED"), badgeW, accentColor);

            doc.setDrawColor(...accentColor);
            doc.setLineWidth(0.5);
            doc.roundedRect(2, 2, badgeW - 4, badgeH - 4, 3, 3, 'S');

            const qrPayload = await buildQR(reg, data);
            const qrBase64 = await generateQRImage(qrPayload);
            const pdfPhoto = await getVisitorPhotoForPDF(reg, data);
            const addPhoto = (x, y, size) => {
                doc.setFillColor(255,255,255);
                doc.roundedRect(x - 1, y - 1, size + 2, size + 2, 2, 2, 'F');
                doc.setDrawColor(203,213,225);
                doc.roundedRect(x - 1, y - 1, size + 2, size + 2, 2, 2, 'S');
                if(addImageContain(doc, pdfPhoto, x, y, size, size)) return;
                doc.setFillColor(226,232,240);
                doc.roundedRect(x, y, size, size, 2, 2, 'F');
                doc.setTextColor(100,116,139);
                doc.setFontSize(5.5);
                doc.text("NO PHOTO", x + size / 2, y + (size / 2) + 1, { align:"center" });
            };
            const addQr = (x, y, size) => {
                if(qrBase64 && qrBase64.startsWith("data:image")){
                    try{ doc.addImage(qrBase64, 'PNG', x, y, size, size); return; }catch(e){}
                }
                doc.setTextColor(239,68,68);
                doc.setFontSize(6);
                doc.text("QR ERROR", x + size / 2, y + size / 2, { align:"center" });
            };

            if(badgeMode === "LANDSCAPE"){
                addPhoto(5, 14, 22);
                let y = 16;
                doc.setTextColor(15,23,42);
                doc.setFont(undefined, 'bold');
                y = drawWrapped(cleanText(data.nama).toUpperCase(), 31, y, 28, 2, 8.5);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(15,23,42);
                y = drawWrapped(data.perusahaan, 31, y + 1.5, 28, 2, 6.2);
                y = drawWrapped(`PIC: ${cleanText(data.pic)}`, 31, y + 1, 28, 1, 5.8);
                doc.setTextColor(...accentColor);
                doc.setFont(undefined, 'bold');
                drawWrapped(cleanText(data.kategori), 31, y + 1, 28, 1, 6);
                addQr(62, 18, 19);
                doc.setTextColor(71,85,105);
                doc.setFont(undefined, 'normal');
                doc.setFontSize(5.2);
                doc.text(`REG ${reg}`, 71.5, 40, { align:"center" });
            } else {
                addPhoto(18, 14, 18);
                let y = 37;
                doc.setTextColor(15,23,42);
                doc.setFont(undefined, 'bold');
                y = drawWrapped(cleanText(data.nama).toUpperCase(), badgeW / 2, y, 40, 2, 8.2, { align:"center" });
                doc.setFont(undefined, 'normal');
                doc.setTextColor(15,23,42);
                y = drawWrapped(data.perusahaan, badgeW / 2, y + 1.5, 40, 2, 6.2, { align:"center" });
                y = drawWrapped(`PIC: ${cleanText(data.pic)}`, badgeW / 2, y + 1, 40, 1, 5.8, { align:"center" });
                doc.setTextColor(...accentColor);
                doc.setFont(undefined, 'bold');
                y = drawWrapped(cleanText(data.kategori), badgeW / 2, y + 1, 40, 1, 6, { align:"center" });
                addQr(16, 55, 18);
                doc.setTextColor(71,85,105);
                doc.setFont(undefined, 'normal');
                doc.setFontSize(5.2);
                doc.text(`REG ${reg}`, badgeW / 2, 81, { align:"center" });
            }

            doc.setTextColor(71,85,105);
            doc.setFont(undefined, 'bold');
            doc.setFontSize(5);
            doc.text(`Valid ${cleanText(data.expDate, '-')}`, badgeW / 2, badgeH - 9, { align:"center" });
            drawCorporateFooter(doc, localStorage.getItem("vms_device_id") || data.deviceId || "unknown", badgeW, badgeH);

            const success = forceDownloadPDF(doc, `BADGE_${reg}_${badgeMode}.pdf`);
            if(!success){ toast("Download gagal. Gunakan browser Chrome.", "error"); return false; }
            toast(`Badge ID ${reg} berhasil diunduh`, "success");
            return true;
        }catch(err){ console.error("BADGE PDF ERROR:", err); toast("Terjadi error saat generate Badge ID", "error"); return false; }
    }

    let scannerInstance = null;
    let isScanning = false;
    let currentCameraId = null;
    let lastQrErrorToastAt = 0;
    const CAMERA_PREF_KEY = "vms_camera_pref";

    function resolveCameraPreference(cameras){
        const preferred = localStorage.getItem(CAMERA_PREF_KEY) || "auto_back";
        const rememberedCameraId = localStorage.getItem("vms_last_camera_id");
        const remembered = cameras.find(c => c.id === rememberedCameraId);
        if (remembered) return remembered.id;
        const byType = {
            auto_back: cameras.find(cam => /back|rear|belakang/i.test(cam.label || "")),
            auto_front: cameras.find(cam => /front|user|depan/i.test(cam.label || "")),
            auto_external: cameras.find(cam => /external|usb|virtual|obs/i.test(cam.label || ""))
        };
        return (byType[preferred] || byType.auto_back || cameras[0] || {}).id || null;
    }

    async function initScanner() {
        if (scannerInstance) { await stopScanner(); }
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras || cameras.length === 0) { toast("Tidak ada kamera terdeteksi", "error"); return false; }
            currentCameraId = resolveCameraPreference(cameras);
            scannerInstance = new Html5Qrcode("cameraPreview");
            return true;
        } catch (err) { console.error("Init scanner error:", err); toast("Gagal inisialisasi kamera", "error"); return false; }
    }

    async function startScanner() {
        if (isScanning) return;
        if (!scannerInstance) { const init = await initScanner(); if (!init) return; }
        try {
            await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
                async (decodedText) => {
                    if (!canScan()) return;
                    if (processingRegs.has(decodedText)) { return; }
                    try { await processScan(decodedText); } catch (err) {}
                },
                (error) => {
                    if (error && !error.includes("No MultiFormat Readers")) {
                        const now = Date.now();
                        if(now - lastQrErrorToastAt > 5000){
                            lastQrErrorToastAt = now;
                            console.log("Scan error:", error);
                        }
                    }
                }
            );
            isScanning = true;
            if(currentCameraId) localStorage.setItem("vms_last_camera_id", currentCameraId);
            toast("Scanner siap - unlimited scan mode", "success");
        } catch (err) { console.error("Start scanner error:", err); toast("Gagal start kamera: " + err.message, "error"); isScanning = false; }
    }

    async function stopScanner() {
        if (scannerInstance && isScanning) { try { await scannerInstance.stop(); await scannerInstance.clear(); } catch (err) { console.error("Stop scanner error:", err); } }
        isScanning = false;
    }

    async function cleanupScanner() {
        if (scannerInstance) { try { await scannerInstance.stop().catch(()=>{}); await scannerInstance.clear().catch(()=>{}); } catch (e) {} scannerInstance = null; }
        isScanning = false;
        const container = document.getElementById("cameraPreview");
        if(container) container.innerHTML = "";
    }

    const originalStartCamHandler = document.getElementById('startCamBtn').onclick;
    document.getElementById('startCamBtn').onclick = async () => {
        if(!canScan()) return;
        const container = document.getElementById('cameraPreview');
        container.innerHTML = '';
        await stopScanner();
        await cleanupScanner();
        await startScanner();
    };
    document.getElementById('stopCamBtn').onclick = async () => { await stopScanner(); await cleanupScanner(); toast("Kamera berhenti", "info"); };

    document.getElementById('uploadQrBtn').onclick = () => document.getElementById('uploadQrFile').click();
    const originalUploadHandler = document.getElementById('uploadQrFile').onchange;
    document.getElementById('uploadQrFile').onchange = async (e) => {
        if(!canScan()) return;
        let file = e.target.files[0];
        if(!file) return;
        try {
            if(!window.Html5Qrcode){ toast("QR engine belum siap", "error"); return; }
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.src = url;
            await img.decode();
            URL.revokeObjectURL(url);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            const scanner = new Html5Qrcode("temp-reader");
            const decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
            await processScan(decoded);
            await scanner.clear();
            document.getElementById("temp-reader").innerHTML = "";
        } catch(err){ console.error(err); toast("QR tidak terbaca / file tidak valid", "error"); }
    };

    async function lookupRegAuthoritative(reg){
        const licenseKey = localStorage.getItem("vms_license_key") || "";
        if(!licenseKey || !navigator.onLine) return null;
        try {
            console.log("SCANNER_FALLBACK_HYDRATION", { reg, mode:"targeted_lookup", updatedAt:getWIBISO() });
            const res = await fetchWithTimeout(`${WORKER_BASE_URL}/lookup-reg?licenseKey=${encodeURIComponent(licenseKey)}&reg=${encodeURIComponent(String(reg||"").trim())}`, {}, 8000);
            if(!res.ok) return null;
            return await res.json();
        } catch { return null; }
    }

    async function processScan(qrText){
        let mode = normalizeAction(document.getElementById('scanMode').value);
        let payload = await parseQR(qrText);
        if(!payload){ toast("QR tidak valid (bukan dari sistem ini)","error"); return; }
        let reg = payload.reg;

        if(lastScanTime[reg] && getEventTimestamp() - lastScanTime[reg] < MUTATION_DEBOUNCE_MS){
            toast("Scan terlalu cepat","warning");
            return;
        }
        lastScanTime[reg] = getEventTimestamp();

        if(processingRegs.has(reg)){ toast("Sedang diproses, tunggu sebentar","warning"); return; }
        processingRegs.add(reg);
        try {
            let resolvedVisitor = resolveVisitorByReg(reg);
            if(!resolvedVisitor.visitor && await requestVisitorMissPull(reg, "scan_miss")){
                resolvedVisitor = resolveVisitorByReg(reg);
            }
            let siteKey = resolvedVisitor.siteKey || (SITE_ID + "_" + reg);
            let visitor = resolvedVisitor.visitor;
            if(!visitor){
                const targeted = await lookupRegAuthoritative(reg);
                if(targeted?.found && targeted?.visitor){
                    visitors[targeted.siteKey] = { ...(visitors[targeted.siteKey] || {}), ...targeted.visitor };
                    resolvedVisitor = resolveVisitorByReg(reg);
                    siteKey = resolvedVisitor.siteKey || targeted.siteKey;
                    visitor = resolvedVisitor.visitor || targeted.visitor;
                }
            }
            if(!visitor){ toast(`Visitor ${reg} tidak ditemukan di license ini`,"error"); return; }
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ toast("QR sudah expired","error"); return; }
            await withClientMutationLock(mode === ACTION_TYPES.CHECK_IN ? CHECKIN_LOCK : CHECKOUT_LOCK, null, async () => {
                const mutationId = createMutationId(mode === ACTION_TYPES.CHECK_IN ? "checkin" : "checkout");
                const eventTs = getEventTimestamp();
                if(mode === ACTION_TYPES.CHECK_IN){
                    if(!visitor.sessions) visitor.sessions = [];
                    visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
                    visitors[siteKey] = stampMutationEntity({ ...visitor, currentStatus: "IN", deviceId: deviceId, site: visitor.site || SITE_ID, lastScanSite: SITE_ID, mutationId, mutationSource:getMutationSource(), syncStatus:"PENDING_SYNC" }, mutationId);
                    const scanLog = addLog(reg, ACTION_TYPES.CHECK_IN);
                    await appendScanLogToGoogleSheet(scanLog, visitors[siteKey]);
                    toast(`✅ CHECK-IN ${visitor.nama} berhasil`,"success");
                } else {
                    if(!visitor.sessions) visitor.sessions = [];
                    let openSession = null;
                    for(let i = visitor.sessions.length - 1; i >= 0; i--){ if(!visitor.sessions[i].checkOut){ openSession = visitor.sessions[i]; break; } }
                    if(!openSession){ toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning"); visitor.sessions.push({ checkIn: eventTs, checkInWIB:getWIBISO(eventTs), checkOut: eventTs, checkOutWIB:getWIBISO(eventTs) }); }
                    else { openSession.checkOut = eventTs; openSession.checkOutWIB = getWIBISO(eventTs); }
                    visitors[siteKey] = stampMutationEntity({ ...visitor, currentStatus: "OUT", deviceId: deviceId, site: visitor.site || SITE_ID, lastScanSite: SITE_ID, mutationId, mutationSource:getMutationSource(), syncStatus:"PENDING_SYNC" }, mutationId);
                    const scanLog = addLog(reg, ACTION_TYPES.CHECK_OUT);
                    await appendScanLogToGoogleSheet(scanLog, visitors[siteKey]);
                    toast(`✅ CHECK-OUT ${visitor.nama} berhasil`,"success");
                }
            });
            renderDashboard();
            renderLogTable();
            await secureSave();
            await forceCentralSync("scan", { visitorKeys:[siteKey], includeLogs:true });
            updateMonetizationUI();
        } finally { processingRegs.delete(reg); }
    }

    const originalManualHandler = document.getElementById('manualProcess').onclick;
    document.getElementById('manualProcess').onclick = async () => withClientMutationLock(normalizeAction(document.getElementById('scanMode').value) === ACTION_TYPES.CHECK_IN ? CHECKIN_LOCK : CHECKOUT_LOCK, document.getElementById('manualProcess'), async () => {
        if(!canScan()) return;
        if(isManualProcessing){ toast("Sedang diproses","warning"); return; }
        isManualProcessing = true;
        try {
            let reg = document.getElementById('manualReg').value.trim();
            let mode = normalizeAction(document.getElementById('scanMode').value);
            let resolvedVisitor = resolveVisitorByReg(reg);
            if(!resolvedVisitor.visitor && await requestVisitorMissPull(reg, "manual_scan_miss")){
                resolvedVisitor = resolveVisitorByReg(reg);
            }
            let siteKey = resolvedVisitor.siteKey || (SITE_ID + "_" + reg);
            let visitor = resolvedVisitor.visitor;
            if(!visitor){ toast("REG tidak ditemukan di license ini","error"); return; }
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ toast("QR sudah expired","error"); return; }
            const mutationId = createMutationId(mode === ACTION_TYPES.CHECK_IN ? "manual_checkin" : "manual_checkout");
            const eventTs = getEventTimestamp();
            if(mode === ACTION_TYPES.CHECK_IN){
                if(!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: eventTs, checkInWIB: getWIBISO(eventTs), checkOut: null });
                visitors[siteKey] = stampMutationEntity({ ...visitor, currentStatus: "IN", deviceId: deviceId, site: visitor.site || SITE_ID, lastScanSite: SITE_ID, mutationId, mutationSource:getMutationSource(), syncStatus:"PENDING_SYNC" }, mutationId);
                const scanLog = addLog(reg, ACTION_TYPES.CHECK_IN);
                await appendScanLogToGoogleSheet(scanLog, visitors[siteKey]);
                toast(`Check-in ${visitor.nama} success`,"success");
            } else {
                if(!visitor.sessions) visitor.sessions = [];
                let openSession = null;
                for(let i = visitor.sessions.length - 1; i >= 0; i--){ if(!visitor.sessions[i].checkOut){ openSession = visitor.sessions[i]; break; } }
                if(!openSession){ toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning"); visitor.sessions.push({ checkIn: eventTs, checkInWIB:getWIBISO(eventTs), checkOut: eventTs, checkOutWIB:getWIBISO(eventTs) }); }
                else { openSession.checkOut = eventTs; openSession.checkOutWIB = getWIBISO(eventTs); }
                visitors[siteKey] = stampMutationEntity({ ...visitor, currentStatus: "OUT", deviceId: deviceId, site: visitor.site || SITE_ID, lastScanSite: SITE_ID, mutationId, mutationSource:getMutationSource(), syncStatus:"PENDING_SYNC" }, mutationId);
                const scanLog = addLog(reg, ACTION_TYPES.CHECK_OUT);
                await appendScanLogToGoogleSheet(scanLog, visitors[siteKey]);
                toast(`Check-out ${visitor.nama} success`,"success");
            }
            renderDashboard();
            renderLogTable();
            await secureSave();
            await forceCentralSync("manual_scan", { visitorKeys:[siteKey], includeLogs:true });
            updateMonetizationUI();
        } finally { isManualProcessing = false; }
    });

    function renderDashboard(){
        try {
            let v = Object.values(visitors);
            let active = v.filter(x=>x.currentStatus==="IN").length;
            let today = getWIBISO().slice(0,10);
            let todayCheck = logs.filter(l=> getWIBISO(l.time || l.logTime).slice(0,10)===today && l.action===ACTION_TYPES.CHECK_IN).length;
            const qh = window.getSyncQueueHealth ? window.getSyncQueueHealth() : { backlog: 0 };
            document.getElementById('statsWidget').innerHTML = `
                <div class="stat-card"><h4>Total Visitors</h4><div class="stat-number">${v.length}</div></div>
                <div class="stat-card"><h4>Active Inside</h4><div class="stat-number">${active}</div></div>
                <div class="stat-card"><h4>Check-ins Today</h4><div class="stat-number">${todayCheck}</div></div>
                <div class="stat-card"><h4>Replay Queue</h4><div class="stat-number">${qh.backlog || 0}</div><div class="stat-change">${(qh.syncFailStreak || 0) > 0 ? `⚠️ Sync fail streak: ${qh.syncFailStreak}` : '✅ Sync healthy'}</div></div>
            `;
            let last7 = [...Array(7)].map((_,i)=>{let d=new Date(getEventTimestamp() - i*86400000); return new Intl.DateTimeFormat('id-ID',{ timeZone:WIB_TIMEZONE, weekday:'short'}).format(d);}).reverse();
            let trend = last7.map((_,i)=>{let day = getWIBISO(getEventTimestamp() - (6-i)*86400000).slice(0,10); return logs.filter(l=>getWIBISO(l.time || l.logTime).slice(0,10)===day && l.action===ACTION_TYPES.CHECK_IN).length;});
            const trendCanvas = document.getElementById('trendChart');
            const categoryCanvas = document.getElementById('categoryChart');
            if(window.Chart && trendCanvas && categoryCanvas) {
                if(window.lineChart) window.lineChart.destroy();
                window.lineChart = new Chart(trendCanvas, { type:'line', data:{ labels:last7, datasets:[{ label:'Visit trend', data:trend, borderColor:'#1f4e4a', fill:false }] } });
                let catCount = { VVIP:0, VIP:0, UMUM:0 };
                v.forEach(x=>{ if(x.kategori) catCount[x.kategori]++; });
                if(window.pieChart) window.pieChart.destroy();
                window.pieChart = new Chart(categoryCanvas, { type:'pie', data:{ labels:['VVIP','VIP','UMUM'], datasets:[{ data:[catCount.VVIP,catCount.VIP,catCount.UMUM], backgroundColor:['#fbbf24','#94a3b8','#1f4e4a'] }] } });
            } else { if(trendCanvas) trendCanvas.style.display = 'none'; if(categoryCanvas) categoryCanvas.style.display = 'none'; }
            updateMonetizationUI();
        } catch(e) { console.error("Render dashboard error:", e); }
    }

    let __logRenderPending = false;
    let __lastLogSignature = "";
    function renderLogTable(){
        if (__logRenderPending) return;
        __logRenderPending = true;
        requestAnimationFrame(() => {
        try {
            let search = document.getElementById('searchLog')?.value.toLowerCase() || '';
            let filtered = logs
                .filter(l=> (l.name?.toLowerCase().includes(search) || l.reg?.toLowerCase().includes(search)) && (!l.site || l.site === SITE_ID))
                .sort((a,b)=> (Number(b.persistedAt || 0) || Date.parse(b.time || b.logTime || 0)) - (Number(a.persistedAt || 0) || Date.parse(a.time || a.logTime || 0)));
            const signature = `${SITE_ID}|${search}|${filtered.length}|${filtered[0]?.time || 0}`;
            if (signature === __lastLogSignature && document.hidden) return;
            __lastLogSignature = signature;
            let tbody = document.getElementById('logTableBody');
            if(!tbody) return;
            tbody.innerHTML = "";
            const windowed = filtered.slice(0, 300);
            windowed.forEach(l=>{
                let row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<input type="checkbox" class="logCheckItem" data-reg="${l.reg}">`;
                row.insertCell(1).innerText = l.reg;
                row.insertCell(2).innerText = l.name;
                row.insertCell(3).innerText = l.company;
                row.insertCell(4).innerHTML = `<span class="badge badge-${l.category}">${l.category}</span>`;
                row.insertCell(5).innerText = l.action;
                row.insertCell(6).innerText = formatWIB(l.time || l.logTime);
                row.insertCell(7).innerText = l.site || "SITE_A";
                let btn = document.createElement('button'); btn.innerText="PDF"; btn.classList.add('btn-outline'); btn.style.padding="4px 12px"; btn.onclick = () => { let siteKey = SITE_ID + "_" + l.reg; let v = visitors[siteKey]; if(v) showPreview(l.reg, v); };
                row.insertCell(8).appendChild(btn);
            });
            if (filtered.length > windowed.length) {
                let row = tbody.insertRow();
                const c = row.insertCell(0);
                c.colSpan = 9;
                c.innerText = `Menampilkan ${windowed.length} dari ${filtered.length} log terbaru. Gunakan search untuk filter lebih spesifik.`;
            }
        } catch(e) { console.error("Render log table error:", e); }
        finally { __logRenderPending = false; }
        });
    }

        document.getElementById('exportExcelAction').onclick = () => {
        if(isDemo()) { toast("Export tidak tersedia di DEMO mode. Upgrade license!", "error"); return; }
        try {
            if (!window.XLSX) {
                toast("Excel engine belum siap", "error");
                return;
            }

            const dataForExcel = [];

            Object.entries(visitors).forEach(([siteKey, visitor]) => {
                if (!siteKey.startsWith(SITE_ID + "_")) return;

                const reg = siteKey.replace(SITE_ID + "_", "");
                const now = new Date();
                const expDate = visitor.expDate ? new Date(visitor.expDate) : null;

                let masaBerlakuStatus = "";
                let keterangan = "";

                if (expDate) {
                    if (expDate < now) {
                        masaBerlakuStatus = "❌ EXPIRED";
                        keterangan = "QR Code sudah kadaluarsa";
                    } else {
                        const daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                        masaBerlakuStatus = `✅ AKTIF (sisa ${daysLeft} hari)`;
                        keterangan = `Berlaku hingga ${visitor.expDate}`;
                    }
                } else {
                    masaBerlakuStatus = "⚠️ TIDAK DITENTUKAN";
                    keterangan = "Tanggal kadaluarsa tidak diisi";
                }

                const hasAnyCheckIn = visitor.sessions && visitor.sessions.some(s => s.checkIn);

                if (!hasAnyCheckIn) {
                    keterangan += " | Belum pernah melakukan check-in";
                } else {
                    const isCurrentlyInside = visitor.currentStatus === "IN";
                    if (isCurrentlyInside) {
                        keterangan += " | Sedang berada di dalam area";
                    } else {
                        keterangan += " | Sudah check-out";
                    }
                }

                if (visitor.sessions && visitor.sessions.length > 0) {
                    visitor.sessions.forEach((session, idx) => {
                        const checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                        const checkOutDate = session.checkOut ? new Date(session.checkOut) : null;

                        const formatDateTime = (date) => {
                            if (!date) return "-";
                            const y = date.getFullYear();
                            const m = String(date.getMonth() + 1).padStart(2, '0');
                            const d = String(date.getDate()).padStart(2, '0');
                            const h = String(date.getHours()).padStart(2, '0');
                            const mi = String(date.getMinutes()).padStart(2, '0');
                            const s = String(date.getSeconds()).padStart(2, '0');
                            return `${y}-${m}-${d} ${h}:${mi}:${s}`;
                        };

                        let durationText = "-";
                        let statusText = "IN PROGRESS";
                        let sessionKeterangan = keterangan;

                        if (session.checkIn && session.checkOut) {
                            const durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000);
                            durationText = durationMinutes.toString();
                            statusText = "COMPLETED";
                            sessionKeterangan += ` | Durasi kunjungan: ${durationMinutes} menit`;
                        } else if (session.checkIn && !session.checkOut) {
                            durationText = "IN PROGRESS";
                            statusText = "IN PROGRESS";
                            const durationMinutes = Math.floor((now - session.checkIn) / 60000);
                            sessionKeterangan += ` | Sedang berkunjung (${durationMinutes} menit berjalan)`;
                        }

                        dataForExcel.push({
                            "Nama": visitor.nama || "-",
                            "No. Registrasi": reg,
                            "Perusahaan": visitor.perusahaan || "-",
                            "Kategori": visitor.kategori || "UMUM",
                            "Tujuan": visitor.tujuan || "-",
                            "PIC": visitor.pic || "-",
                            "Departemen": visitor.dept || "-",
                            "Sesi Ke": idx + 1,
                            "Check-In": formatDateTime(checkInDate),
                            "Check-Out": formatDateTime(checkOutDate),
                            "Durasi (menit)": durationText,
                            "Status Sesi": statusText,
                            "Masa Berlaku QR": masaBerlakuStatus,
                            "Tanggal Kadaluarsa": visitor.expDate || "-",
                            "Keterangan": sessionKeterangan
                        });
                    });
                } else {
                    dataForExcel.push({
                        "Nama": visitor.nama || "-",
                        "No. Registrasi": reg,
                        "Perusahaan": visitor.perusahaan || "-",
                        "Kategori": visitor.kategori || "UMUM",
                        "Tujuan": visitor.tujuan || "-",
                        "PIC": visitor.pic || "-",
                        "Departemen": visitor.dept || "-",
                        "Sesi Ke": "-",
                        "Check-In": "-",
                        "Check-Out": "-",
                        "Durasi (menit)": "-",
                        "Status Sesi": "TERDAFTAR (Belum ada aktivitas)",
                        "Masa Berlaku QR": masaBerlakuStatus,
                        "Tanggal Kadaluarsa": visitor.expDate || "-",
                        "Keterangan": keterangan + " | Belum melakukan scan QR"
                    });
                }
            });

            dataForExcel.sort((a, b) => (a["Nama"] || "").localeCompare(b["Nama"] || ""));

            const ws = XLSX.utils.json_to_sheet(dataForExcel);

            ws['!cols'] = [
                {wch:25}, {wch:18}, {wch:20}, {wch:12}, {wch:20},
                {wch:15}, {wch:15}, {wch:8}, {wch:20}, {wch:20},
                {wch:15}, {wch:18}, {wch:18}, {wch:18}, {wch:35}
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
            XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);

            toast("✅ Excel berhasil di export dengan kolom keterangan lengkap", "success");
        } catch(err) {
            console.error("Export error:", err);
            toast("Export gagal: " + err.message, "error");
        }
    };
