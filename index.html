<script>

// ================= DEVICE ID (WAJIB) =================
if(!localStorage.getItem("vms_device_id")){
localStorage.setItem("vms_device_id",
"dev_"+Date.now()+"_"+Math.random().toString(36).slice(2)
);
}

// ============================================================
// HARDENED LICENSE SYSTEM - HASH BASED (NO HARDCODE)
// ============================================================
let LICENSE_MODE = localStorage.getItem("vms_license") || "DEMO";
let WORKER_FEATURES = JSON.parse(localStorage.getItem("vms_worker_features") || "null");
let CURRENT_LICENSE = { mode: LICENSE_MODE, features: WORKER_FEATURES || {}, key: localStorage.getItem("vms_license_key") || "" };
window.CURRENT_LICENSE = CURRENT_LICENSE;
let currentUser = null;
let SITE_ID = localStorage.getItem("vms_site") || "SITE_A";
let lastScanTime = {};
const VMS_RUNTIME_VERSION = "1.0.13";

function safeParseJSON(raw, fallback = null){
    if(!raw) return fallback;
    try { return JSON.parse(raw); } catch(e) { return fallback; }
}

function normalizeLicenseMode(mode){
    const clean = String(mode || "DEMO").toUpperCase();
    return ["PRO", "BASIC", "DEMO"].includes(clean) ? clean : "DEMO";
}

function persistWorkerFeatures(features){
    if(!features || typeof features !== "object") return;
    WORKER_FEATURES = { ...(WORKER_FEATURES || {}), ...features };
    CURRENT_LICENSE.features = WORKER_FEATURES;
    try { localStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(e){}
    try { sessionStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(storageErr){
        console.warn("WORKER_FEATURE_SESSION_FAIL", {
            module:"Storage Runtime",
            reason:storageErr?.message || "session_storage_failed",
            action:"ignore_feature_cache"
        });
    }
}

function syncRuntimeLicenseContext(next = {}){
    const storedMode = next.mode || next.license || next.package || localStorage.getItem("vms_license") || sessionStorage.getItem("vms_license") || LICENSE_MODE;
    LICENSE_MODE = normalizeLicenseMode(storedMode);
    CURRENT_LICENSE.mode = LICENSE_MODE;
    CURRENT_LICENSE.key = next.key || localStorage.getItem("vms_license_key") || sessionStorage.getItem("vms_license_key") || CURRENT_LICENSE.key || "";
    try { localStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}
    try { sessionStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}

    const storedFeatures = next.features || safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
    if(storedFeatures) persistWorkerFeatures(storedFeatures);
    window.CURRENT_LICENSE = CURRENT_LICENSE;
    return CURRENT_LICENSE;
}

function getRuntimeFeatures(){
    if(!WORKER_FEATURES){
        const stored = safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
        if(stored) persistWorkerFeatures(stored);
    }
    return WORKER_FEATURES || CURRENT_LICENSE.features || {};
}

function canUseDynamicSites(){
    const features = getRuntimeFeatures();

    return (
        features?.allowSiteRename === true &&
        features?.staticSitesOnly !== true
    );
}

function getDefaultSites(){ return ["SITE_A", "SITE_B", "SITE_C"]; }
function getDynamicSites(){ return safeParseJSON(localStorage.getItem("vms_dynamic_sites"), []) || []; }

function buildSiteLabel(site){
    const icon = site === "SITE_A" ? "🏭" : (site === "SITE_B" ? "🏢" : (site === "SITE_C" ? "🏬" : "🌐"));
    return `${icon} ${site.replace(/_/g, " ")}`;
}

function renderSiteSelectors(){
    const dynamicEnabled = canUseDynamicSites();
    const sites = [...new Set([...getDefaultSites(), ...getDynamicSites(), SITE_ID].filter(Boolean))];
    document.querySelectorAll("#siteSelector, #siteSelectorTop").forEach(sel => {
        if(!sel) return;
        const previous = SITE_ID || sel.value || "SITE_A";
        sel.innerHTML = "";
        sites.forEach(site => {
            const opt = document.createElement("option");
            opt.value = site;
            opt.text = buildSiteLabel(site);
            sel.appendChild(opt);
        });
        if(dynamicEnabled){
            const createOpt = document.createElement("option");
            createOpt.value = "__CREATE_SITE__";
            createOpt.text = "➕ Rename / Create site...";
            sel.appendChild(createOpt);
        }
        sel.disabled = false;
        sel.style.pointerEvents = "auto";
        sel.title = dynamicEnabled ? "Site dinamis aktif dari license Worker" : "Static site mode";
        sel.value = sites.includes(previous) ? previous : "SITE_A";
    });
}

function handleSiteSelectorChange(e){
    const selected = e?.target?.value;
    if(selected === "__CREATE_SITE__"){
        if(!canUseDynamicSites()){
            toast("Rename/create site terkunci oleh license saat ini", "error");
            renderSiteSelectors();
            return;
        }
        const proposed = prompt("Masukkan nama site baru / rename site:", SITE_ID || "");
        if(proposed && proposed.trim()) setSite(proposed);
        else renderSiteSelectors();
        return;
    }
    setSite(selected);
}

function safeParseJSON(raw, fallback = null){
    if(!raw) return fallback;
    try { return JSON.parse(raw); } catch(e) { return fallback; }
}

function normalizeLicenseMode(mode){
    const clean = String(mode || "DEMO").toUpperCase();
    return ["PRO", "BASIC", "DEMO"].includes(clean) ? clean : "DEMO";
}

function persistWorkerFeatures(features){
    if(!features || typeof features !== "object") return;
    WORKER_FEATURES = { ...(WORKER_FEATURES || {}), ...features };
    CURRENT_LICENSE.features = WORKER_FEATURES;
    try { localStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(e){}
    try { sessionStorage.setItem("vms_worker_features", JSON.stringify(WORKER_FEATURES)); } catch(storageErr){
        console.warn("WORKER_FEATURE_SESSION_FAIL", {
            module:"Storage Runtime",
            reason:storageErr?.message || "session_storage_failed",
            action:"ignore_feature_cache"
        });
    }
}

function syncRuntimeLicenseContext(next = {}){
    const storedMode = next.mode || next.license || next.package || localStorage.getItem("vms_license") || sessionStorage.getItem("vms_license") || LICENSE_MODE;
    LICENSE_MODE = normalizeLicenseMode(storedMode);
    CURRENT_LICENSE.mode = LICENSE_MODE;
    CURRENT_LICENSE.key = next.key || localStorage.getItem("vms_license_key") || sessionStorage.getItem("vms_license_key") || CURRENT_LICENSE.key || "";
    try { localStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}
    try { sessionStorage.setItem("vms_license", LICENSE_MODE); } catch(e){}

    const storedFeatures = next.features || safeParseJSON(localStorage.getItem("vms_worker_features"), null) || safeParseJSON(sessionStorage.getItem("vms_worker_features"), null);
    if(storedFeatures) persistWorkerFeatures(storedFeatures);
    window.CURRENT_LICENSE = CURRENT_LICENSE;
    return CURRENT_LICENSE;
}

let ANTI_NAKAL = {
    lastSite: localStorage.getItem("vms_last_site") || null,
    lastGPS: localStorage.getItem("vms_last_gps") || null,
    lastOnline: Date.now(),
    flags: []
};

function getGPS(){
    return new Promise((resolve) => {
        if(!navigator.geolocation){
            resolve(null);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            function(pos) {
                resolve({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });
            },
            function(error) {
                console.warn("GPS error (getGPS):", error.message);
                resolve(null);
            }
        );
    });
}

function distanceKM(a, b){
    if(!a || !b) return 0;

    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI/180;
    const dLon = (b.lon - a.lon) * Math.PI/180;

    const x =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(a.lat*Math.PI/180) *
        Math.cos(b.lat*Math.PI/180) *
        Math.sin(dLon/2)*Math.sin(dLon/2);

    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function runAntiNakalCheck(){

    const deviceId = localStorage.getItem("vms_device_id");
    const site = SITE_ID;
    const now = Date.now();

    // ======================
    // 1. SITE SWITCH DETECT
    // ======================
    if(ANTI_NAKAL.lastSite && ANTI_NAKAL.lastSite !== site){
        ANTI_NAKAL.flags.push({
            type: "SITE_JUMP",
            from: ANTI_NAKAL.lastSite,
            to: site,
            time: now
        });
    }

    ANTI_NAKAL.lastSite = site;
    localStorage.setItem("vms_last_site", site);

    // ======================
    // 2. GPS CHECK
    // ======================
    const gps = await getGPS();

    if(gps){
        if(ANTI_NAKAL.lastGPS){
            const dist = distanceKM(ANTI_NAKAL.lastGPS, gps);

            if(dist > 5){ // 🔥 radius 5km
                ANTI_NAKAL.flags.push({
                    type: "GPS_ANOMALY",
                    distance: dist.toFixed(2),
                    time: now
                });
            }
        }

        ANTI_NAKAL.lastGPS = gps;
        localStorage.setItem("vms_last_gps", JSON.stringify(gps));
    }

    // ======================
    // 3. OFFLINE ABUSE
    // ======================
    if(!navigator.onLine){
        ANTI_NAKAL.lastOnline = now;
    }else{
        const offlineDuration = now - ANTI_NAKAL.lastOnline;

        if(offlineDuration > 1000 * 60 * 30){ // 30 menit
            ANTI_NAKAL.flags.push({
                type: "OFFLINE_ABUSE",
                duration: Math.floor(offlineDuration / 60000),
                time: now
            });
        }
    }

    // ======================
    // 4. SAVE REPORT
    // ======================
    localStorage.setItem("vms_anti_flags", JSON.stringify(ANTI_NAKAL.flags.slice(-20)));

}

function setSite(site){

    if(!site || site.trim() === ""){
        toast("Site kosong", "error");
        return;
    }

    const clean = site
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9_ ]/g, "")
        .replace(/\s+/g, "_");

    const previousSite = SITE_ID;

    const defaultSites = getDefaultSites();
    const isExistingDefault = defaultSites.includes(clean);
    let dynamicSites = getDynamicSites();
    const features = getRuntimeFeatures();
    const workerMaxDynamicSites = Number(features?.maxDynamicSites || 0);
    if(!isExistingDefault){
        if(!canUseDynamicSites()){
            SITE_ID = previousSite;
            toast("Rename/create site terkunci oleh license saat ini", "error");
            renderSiteSelectors();
            return;
        }
        if(!dynamicSites.includes(clean)){
            if(workerMaxDynamicSites > 0 && dynamicSites.length >= workerMaxDynamicSites){ SITE_ID = previousSite; toast("Limit dynamic site tercapai", "error"); renderSiteSelectors(); return; }
            dynamicSites.push(clean);
            localStorage.setItem("vms_dynamic_sites", JSON.stringify(dynamicSites));
        }
    }

    SITE_ID = clean;
    localStorage.setItem("vms_site", SITE_ID);

    renderSiteSelectors();

    toast(`Site aktif: ${SITE_ID}`, "success");

    if(window.renderDashboard) window.renderDashboard();
    if(window.renderLogTable) window.renderLogTable();
    if(window.updateMonetizationUI) window.updateMonetizationUI();
}

        const res = await fetch(WORKER_BASE_URL + "/license-context", {
            method: "POST",
            headers: { "Content-Type": "application/json" },

function getCurrentVisitorCount() {
    return Object.keys(visitors).filter(k => k.startsWith(SITE_ID + "_")).length;
}

function getBasicMaxVisitor() { return 150; }
function getDemoMaxRegister() { return 5; }
function getDemoMaxScan() { return 5; }

function getCurrentScanCount() {
    return logs.filter(l => (l.action === "CHECK_IN" || l.action === "CHECK_OUT") && l.site === SITE_ID).length;
}

function isBasicLimitReached() {
    if(!isBasic()) return false;
    const count = getCurrentVisitorCount();
    return count >= getBasicMaxVisitor();
}

function isBasicWarning() {
    if(!isBasic()) return false;
    const count = getCurrentVisitorCount();
    const max = getBasicMaxVisitor();
    if(count >= max) return "critical";
    if(count >= max * 0.93) return "critical";
    if(count >= max * 0.8) return "warning";
    return null;
}

function checkBasicLimit() {
    if(!isBasic()) return true;
    if(isBasicLimitReached()) {
        alert("LIMIT BASIC TERCAPAI\nUpgrade ke PRO untuk akses tanpa batas");
        return false;
    }
    const warning = isBasicWarning();
    if(warning === "critical") {
        toast("⚠️ PERINGATAN KRITIS! Hampir mencapai limit BASIC (150). Hapus data atau upgrade ke PRO!", "error");
    } else if(warning === "warning") {
        toast("⚠️ Peringatan: Sudah mencapai 80% limit BASIC. Upgrade ke PRO untuk unlimited!", "warning");
    }
    return true;
}

    if(isDemo()) {
        return getCurrentVisitorCount() < getDemoMaxRegister();
    }
    if(isBasic()) {
        return getCurrentVisitorCount() < getBasicMaxVisitor();

    return true;
}

function canScanSilent() {
    if(isDemo()) {

// SECURE STORAGE WITH SIGNATURE (ANTI TAMPER)
// ============================================================
let visitors = {};
let logs = [];
let auditLogs = [];

async function signData(data){
    const enc = new TextEncoder().encode(JSON.stringify(data) + "VMS_LOCK_v2");
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
}

async function secureSave(){
    try {
        const payload = { visitors, logs, auditLogs };
        const sig = await signData(payload);
        localStorage.setItem("vms_secure", JSON.stringify({ payload, sig }));
        localStorage.setItem("vms_visitors_backup", JSON.stringify(visitors));
        if(window.updateMonetizationUI) window.updateMonetizationUI();
    } catch(e) { console.warn("Save error:", e); }
}

async function secureLoad(){
    try {
        let raw = localStorage.getItem("vms_secure");
        if(!raw) {
            let v = localStorage.getItem("vms_visitors_backup");
            if(v) visitors = JSON.parse(v);
            return;
        }
        let parsed = JSON.parse(raw);
        let check = await signData(parsed.payload);
        if(check === parsed.sig){
            visitors = parsed.payload.visitors || {};
            logs = parsed.payload.logs || [];
            auditLogs = parsed.payload.auditLogs || [];
        } else {
            console.warn("Data tamper detected! Resetting...");
            visitors = {};
            logs = [];
            auditLogs = [];
        }
    } catch(e) { console.warn("Load error:", e); }
}

window.saveStore = secureSave;

    async function generateSignature(payload){
        const enc = new TextEncoder().encode(payload + QR_SECRET);
        const hash = await crypto.subtle.digest('SHA-256', enc);
        return btoa(String.fromCharCode(...new Uint8Array(hash)));
    }

    async function buildQR(reg, data){
        const ts = Date.now();
        const payload = JSON.stringify({
            reg: reg,
            nama: data.nama,
            perusahaan: data.perusahaan,
            exp: data.expDate,
            ts: ts
        });
        const sig = await generateSignature(payload);
        return btoa(JSON.stringify({ payload, sig, ts }));
    }
    
    async function parseQR(raw){
        try{
            const decoded = JSON.parse(atob(raw));
            const expectedSig = await generateSignature(decoded.payload);
            if(decoded.sig !== expectedSig) return null;
            const payloadData = JSON.parse(decoded.payload);
            return payloadData;
        }catch(e){
            return null;
        }
    }

    async function waitQRCodeReady(){
        let retry = 0;
        while(typeof QRCode === "undefined" && retry < 20){
            await new Promise(r=>setTimeout(r,100));
            retry++;
        }
        return typeof QRCode !== "undefined";
    }

    async function generateQRImage(qrPayload){
        const ready = await waitQRCodeReady();
        const reportedMemory = Number(navigator.deviceMemory || 0);

        const lowRam =
            !navigator.deviceMemory ||
            !Number.isFinite(reportedMemory) ||
            reportedMemory <= 4;

        // Mobile thermal printer tidak membutuhkan QR ultra-HD.
        // 1024 canvas terlalu berat untuk Android low RAM/WebView.
        // 320-512 sudah cukup untuk scan reliability.
        const qrSize = lowRam ? 320 : 512;
        if(ready){
            try{
                const canvas = document.createElement('canvas');
                await QRCode.toCanvas(canvas, qrPayload, {
                    width: qrSize,
                    margin: 1,
                    errorCorrectionLevel: 'H',
                    color: { dark: '#000000', light: '#FFFFFF' }
                });
                const exported = canvas.toDataURL(
                    lowRam ? "image/webp" : "image/png",
                    lowRam ? 0.92 : 1.0
                );

                // Android WebView kadang lambat GC canvas memory.
                // Release canvas bitmap secepat mungkin.
                canvas.width = 1;
                canvas.height = 1;

                return exported;
            }catch(e){ console.warn("Local QR failed:", e); }
        }
        for(let i=0;i<2;i++){
            try{
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&ecc=H&margin=1&data=${encodeURIComponent(qrPayload)}`;
                const img = new Image();
                img.crossOrigin = "Anonymous";
                const result = await new Promise((resolve)=>{
                    img.onload = ()=>{
                        const canvas = document.createElement('canvas');
                        canvas.width = qrSize;
                        canvas.height = qrSize;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = false;
                        ctx.fillStyle = "white";
                        ctx.fillRect(0,0,qrSize,qrSize);
                        ctx.drawImage(img,0,0,qrSize,qrSize);
                        const exported = canvas.toDataURL(
                            lowRam ? "image/webp" : "image/png",
                            lowRam ? 0.92 : 1.0
                        );

                        // Android WebView kadang lambat GC canvas memory.
                        // Release canvas bitmap secepat mungkin.
                        canvas.width = 1;
                        canvas.height = 1;

                        resolve(exported);
                    };
                    img.onerror = ()=>resolve(null);
                    img.src = qrUrl;
                    setTimeout(()=>resolve(null), 3000);
                });
                if(result) return result;
            } catch(e){ console.warn("Retry QR API:", i, e); }
        }
        return null;
    }

    function drawAutoFitText(doc, text, box, options = {}){
        const normalized = String(text || options.fallback || "-").replace(/\s+/g, " ").trim() || (options.fallback || "-");
        const maxChars = options.maxChars || 900;
        const clean = normalized.length > maxChars ? `${normalized.slice(0, maxChars)} (lanjutan di sistem)` : normalized;
        const minFont = Math.max(options.minFont || 3.2, 3.2);
        const absoluteMinFont = Math.max(options.absoluteMinFont || 2.8, 2.8);
        const maxFont = Math.max(options.maxFont || 8, minFont);
        const lineRatio = options.lineRatio || 1.18;
        const fontStyle = options.fontStyle || 'normal';
        const color = options.color || [15,23,42];
        const align = options.align || 'left';
        const maxLines = Math.max(1, Math.min(options.maxLines || 12, 18));
        let fontSize = maxFont;
        let lines = [];
        let lineHeight = 0;
        doc.setFont(undefined, fontStyle);
        let safety = 0;

        while(fontSize >= absoluteMinFont && safety < 40){
            safety++;
            doc.setFontSize(fontSize);
            lines = doc.splitTextToSize(clean, box.w).slice(0, maxLines);
            lineHeight = fontSize * 0.3528 * lineRatio;
            if((lines.length * lineHeight) <= box.h) break;
            fontSize -= 0.2;
        }
        if(lines.length && (lines.length * lineHeight) > box.h){
            lineHeight = Math.max(1, box.h / lines.length);
            fontSize = Math.max(absoluteMinFont, Math.min(fontSize, lineHeight / (0.3528 * lineRatio)));
            doc.setFontSize(fontSize);
        }
        doc.setTextColor(...color);
        doc.setFont(undefined, fontStyle);
        doc.setFontSize(fontSize);
        const textX = align === 'center' ? box.x + (box.w / 2) : box.x;
        const baselineAdjust = Math.max(fontSize * 0.31, 0.9);
        lines.forEach((line, idx)=>{
            const unclampedY = box.y + (idx * lineHeight) + baselineAdjust;
            const y = Math.min(box.y + box.h - 0.6, Math.max(box.y + baselineAdjust, unclampedY));
            doc.text(line, textX, y, { align });
        });
        return { fontSize, lines, lineHeight, height: lines.length * lineHeight };
    }

    async function prepareBadgePhotoImage(src){
        if(!src || !String(src).startsWith('data')) return null;
        return new Promise((resolve)=>{
            let done = false;

            const safeResolve = (value)=>{
                if(done) return;
                done = true;
                resolve(value);
            };

            const img = new Image();

            img.onload = ()=>{
                try{
                    const maxPx = 512;
                    const scale = Math.min(1, maxPx / Math.max(img.width || maxPx, img.height || maxPx));
                    const w = Math.max(1, Math.round((img.width || maxPx) * scale));
                    const h = Math.max(1, Math.round((img.height || maxPx) * scale));
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0,0,w,h);
                    ctx.drawImage(img,0,0,w,h);
                    const optimizedPhoto = canvas.toDataURL('image/jpeg', 0.78);

                    // Release bitmap memory aggressively untuk Android WebView
                    canvas.width = 1;
                    canvas.height = 1;

                    safeResolve(optimizedPhoto);
                }catch(e){ safeResolve(src); }
            };
            img.onerror = ()=>safeResolve(src);
            img.src = src;
            setTimeout(()=>safeResolve(src), 1800);
        });
    }

    async function downloadPDFStable(reg, data, selectedOrientation){
        try{
            const ready = await ensureJsPDFReady();
            if(!ready){ toast("PDF engine gagal dimuat. Coba refresh.", "error"); return false; }
            const { jsPDF } = window.jspdf;
            const orientation = (selectedOrientation || getBadgePDFConfig().orientation || 'landscape') === 'portrait' ? 'portrait' : 'landscape';
            setBadgePDFOrientation(orientation);
            const format = orientation === 'portrait' ? [54, 86] : [86, 54];
            const doc = new jsPDF({
                orientation,
                unit: 'mm',
                format
            });

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 3;
            const headerH = orientation === 'portrait' ? 11 : 10;
            const footerH = 5;
            let accentColor = [31,78,74];
            if(data.kategori === "VVIP") accentColor = [217,119,6];
            else if(data.kategori === "VIP") accentColor = [100,116,139];
            const cleanText = (value, fallback = "-") => String(value || fallback).replace(/\s+/g, " ").trim();

            doc.setFillColor(248,250,252);
            doc.rect(0, 0, pageWidth, pageHeight, 'F');
            doc.setFillColor(...accentColor);
            doc.roundedRect(0, 0, pageWidth, headerH, 2, 2, 'F');
            doc.setTextColor(255,255,255);
            doc.setFont(undefined, 'bold');
            doc.setFontSize(orientation === 'portrait' ? 8 : 8.5);
            doc.text("VISITOR BADGE", pageWidth / 2, headerH - 3.5, { align:"center" });

            doc.setDrawColor(...accentColor);
            doc.setLineWidth(0.5);
            doc.roundedRect(2, 2, pageWidth - 4, pageHeight - 4, 3, 3, 'S');

            const contentTop = headerH + 3;
            const contentBottom = pageHeight - footerH - 2;
            const contentH = contentBottom - contentTop;
            const isPortrait = orientation === 'portrait';
            const qrSize = isPortrait ? Math.min(22, pageWidth - (margin * 2) - 12) : Math.min(20, pageHeight - 34);
            const photoSize = isPortrait ? 16 : 22;
            const photoX = isPortrait ? (pageWidth - photoSize) / 2 : margin + 2;
            const photoY = contentTop;
            const qrX = isPortrait ? (pageWidth - qrSize) / 2 : pageWidth - margin - qrSize - 2;
            const textX = isPortrait ? margin + 3 : photoX + photoSize + 4;
            const textW = isPortrait ? pageWidth - ((margin + 3) * 2) : Math.max(28, qrX - 3 - textX);
            const textTop = isPortrait ? photoY + photoSize + 2.5 : contentTop + 2;
            const textBlockBottom = isPortrait ? contentBottom - qrSize - 7 : contentBottom - 10;
            const qrY = isPortrait ? textBlockBottom + 2 : contentTop + 4;
            const purposeBoxH = isPortrait ? Math.max(12, textBlockBottom - textTop - 16) : Math.max(11, contentBottom - textTop - 16);

            const safePhoto = await prepareBadgePhotoImage(data.foto);
            if(safePhoto){
                try{ doc.addImage(safePhoto, 'JPEG', photoX, photoY, photoSize, photoSize, undefined, 'FAST'); }
                catch(e){ try{ doc.addImage(safePhoto, 'PNG', photoX, photoY, photoSize, photoSize, undefined, 'FAST'); }catch(imgErr){} }
            } else {
                doc.setFillColor(226,232,240);
                doc.roundedRect(photoX, photoY, photoSize, photoSize, 2, 2, 'F');
                drawAutoFitText(doc, "NO PHOTO", { x: photoX + 1, y: photoY + (photoSize/2) - 2, w: photoSize - 2, h: 4 }, { maxFont: 5.5, minFont: 4, align: 'center', color: [100,116,139] });
            }

            drawAutoFitText(doc, cleanText(data.nama).toUpperCase(), { x: textX, y: textTop, w: textW, h: isPortrait ? 7 : 6 }, { maxFont: isPortrait ? 6.8 : 8.5, minFont: 3.4, fontStyle: 'bold', maxLines: 2 });
            drawAutoFitText(doc, cleanText(data.perusahaan), { x: textX, y: textTop + (isPortrait ? 7.4 : 7), w: textW, h: isPortrait ? 5.5 : 5 }, { maxFont: 5.8, minFont: 3.2, color: [15,23,42], maxLines: 2 });
            drawAutoFitText(doc, `Tujuan: ${cleanText(data.tujuan)}`, { x: textX, y: textTop + (isPortrait ? 13 : 12), w: textW, h: purposeBoxH }, { maxFont: 5.7, minFont: 3.2, color: [15,23,42], maxLines: isPortrait ? 7 : 5 });
            drawAutoFitText(doc, `Site: ${cleanText(SITE_ID)}`, { x: textX, y: textBlockBottom - 8.5, w: textW, h: 4 }, { maxFont: 5.2, minFont: 3.2, color: [71,85,105], maxLines: 1 });
            drawAutoFitText(doc, `Valid Until: ${cleanText(data.expDate)}`, { x: textX, y: textBlockBottom - 4.2, w: textW, h: 4 }, { maxFont: 5.4, minFont: 3.2, fontStyle: 'bold', color: accentColor, maxLines: 1 });

            const qrPayload = await buildQR(reg, data);
            const qrBase64 = await generateQRImage(qrPayload);
            if(qrBase64 && qrBase64.startsWith("data:image")){
                try{ doc.addImage(qrBase64, 'PNG', qrX, qrY, qrSize, qrSize, undefined, 'NONE'); }
                catch(e){ doc.setTextColor(239,68,68); doc.setFontSize(6); doc.text("QR ERROR", qrX + qrSize/2, qrY + qrSize/2, { align:"center" }); }
            } else {
                doc.setTextColor(239,68,68);
                doc.setFontSize(6);
                doc.text("QR FAILED", qrX + qrSize/2, qrY + qrSize/2, { align:"center" });
            }

            drawAutoFitText(doc, `REG ${reg}`, { x: qrX - 1, y: qrY + qrSize + 2, w: qrSize + 2, h: 5 }, { maxFont: 5.5, minFont: 3, align: 'center', color: [71,85,105] });
            drawAutoFitText(doc, "Mobile Thermal Ready", { x: margin, y: pageHeight - 5, w: pageWidth - (margin * 2), h: 4 }, { maxFont: 5.5, minFont: 3.2, align: 'center', color: [71,85,105] });

            const success = forceDownloadPDF(doc, `BADGE_${reg}_${orientation.toUpperCase()}.pdf`);
            if(!success){ toast("Download gagal. Gunakan browser Chrome.", "error"); return false; }
            toast(`Badge ID ${reg} berhasil didownload`, "success");
            return true;
        }catch(err){ console.error("BADGE PDF ERROR:", err); toast("Terjadi error saat generate Badge ID", "error"); return false; }
    }

    let scannerInstance = null;
    let isScanning = false;
    let currentCameraId = null;
    let lastQrErrorToastAt = 0;
    const CAMERA_PREF_KEY = "vms_camera_pref";

    function resolveCameraPreference(cameras){
        const preferred = localStorage.getItem(CAMERA_PREF_KEY) || "auto_back";
        const rememberedCameraId = localStorage.getItem("vms_last_camera_id");
        const remembered = cameras.find(c => c.id === rememberedCameraId);
        if (remembered) return remembered.id;
        const byType = {
            auto_back: cameras.find(cam => /back|rear|belakang/i.test(cam.label || "")),
            auto_front: cameras.find(cam => /front|user|depan/i.test(cam.label || "")),
            auto_external: cameras.find(cam => /external|usb|virtual|obs/i.test(cam.label || ""))
        };
        return (byType[preferred] || byType.auto_back || cameras[0] || {}).id || null;
    }

    async function initScanner() {
        if (scannerInstance) { await stopScanner(); }
        try {
            const cameras = await Html5Qrcode.getCameras();
            if (!cameras || cameras.length === 0) { toast("Tidak ada kamera terdeteksi", "error"); return false; }
            currentCameraId = resolveCameraPreference(cameras);
            scannerInstance = new Html5Qrcode("cameraPreview");
            return true;
        } catch (err) { console.error("Init scanner error:", err); toast("Gagal inisialisasi kamera", "error"); return false; }
    }

    async function startScanner() {
        if (isScanning) return;
        if (!scannerInstance) { const init = await initScanner(); if (!init) return; }
        try {
            await scannerInstance.start(currentCameraId, { fps: 10, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
                async (decodedText) => {
                    if (!canScan()) return;
                    if (processingRegs.has(decodedText)) { return; }
                    try { await processScan(decodedText); } catch (err) {}
                },
                (error) => {
                    if (error && !error.includes("No MultiFormat Readers")) {
                        const now = Date.now();
                        if(now - lastQrErrorToastAt > 5000){
                            lastQrErrorToastAt = now;
                            console.log("Scan error:", error);
                        }
                    }
                }
            );
            isScanning = true;
            if(currentCameraId) localStorage.setItem("vms_last_camera_id", currentCameraId);
            toast("Scanner siap - unlimited scan mode", "success");
        } catch (err) { console.error("Start scanner error:", err); toast("Gagal start kamera: " + err.message, "error"); isScanning = false; }
    }

    async function stopScanner() {
        if (scannerInstance && isScanning) { try { await scannerInstance.stop(); await scannerInstance.clear(); } catch (err) { console.error("Stop scanner error:", err); } }
        isScanning = false;
    }

    async function cleanupScanner() {
        if (scannerInstance) { try { await scannerInstance.stop().catch(()=>{}); await scannerInstance.clear().catch(()=>{}); } catch (e) {} scannerInstance = null; }
        isScanning = false;
        const container = document.getElementById("cameraPreview");
        if(container) container.innerHTML = "";
    }

    document.getElementById('uploadQrFile').onchange = async (e) => {

        if(!file) return;
        try {
            if(!window.Html5Qrcode){ toast("QR engine belum siap", "error"); return; }
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.src = url;
            await img.decode();
            URL.revokeObjectURL(url);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            const scanner = new Html5Qrcode("temp-reader");
            const decoded = await scanner.scanImage(canvas, { qrbox: { width: img.width, height: img.height } });
            await processScan(decoded);
            await scanner.clear();
            document.getElementById("temp-reader").innerHTML = "";
        } catch(err){ console.error(err); toast("QR tidak terbaca / file tidak valid", "error"); }
    };
    
    async function processScan(qrText){
        let mode = document.getElementById('scanMode').value;
        let payload = await parseQR(qrText);
        if(!payload){ toast("QR tidak valid (bukan dari sistem ini)","error"); return; }
        let reg = payload.reg;
        
        if(lastScanTime[reg] && Date.now() - lastScanTime[reg] < 350){
            toast("Scan terlalu cepat","warning");
            return;
        }
        lastScanTime[reg] = Date.now();
        
        if(processingRegs.has(reg)){ toast("Sedang diproses, tunggu sebentar","warning"); return; }
        processingRegs.add(reg);
        try {
            let siteKey = SITE_ID + "_" + reg;
            let visitor = visitors[siteKey];
            if(!visitor){ toast(`Visitor ${reg} tidak ditemukan`,"error"); return; }
            let exp = new Date(visitor.expDate);
            exp.setHours(23,59,59,999);
            if(exp < new Date()){ toast("QR sudah expired","error"); return; }
            if(mode === "CHECK_IN"){
                if(!visitor.sessions) visitor.sessions = [];
                visitor.sessions.push({ checkIn: Date.now(), checkOut: null });
                visitors[siteKey] = { ...visitor, currentStatus: "IN", updatedAt: Date.now(), version: (visitor.version || 0) + 1, deviceId: deviceId, site: SITE_ID };
                addLog(reg, "CHECK_IN");
                toast(`✅ CHECK-IN ${visitor.nama} berhasil`,"success");
            } else {
                if(!visitor.sessions) visitor.sessions = [];
                let openSession = null;
                for(let i = visitor.sessions.length - 1; i >= 0; i--){ if(!visitor.sessions[i].checkOut){ openSession = visitor.sessions[i]; break; } }
                if(!openSession){ toast("Tidak ada sesi check-in aktif, tetap diproses sebagai check-out","warning"); visitor.sessions.push({ checkIn: Date.now(), checkOut: Date.now() }); }
                else { openSession.checkOut = Date.now(); }
                visitors[siteKey] = { ...visitor, currentStatus: "OUT", updatedAt: Date.now(), version: (visitor.version || 0) + 1, deviceId: deviceId, site: SITE_ID };
                addLog(reg, "CHECK_OUT");
                toast(`✅ CHECK-OUT ${visitor.nama} berhasil`,"success");
            }
            renderDashboard(); 
            renderLogTable();
            secureSave();
            updateMonetizationUI();
        } finally { setTimeout(()=>processingRegs.delete(reg), 1000); }
    }

    let __logRenderPending = false;
    let __lastLogSignature = "";
    function renderLogTable(){
        if (__logRenderPending) return;
        __logRenderPending = true;
        requestAnimationFrame(() => {
        try {
            let search = document.getElementById('searchLog')?.value.toLowerCase() || '';
            let filtered = logs
                .filter(l=> (l.name?.toLowerCase().includes(search) || l.reg?.toLowerCase().includes(search)) && (!l.site || l.site === SITE_ID))
                .sort((a,b)=> (Number(b.persistedAt || 0) || Date.parse(b.time || b.logTime || 0)) - (Number(a.persistedAt || 0) || Date.parse(a.time || a.logTime || 0)));
            const signature = `${SITE_ID}|${search}|${filtered.length}|${filtered[0]?.time || 0}`;
            if (signature === __lastLogSignature && document.hidden) return;
            __lastLogSignature = signature;
            let tbody = document.getElementById('logTableBody');
            if(!tbody) return;
            tbody.innerHTML = "";
            const windowed = filtered.slice(0, 300);
            windowed.forEach(l=>{
                let row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<input type="checkbox" class="logCheckItem" data-reg="${l.reg}">`;
                row.insertCell(1).innerText = l.reg;
                row.insertCell(2).innerText = l.name;
                row.insertCell(3).innerText = l.company;
                row.insertCell(4).innerHTML = `<span class="badge badge-${l.category}">${l.category}</span>`;
                row.insertCell(5).innerText = l.action;
                row.insertCell(6).innerText = new Date(l.time).toLocaleString();
                row.insertCell(7).innerText = l.site || "SITE_A";
                let btn = document.createElement('button'); btn.innerText="PDF"; btn.classList.add('btn-outline'); btn.style.padding="4px 12px"; btn.onclick = () => { let siteKey = SITE_ID + "_" + l.reg; let v = visitors[siteKey]; if(v) showPreview(l.reg, v); };
                row.insertCell(8).appendChild(btn);
            });
            if (filtered.length > windowed.length) {
                let row = tbody.insertRow();
                const c = row.insertCell(0);
                c.colSpan = 9;
                c.innerText = `Menampilkan ${windowed.length} dari ${filtered.length} log terbaru. Gunakan search untuk filter lebih spesifik.`;
            }
        } catch(e) { console.error("Render log table error:", e); }
        finally { __logRenderPending = false; }
        });
    }

        document.getElementById('exportExcelAction').onclick = () => {
        if(isDemo()) { toast("Export tidak tersedia di DEMO mode. Upgrade license!", "error"); return; }
        try {
            if (!window.XLSX) {
                toast("Excel engine belum siap", "error");
                return;
            }

            const dataForExcel = [];

            Object.entries(visitors).forEach(([siteKey, visitor]) => {
                if (!siteKey.startsWith(SITE_ID + "_")) return;

                const reg = siteKey.replace(SITE_ID + "_", "");
                const now = new Date();
                const expDate = visitor.expDate ? new Date(visitor.expDate) : null;
                
                let masaBerlakuStatus = "";
                let keterangan = "";
                
                if (expDate) {
                    if (expDate < now) {
                        masaBerlakuStatus = "❌ EXPIRED";
                        keterangan = "QR Code sudah kadaluarsa";
                    } else {
                        const daysLeft = Math.ceil((expDate - now) / (1000 * 60 * 60 * 24));
                        masaBerlakuStatus = `✅ AKTIF (sisa ${daysLeft} hari)`;
                        keterangan = `Berlaku hingga ${visitor.expDate}`;
                    }
                } else {
                    masaBerlakuStatus = "⚠️ TIDAK DITENTUKAN";
                    keterangan = "Tanggal kadaluarsa tidak diisi";
                }

                const hasAnyCheckIn = visitor.sessions && visitor.sessions.some(s => s.checkIn);
                
                if (!hasAnyCheckIn) {
                    keterangan += " | Belum pernah melakukan check-in";
                } else {
                    const isCurrentlyInside = visitor.currentStatus === "IN";
                    if (isCurrentlyInside) {
                        keterangan += " | Sedang berada di dalam area";
                    } else {
                        keterangan += " | Sudah check-out";
                    }
                }

                if (visitor.sessions && visitor.sessions.length > 0) {
                    visitor.sessions.forEach((session, idx) => {
                        const checkInDate = session.checkIn ? new Date(session.checkIn) : null;
                        const checkOutDate = session.checkOut ? new Date(session.checkOut) : null;
                        
                        const formatDateTime = (date) => {
                            if (!date) return "-";
                            const y = date.getFullYear();
                            const m = String(date.getMonth() + 1).padStart(2, '0');
                            const d = String(date.getDate()).padStart(2, '0');
                            const h = String(date.getHours()).padStart(2, '0');
                            const mi = String(date.getMinutes()).padStart(2, '0');
                            const s = String(date.getSeconds()).padStart(2, '0');
                            return `${y}-${m}-${d} ${h}:${mi}:${s}`;
                        };

                        let durationText = "-";
                        let statusText = "IN PROGRESS";
                        let sessionKeterangan = keterangan;

                        if (session.checkIn && session.checkOut) {
                            const durationMinutes = Math.floor((session.checkOut - session.checkIn) / 60000);
                            durationText = durationMinutes.toString();
                            statusText = "COMPLETED";
                            sessionKeterangan += ` | Durasi kunjungan: ${durationMinutes} menit`;
                        } else if (session.checkIn && !session.checkOut) {
                            durationText = "IN PROGRESS";
                            statusText = "IN PROGRESS";
                            const durationMinutes = Math.floor((now - session.checkIn) / 60000);
                            sessionKeterangan += ` | Sedang berkunjung (${durationMinutes} menit berjalan)`;
                        }

                        dataForExcel.push({
                            "Nama": visitor.nama || "-",
                            "No. Registrasi": reg,
                            "Perusahaan": visitor.perusahaan || "-",
                            "Kategori": visitor.kategori || "UMUM",
                            "Tujuan": visitor.tujuan || "-",
                            "PIC": visitor.pic || "-",
                            "Departemen": visitor.dept || "-",
                            "Sesi Ke": idx + 1,
                            "Check-In": formatDateTime(checkInDate),
                            "Check-Out": formatDateTime(checkOutDate),
                            "Durasi (menit)": durationText,
                            "Status Sesi": statusText,
                            "Masa Berlaku QR": masaBerlakuStatus,
                            "Tanggal Kadaluarsa": visitor.expDate || "-",
                            "Keterangan": sessionKeterangan
                        });
                    });
                } else {
                    dataForExcel.push({
                        "Nama": visitor.nama || "-",
                        "No. Registrasi": reg,
                        "Perusahaan": visitor.perusahaan || "-",
                        "Kategori": visitor.kategori || "UMUM",
                        "Tujuan": visitor.tujuan || "-",
                        "PIC": visitor.pic || "-",
                        "Departemen": visitor.dept || "-",
                        "Sesi Ke": "-",
                        "Check-In": "-",
                        "Check-Out": "-",
                        "Durasi (menit)": "-",
                        "Status Sesi": "TERDAFTAR (Belum ada aktivitas)",
                        "Masa Berlaku QR": masaBerlakuStatus,
                        "Tanggal Kadaluarsa": visitor.expDate || "-",
                        "Keterangan": keterangan + " | Belum melakukan scan QR"
                    });
                }
            });

            dataForExcel.sort((a, b) => (a["Nama"] || "").localeCompare(b["Nama"] || ""));

            const ws = XLSX.utils.json_to_sheet(dataForExcel);
            
            ws['!cols'] = [
                {wch:25}, {wch:18}, {wch:20}, {wch:12}, {wch:20},
                {wch:15}, {wch:15}, {wch:8}, {wch:20}, {wch:20},
                {wch:15}, {wch:18}, {wch:18}, {wch:18}, {wch:35}
            ];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "VMS_Visitor_Report");
            XLSX.writeFile(wb, `VMS_Report_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
            
            toast("✅ Excel berhasil di export dengan kolom keterangan lengkap", "success");
        } catch(err) { 
            console.error("Export error:", err); 
            toast("Export gagal: " + err.message, "error"); 
        }
    };

function checksumSimple(str){
    let h = 0;
    for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; }
    return String(h >>> 0);
}

async function sha256Hex(str){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function acquireLock(name){
    const now = Date.now();
    const ref = name === "pull" ? pullLock : (name === "save" ? saveLock : mergeLock);
    if(ref && (now - Number(ref.createdAt || now)) < Number(ref.timeoutMs || LOCK_TIMEOUT_MS)) return false;
    if(ref){
        console.warn("LOCK_STARVATION_RECOVERY", { module:"Sync Runtime", reason:"lock_timeout", entityId:name, action:"force_release" });
        if(__lastKnownGoodVisitors) window.visitors = cloneSafe(__lastKnownGoodVisitors);
        if(__lastKnownGoodLogs) markLogsReplaced(cloneSafe(__lastKnownGoodLogs));
    }
    const lock = { createdAt: now, timeoutMs: LOCK_TIMEOUT_MS };
    if(name === "pull") pullLock = lock; else if(name === "save") saveLock = lock; else mergeLock = lock;
    return true;
}
function releaseLock(name){
    if(name === "pull") pullLock = null; else if(name === "save") saveLock = null; else mergeLock = null;
}
function isLockActive(lock){
    if(!lock) return false;
    const now = Date.now();
    return (now - Number(lock.createdAt || now)) < Number(lock.timeoutMs || LOCK_TIMEOUT_MS);
}

function validateEntityMetadata(entity, type){
    if(!entity || typeof entity !== "object") return false;
    const v = Number(entity.version);
    const u = Number(entity.updatedAt);
    if(type === "visitor") return Number.isFinite(v) && Number.isFinite(u);
    if(type === "log"){
        const pAt = Number(entity.persistedAt || 0);
        return Number.isFinite(v) && Number.isFinite(u) && Number.isFinite(pAt) && typeof entity.sequenceId === "string" && entity.sequenceId.length > 0;
    }
    return false;
}

async function encodePendingSyncPayload(payload){

async function decodePendingSyncPayload(rawEnvelope){
    const env = JSON.parse(rawEnvelope);
    if(!env || Number(env.payloadVersion)!==1 || typeof env.raw !== "string") return null;

    const strong = await sha256Hex(env.raw);

}

function filterPendingPayloadAgainstCurrent(next){
    if(!next || typeof next !== "object") return null;
    const currentVisitors = window.visitors || {};
    const currentLogs = window.logs || [];
    const filteredVisitors = {};
    Object.entries(next.visitors || {}).forEach(([k,v])=>{

    // ========== USER MANAGEMENT ==========
    async function ensureDefaultAdmin() {
        let users = JSON.parse(localStorage.getItem("vms_users") || "[]");
        if (users.length === 0) {
            users = [{
                username: "admin",
                password: await sha256("123456"),
                role: "SUPER_ADMIN"
            }];
            localStorage.setItem("vms_users", JSON.stringify(users));
        }
        return users;
    }

    async function syncUsersToServer() {
        if (!onlineStatus) return false;
        try {
            const localUsers = JSON.parse(localStorage.getItem("vms_users") || "[]");
            const res = await fetch(WORKER_BASE_URL + "/sync-users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ users: localUsers })
            });
            if (res.ok) {
                const data = await res.json();
                if (data.users) localStorage.setItem("vms_users", JSON.stringify(data.users));
                return true;
            }
        } catch (e) {
            console.warn("Sync users failed:", e);
        }
        return false;
    }

    // ========== LOGIN HANDLERS ==========
    async function serverLogin(username, password) {
        try {
            const res = await fetch(WORKER_BASE_URL + "/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.ok && data.token) {
                localStorage.setItem("vms_token", data.token);
                localStorage.setItem("vms_role", data.role);
                localStorage.setItem("vms_user", JSON.stringify({ username, role: data.role }));
                lastValidSession = { username, role: data.role, token: data.token, timestamp: Date.now() };
                localStorage.setItem("vms_last_valid_session", JSON.stringify(lastValidSession));
                return { success: true, role: data.role };
            }
            return { success: false, error: data.error || "Login failed" };
        } catch (e) {
            return { success: false, error: e.message };
        }
    }

    async function localLogin(username, password) {
        await ensureDefaultAdmin();
        const users = JSON.parse(localStorage.getItem("vms_users") || "[]");
        const passwordHash = await sha256(password);
        const user = users.find(u => u.username === username && u.password === passwordHash);
        if (user) {
            localStorage.setItem("vms_user", JSON.stringify({ username: user.username, role: user.role }));
            localStorage.setItem("vms_role", user.role);
            localStorage.removeItem("vms_token");
            return { success: true, role: user.role };
        }
        return { success: false, error: "Invalid username or password" };
    }

    // ========== HYBRID LOGIN CONTROLLER ==========
    window.hybridLogin = async function(username, password) {
        if (!username || !password) {
            showToast("Username dan password wajib diisi", "warning");
            return false;
        }

        detectMode();
        await checkOnline();

        if (currentMode === "DEMO") {
            showToast("DEMO MODE: Tidak perlu login", "warning");
            return false;
        }

        if (currentMode === "PRO" && onlineStatus) {
            const result = await serverLogin(username, password);
            if (result.success) {
                showToast(`✅ Login berhasil (ONLINE) - ${result.role}`, "success");
                return true;
            }
            showToast(result.error || "Login gagal", "error");
            return false;
        }

        if (currentMode === "PRO" && !onlineStatus) {
            const cached = localStorage.getItem("vms_last_valid_session");
            if (cached) {
                const session = JSON.parse(cached);
                if (session.username === username && (Date.now() - session.timestamp) < 86400000) {
                    localStorage.setItem("vms_user", JSON.stringify({ username: session.username, role: session.role }));
                    localStorage.setItem("vms_role", session.role);
                    if (session.token) localStorage.setItem("vms_token", session.token);
                    showToast(`⚠️ OFFLINE MODE - Menggunakan session cached: ${username}`, "warning");
                    return true;
                }
            }
            showToast("⚠️ OFFLINE MODE - Login online diperlukan untuk membuat session awal.", "warning");
            return false;
        }

        if (currentMode === "BASIC") {
            const result = await localLogin(username, password);
            if (result.success) {
                showToast(`✅ Login berhasil (LOCAL) - ${result.role}`, "success");
                return true;
            }
            showToast(result.error || "Login gagal", "error");
            return false;
        }

        return false;
    };

    // ========== HYBRID LOGOUT ==========
    window.hybridLogout = function() {
        localStorage.removeItem("vms_token");
        localStorage.removeItem("vms_user");
        localStorage.removeItem("vms_role");
        
        detectMode();
        
        const loginOverlay = document.getElementById("loginOverlay");
        const appLayout = document.getElementById("appLayout");
        
        if (currentMode === "PRO") {
            if (loginOverlay) loginOverlay.style.display = "flex";
            if (appLayout) appLayout.style.display = "none";
        } else {
            if (loginOverlay) loginOverlay.style.display = "none";
            if (appLayout) appLayout.style.display = "flex";
        }
        
        showToast("Logged out", "info");
        if (window.renderDashboard) window.renderDashboard();
        if (window.renderLogTable) window.renderLogTable();
    };

    // ========== SESSION VALIDATION ==========
    async function validateSession() {
        const userStr = localStorage.getItem("vms_user");
        if (!userStr) return false;
        
        detectMode();
        
        if (currentMode === "DEMO") {
            if (!localStorage.getItem("vms_user")) {
                localStorage.setItem("vms_user", JSON.stringify({ username: "demo", role: "OPERATOR" }));
                localStorage.setItem("vms_role", "OPERATOR");
            }
            return true;
        }
        
        if (currentMode === "PRO" && onlineStatus) {
            const token = localStorage.getItem("vms_token");
            if (token) {
                try {
                    const res = await fetch(WORKER_BASE_URL + "/users", { headers: { "x-token": token } });
                    if (res.ok) return true;
                    localStorage.removeItem("vms_token");
                    localStorage.removeItem("vms_user");
                    localStorage.removeItem("vms_role");
                    return false;
                } catch {
                    const cached = localStorage.getItem("vms_last_valid_session");
                    if (cached) {
                        const session = JSON.parse(cached);
                        if (Date.now() - session.timestamp < 86400000) return true;
                    }
                    return false;
                }
            }
            return false;
        }
        
        return true;
    }

    // ========== INIT SESSION ==========
    window.hybridInitSession = async function() {
        detectMode();
        await checkOnline();
        
        const loginOverlay = document.getElementById("loginOverlay");
        const appLayout = document.getElementById("appLayout");
        
        if (currentMode === "DEMO") {
            if (loginOverlay) loginOverlay.style.display = "none";
            if (appLayout) appLayout.style.display = "flex";
            if (!localStorage.getItem("vms_user")) {
                localStorage.setItem("vms_user", JSON.stringify({ username: "demo", role: "OPERATOR" }));
                localStorage.setItem("vms_role", "OPERATOR");
            }
            if (window.updateUserUI) window.updateUserUI();
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
            return true;
        }
        
        if (currentMode === "BASIC") {
            if (loginOverlay) loginOverlay.style.display = "none";
            if (appLayout) appLayout.style.display = "flex";
            const savedUser = localStorage.getItem("vms_user");
            if (savedUser) {
                const user = JSON.parse(savedUser);
                localStorage.setItem("vms_role", user.role);
                if (window.updateUserUI) window.updateUserUI();
            }
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
            return true;
        }
        
        if (currentMode === "PRO") {
            await validateSession();
            if (loginOverlay) loginOverlay.style.display = "none";
            if (appLayout) appLayout.style.display = "flex";
            if (!localStorage.getItem("vms_user")) {
                localStorage.setItem("vms_user", JSON.stringify({ username: "pro-user", role: "OPERATOR" }));
                localStorage.setItem("vms_role", "OPERATOR");
            }
            if (window.updateUserUI) window.updateUserUI();
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
            return true;
        }
        
        return false;
    };

    // ========== UI OVERRIDES ==========
    function overrideLoginButton() {
        const doLoginBtn = document.getElementById("doLoginBtn");
        if (doLoginBtn && !doLoginBtn._hybridOverridden) {
            doLoginBtn._hybridOverridden = true;
            doLoginBtn.onclick = async () => {
                const username = document.getElementById("loginUsername")?.value || "";
                const password = document.getElementById("loginPassword")?.value || "";
                const success = await window.hybridLogin(username, password);
                if (success) {
                    const loginOverlay = document.getElementById("loginOverlay");
                    const appLayout = document.getElementById("appLayout");
                    if (loginOverlay) loginOverlay.style.display = "none";
                    if (appLayout) appLayout.style.display = "flex";
                    if (window.renderDashboard) window.renderDashboard();
                    if (window.renderLogTable) window.renderLogTable();
                    if (window.updateUserUI) window.updateUserUI();
                }
            };
        }
    }

    function overrideLogoutButtons() {
        document.querySelectorAll("#logoutBtnTop, #logoutBtnSidebar").forEach(btn => {
            if (!btn._hybridOverridden) {
                btn._hybridOverridden = true;
                btn.onclick = () => window.hybridLogout();
            }
        });
    }

    // ========== STATUS INDICATOR ==========
    function addStatusIndicator() {
        if (document.getElementById("hybridStatusIndicator")) return;
        
        const indicator = document.createElement("div");
        indicator.id = "hybridStatusIndicator";
        indicator.style.cssText = `
            position: fixed; bottom: 10px; right: 10px; z-index: 9999;
            background: rgba(0,0,0,0.8); color: white; padding: 4px 12px;
            border-radius: 20px; font-size: 10px; font-family: monospace;
            pointer-events: none; backdrop-filter: blur(4px);
        `;
        document.body.appendChild(indicator);
        
        async function updateIndicator() {
            const mode = detectMode();
            await checkOnline();
            const icon = onlineStatus ? "🟢" : "🟡";
            const modeIcon = mode === "PRO" ? "🔴" : (mode === "BASIC" ? "🔵" : "🟠");
            indicator.innerHTML = `${icon} ${modeIcon} ${mode} | ${onlineStatus ? "ONLINE" : "OFFLINE"}`;
        }
        
        updateIndicator();
        setInterval(updateIndicator, 10000);
    }

    // ========== AUTO FORCE INIT ==========
    async function safeForceInit() {
        if (!onlineStatus) return;
        try {
            const res = await fetch(WORKER_BASE_URL + "/force-init", { method: "POST" });
            const data = await res.json();
            if (data.ok) console.log("Force init completed");
        } catch (e) {
            console.warn("Force init skipped:", e.message);
        }
    }

    // ========== ONLINE MONITOR ==========
    function monitorOnlineStatus() {
        window.addEventListener("online", async () => {
            await checkOnline();
            await syncUsersToServer();
            await window.hybridInitSession();
            showToast("🟢 Kembali ONLINE - Sinkronisasi data", "success");
            if (window.renderDashboard) window.renderDashboard();
            if (window.renderLogTable) window.renderLogTable();
        });
        
        window.addEventListener("offline", async () => {
            await checkOnline();
            showToast("🟡 MODE OFFLINE - Menggunakan data lokal", "warning");
        });
    }

    // ========== START ==========
    async function start() {
        if (window.__VMS_HYBRID_START_LOCK__) return;
        window.__VMS_HYBRID_START_LOCK__ = true;
        await ensureDefaultAdmin();
        await checkOnline();
        await safeForceInit();
        await syncUsersToServer();
        await window.hybridInitSession();
        
        addStatusIndicator();
        overrideLoginButton();
        overrideLogoutButtons();
        monitorOnlineStatus();
        
        setInterval(async () => {
            await checkOnline();
            if (onlineStatus) await syncUsersToServer();
        }, 30000);
    }
    
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start);
    } else {
        start();
    }
})();
</script>
<script>

// 🔥 LICENSE CLIENT PATCH (NO BREAK SYSTEM)
// ============================================================

(function(){
 if(window.__LICENSE_SYSTEM__) return;
 window.__LICENSE_SYSTEM__ = true;

 function askLicense(){
  return localStorage.getItem("vms_license_key");
 }

 const originalFetch = window.fetch;

 window.fetch = async function(url, options={}){
  try{
   if(typeof url === "string" && url.includes("/save") && options.body){

    let body = JSON.parse(options.body);

    const key = askLicense();
    if (!body.licenseKey) body.licenseKey = key;
    body.license = body.license || localStorage.getItem("vms_license");

    if(typeof window.normalizeSavePayload === "function"){
      body = window.normalizeSavePayload(body);
    }
    options.body = JSON.stringify(body);
   }
  }catch(e){
   console.warn("License inject skip", e);
  }

  return originalFetch(url, options);
 };

})();
</script>

<script>
const SYNC_WORKER_BASE_URL = "https://vms3modev4.sapammeded.workers.dev";

async function syncToCloud(payload) {
    try {
        if (!payload || !payload.deviceId) return;
        if (!navigator.onLine) return;

        const lastSync = localStorage.getItem("vms_last_sync");
        const currentHash = JSON.stringify(payload);

        if (lastSync === currentHash) return;

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const res = await fetch(SYNC_WORKER_BASE_URL + "/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload),
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (res.ok) {
            localStorage.setItem("vms_last_sync", currentHash);
            console.log("SYNC SUCCESS");
        }

    } catch (err) {
        console.warn("SYNC ERROR:", err.message);
    }
}
</script>
